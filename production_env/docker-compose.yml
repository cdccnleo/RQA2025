networks:
  rqa2025_network:
    driver: bridge
    ipam:
      config:
      - gateway: 172.20.0.1
        subnet: 172.20.0.0/16
services:
  app:
    build:
      context: ..
      dockerfile: ./production_env/docker/Dockerfile.production
    container_name: rqa2025_app
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./.env.production
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      timeout: 10s
    networks:
    - rqa2025_network
    ports:
    - 8000:8000
    restart: unless-stopped
    volumes:
    - ../src:/app/src:ro
    - ./logs:/app/logs
  grafana:
    container_name: rqa2025_grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
    - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    image: grafana/grafana:latest
    networks:
    - rqa2025_network
    ports:
    - 3000:3000
    restart: unless-stopped
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    - grafana_data:/var/lib/grafana
  nginx:
    container_name: rqa2025_nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    depends_on:
    - app
    image: nginx:alpine
    networks:
    - rqa2025_network
    ports:
    - 80:80
    - 443:443
    restart: unless-stopped
    volumes:
    - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf
  postgres:
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    container_name: rqa2025_postgres
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: rqa2025_prod
      POSTGRES_PASSWORD: secure_password_2025
      POSTGRES_USER: rqa_user
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U rqa_user -d rqa2025_prod
      timeout: 5s
    image: postgres:14-alpine
    networks:
    - rqa2025_network
    ports:
    - 5432:5432
    restart: unless-stopped
    volumes:
    - ./configs/postgresql.conf:/etc/postgresql/postgresql.conf
    - ./configs/init.sql:/docker-entrypoint-initdb.d/init.sql
    - postgres_data:/var/lib/postgresql/data
  prometheus:
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/etc/prometheus/console_libraries
    - --web.console.templates=/etc/prometheus/consoles
    - --storage.tsdb.retention.time=200h
    - --web.enable-lifecycle
    container_name: rqa2025_prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    image: prom/prometheus:latest
    networks:
    - rqa2025_network
    ports:
    - 9090:9090
    restart: unless-stopped
    volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    - prometheus_data:/prometheus
  redis:
    command: redis-server /etc/redis/redis.conf
    container_name: rqa2025_redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - redis-cli
      - --raw
      - incr
      - ping
      timeout: 3s
    image: redis:7-alpine
    networks:
    - rqa2025_network
    ports:
    - 6379:6379
    restart: unless-stopped
    volumes:
    - ./configs/redis.conf:/etc/redis/redis.conf
    - redis_data:/data
version: '3.8'
volumes:
  grafana_data: {}
  postgres_data: {}
  prometheus_data: {}
  redis_data: {}
