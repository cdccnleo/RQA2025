groups:
  - name: rqa2025-alerts
    rules:
      # 应用服务告警
      - alert: RQA2025AppDown
        expr: up{job="rqa2025-app"} == 0
        for: 2m
        labels:
          severity: critical
          service: rqa2025-app
        annotations:
          summary: "RQA2025应用服务已宕机"
          description: "RQA2025应用服务在{{ $labels.instance }}上已宕机超过2分钟"

      - alert: RQA2025HighErrorRate
        expr: rate(http_requests_total{job="rqa2025-app", status=~"5.."}[5m]) / rate(http_requests_total{job="rqa2025-app"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: rqa2025-app
        annotations:
          summary: "RQA2025应用错误率过高"
          description: "RQA2025应用在{{ $labels.instance }}上的错误率超过5% (当前值: {{ $value }})"

      - alert: RQA2025HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="rqa2025-app"}[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          service: rqa2025-app
        annotations:
          summary: "RQA2025应用响应时间过高"
          description: "RQA2025应用的95分位响应时间超过2秒 (当前值: {{ $value }}秒)"

      - alert: RQA2025LowThroughput
        expr: rate(http_requests_total{job="rqa2025-app"}[5m]) < 10
        for: 5m
        labels:
          severity: warning
          service: rqa2025-app
        annotations:
          summary: "RQA2025应用吞吐量过低"
          description: "RQA2025应用的请求率低于10 req/s (当前值: {{ $value }} req/s)"

      # 数据服务告警
      - alert: RQA2025RedisDown
        expr: redis_up{job="rqa2025-redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: rqa2025-redis
        annotations:
          summary: "Redis缓存服务已宕机"
          description: "Redis缓存服务在{{ $labels.instance }}上已宕机超过1分钟"

      - alert: RQA2025PostgresDown
        expr: pg_up{job="rqa2025-postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: rqa2025-postgres
        annotations:
          summary: "PostgreSQL数据库已宕机"
          description: "PostgreSQL数据库在{{ $labels.instance }}上已宕机超过1分钟"

      - alert: RQA2025PostgresHighConnections
        expr: pg_stat_activity_count{job="rqa2025-postgres"} > 80
        for: 2m
        labels:
          severity: warning
          service: rqa2025-postgres
        annotations:
          summary: "PostgreSQL连接数过高"
          description: "PostgreSQL数据库连接数超过80个 (当前值: {{ $value }})"

      # 基础设施告警
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "CPU使用率过高"
          description: "{{ $labels.instance }}的CPU使用率超过80% (当前值: {{ $value }}%)"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "内存使用率过高"
          description: "{{ $labels.instance }}的内存使用率超过85% (当前值: {{ $value }}%)"

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 15
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "磁盘空间不足"
          description: "{{ $labels.instance }}的根分区可用空间低于15% (当前值: {{ $value }}%)"

      - alert: HighNetworkTraffic
        expr: rate(node_network_receive_bytes_total[5m]) / 1024 / 1024 > 100
        for: 5m
        labels:
          severity: info
          service: infrastructure
        annotations:
          summary: "网络流量过高"
          description: "{{ $labels.instance }}的网络接收流量超过100MB/s (当前值: {{ $value }} MB/s)"

      # Kubernetes告警
      - alert: KubernetesPodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[10m]) > 0
        for: 2m
        labels:
          severity: warning
          service: kubernetes
        annotations:
          summary: "Pod重启循环"
          description: "Pod {{ $labels.pod }} 在重启循环中"

      - alert: KubernetesDeploymentUnavailable
        expr: kube_deployment_status_replicas_unavailable > 0
        for: 2m
        labels:
          severity: critical
          service: kubernetes
        annotations:
          summary: "Deployment不可用"
          description: "Deployment {{ $labels.deployment }} 有不可用的副本"

      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 2m
        labels:
          severity: critical
          service: kubernetes
        annotations:
          summary: "Kubernetes节点不可用"
          description: "Kubernetes节点 {{ $labels.node }} 处于不可用状态"

      # 业务指标告警
      - alert: RQA2025LowBusinessSuccessRate
        expr: rate(rqa2025_business_success_total[5m]) / rate(rqa2025_business_requests_total[5m]) < 0.95
        for: 5m
        labels:
          severity: critical
          service: business
        annotations:
          summary: "业务成功率过低"
          description: "RQA2025业务成功率低于95% (当前值: {{ $value }})"

      - alert: RQA2025HighQueueLength
        expr: rqa2025_queue_length > 1000
        for: 2m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "队列长度过高"
          description: "RQA2025队列长度超过1000 (当前值: {{ $value }})"

      - alert: RQA2025SlowDataProcessing
        expr: histogram_quantile(0.95, rate(rqa2025_data_processing_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "数据处理速度过慢"
          description: "RQA2025数据处理95分位耗时超过10秒 (当前值: {{ $value }}秒)"
