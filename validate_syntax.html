<!DOCTYPE html>
<html>
<head>
    <title>JavaScript语法验证</title>
</head>
<body>
    <div id="status">验证中...</div>

    <script>
        try {
            // 模拟修复后的代码结构
            function initDataSourceLoading() {
                console.log('开始数据源加载初始化...');

                const tbody = document.querySelector('#test-table tbody');
                if (!tbody) {
                    console.error('找不到数据源表格');
                    return;
                }

                console.log('表格元素存在，开始加载数据');
                tbody.innerHTML = '<tr><td>正在加载数据源...</td></tr>';

                // 直接加载数据源的方法
                async function directLoadDataSources(retryCount = 0) {
                    const maxRetries = 3;
                    console.log('执行直接数据源加载...');

                    try {
                        console.log('API请求...');
                        // 模拟API调用成功
                        const mockData = { data_sources: [{ id: 'test', name: '测试' }] };

                        if (mockData.data_sources && mockData.data_sources.length > 0) {
                            console.log('渲染数据源...');
                            console.log('加载成功');
                        } else {
                            console.log('无数据源');
                        }
                    } catch (error) {
                        console.error('加载失败:', error);

                        if (retryCount < maxRetries) {
                            console.log('重试...');
                        } else {
                            console.error('重试次数用完');
                        }
                    }
                }

                // 执行API请求
                directLoadDataSources();
            }

            // 页面加载完成后开始初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initDataSourceLoading);
            } else {
                initDataSourceLoading();
            }

            document.getElementById('status').innerHTML = '✅ JavaScript语法验证通过';

        } catch (error) {
            document.getElementById('status').innerHTML = '❌ 语法错误: ' + error.message;
            console.error('语法错误:', error);
        }
    </script>

    <table id="test-table">
        <tbody></tbody>
    </table>
</body>
</html>
