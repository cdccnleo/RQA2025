# RQA2025 Nginx Production Configuration

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # WebSocket support - map upgrade header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Upstream for RQA2025 app
    upstream rqa2025_app {
        server app:8000;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    server {
        listen 80;
        server_name localhost;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CORS headers for all requests
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Requested-With,Accept,Accept-Encoding,Accept-Language,X-CSRFToken" always;
        add_header Access-Control-Allow-Credentials false always;

        # API endpoints
        location /api/ {

            proxy_pass http://rqa2025_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings - 增加超时时间以支持长时间运行的操作
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # WebSocket endpoints for real-time monitoring
        location /ws/ {
            # CORS headers for WebSocket
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, Cache-Control" always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, Cache-Control" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            proxy_pass http://rqa2025_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;

            # Timeout settings for WebSocket
            proxy_connect_timeout 604800s;
            proxy_send_timeout 604800s;
            proxy_read_timeout 604800s;
        }

        # Health check
        location /health {
            proxy_pass http://rqa2025_app;
            access_log off;
        }

        # API documentation
        location /docs {
            proxy_pass http://rqa2025_app;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://rqa2025_app;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://rqa2025_app;
            proxy_set_header Host $host;
        }

        # Static files (if any)
        location /static/ {
            proxy_pass http://rqa2025_app;
        }

        # Frontend application
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|html)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

