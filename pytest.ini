[tool:pytest]
# 测试配置
testpaths = tests
python_files = test_*.py *_test.py
norecursedirs = production_simulation backups
collect_ignore = ["production_simulation/", "backups/"]
collect_ignore_glob = ["production_simulation/**/*", "backups/**/*"]
python_classes = Test*
python_functions = test_*

# 并行测试配置
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    -ra
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=50
    -n auto

pythonpath = src

# 覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

# 标记配置
markers =
    slow: 标记运行缓慢的测试
    integration: 集成测试
    unit: 单元测试
    e2e: 端到端测试
    smoke: 冒烟测试
    performance: 性能测试
    benchmark: 基准测试
    infrastructure: 基础设施层测试
    data: 数据层测试
    core: 核心层测试
    risk: 风险层测试
    trading: 交易层测试
    ml: 机器学习层测试
    feature: 特征层测试
    deadlock_test: 死锁预防测试
    business_process: 业务流程测试 - 验证完整业务链路
    strategy_development: 量化策略开发流程测试
    trading_execution: 交易执行流程测试
    risk_control: 风险控制流程测试

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 测试结果输出
junit_family = xunit2
junit_logging = all

# 超时配置
timeout = 300
timeout_method = thread