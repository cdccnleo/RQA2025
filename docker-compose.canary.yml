version: '3.8'

services:
  # =============== 金丝雀版本应用服务 ===============
  app-canary:
    image: rqa2025-rqa2025-app:latest
    container_name: rqa2025-app-canary
    restart: unless-stopped
    environment:
      - ENVIRONMENT=canary
      - VERSION=${CANARY_VERSION:-latest}
      - DB_USER=rqa2025_admin
      - DB_PASSWORD=SecurePass123!
      - REDIS_PASSWORD=RedisSecure123!
      - JWT_SECRET=RQA2025_JWT_SECRET_KEY_2025_SECURE_TOKEN
    volumes:
      - ./logs:/app/logs
    networks:
      - rqa2025-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =============== 数据库服务 ===============
  postgres:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    container_name: rqa2025-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rqa2025_prod
      - POSTGRES_USER=rqa2025_admin
      - POSTGRES_PASSWORD=SecurePass123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - rqa2025-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rqa2025_admin -d rqa2025_prod"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============== 缓存服务 ===============
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: rqa2025-redis
    restart: unless-stopped
    command: redis-server --requirepass RedisSecure123! --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - rqa2025-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============== 反向代理 ===============
  nginx:
    image: docker.1ms.run/nginx:alpine
    container_name: rqa2025-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rqa2025-network
    depends_on:
      - app-canary
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============== 监控服务 ===============
  prometheus:
    image: docker.1ms.run/prom/prometheus:latest
    container_name: rqa2025-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rqa2025-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: docker.1ms.run/grafana/grafana:latest
    container_name: rqa2025-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=GrafanaAdmin123!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - rqa2025-network
    depends_on:
      - prometheus

# =============== 网络配置 ===============
networks:
  rqa2025-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============== 数据卷 ===============
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local


