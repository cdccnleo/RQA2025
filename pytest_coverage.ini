[pytest]
# 覆盖率专用配置文件
# 用于需要详细覆盖率分析的场景

# 测试发现配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 覆盖率配置 - 详细模式
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=lcov:coverage.lcov
    --cov-fail-under=80
    --cov-branch
    --cov-source=src

# 标记配置
markers =
    unit: 单元测试
    integration: 集成测试
    performance: 性能测试
    slow: 慢速测试
    benchmark: 基准测试
    stress: 压力测试
    memory: 内存测试
    coverage: 覆盖率测试

# 覆盖率环境变量
env =
    COVERAGE_FILE = .coverage
    COVERAGE_PROCESS_START = .coveragerc
