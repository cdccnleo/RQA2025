[tox]
envlist = py38, py39, py310, py311
skip_missing_interpreters = true

[testenv]
deps =
    -r requirements.txt
    pytest
    pytest-cov
    pytest-xdist
    pytest-mock
    pytest-asyncio
    coverage[toml]

commands =
    pytest tests/unit/ --cov=src --cov-report=xml --cov-report=term-missing -x --tb=short --disable-warnings -q

[testenv:coverage]
deps =
    {[testenv]deps}
    coverage[toml]

commands =
    pytest tests/ --cov=src --cov-report=html --cov-report=xml --cov-report=term-missing --cov-fail-under=70

[testenv:lint]
deps =
    flake8
    black
    isort
    mypy

commands =
    flake8 src/ tests/ --count --statistics
    black --check --diff src/ tests/
    isort --check-only --diff src/ tests/
    mypy src/ --ignore-missing-imports --no-strict-optional

[testenv:security]
deps =
    bandit
    safety

commands =
    bandit -r src/ -f txt
    safety check

[testenv:docs]
deps =
    sphinx
    sphinx-rtd-theme

commands =
    sphinx-build -b html docs/ docs/_build/html

[testenv:benchmark]
deps =
    {[testenv]deps}
    pytest-benchmark

commands =
    pytest tests/ -k "benchmark or performance" --benchmark-only --benchmark-json=benchmark-results.json

[testenv:integration]
deps = {[testenv]deps}

commands =
    pytest tests/integration/ --cov=src --cov-report=xml --cov-report=term-missing -v

[testenv:e2e]
deps =
    {[testenv]deps}
    playwright

commands =
    playwright install
    pytest tests/e2e/ -v --tb=short

[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .pytest_cache,
    .tox,
    venv,
    env,
    .venv,
    build,
    dist,
    *.egg-info,
    .coverage,
    htmlcov,
    docs,
    src/strategy/cloud_native/cloud_integration.py

[isort]
profile = black
multi_line_output = 3
line_length = 88
known_first_party = src
skip = src/strategy/cloud_native/cloud_integration.py

[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    setup.py
    docs/*
    scripts/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --disable-warnings
    --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    benchmark: marks tests as benchmark tests
    performance: marks tests as performance tests
