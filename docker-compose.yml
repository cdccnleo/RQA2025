version: '3.8'

services:
  # 后端API服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rqa2025-app
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      - PYTHONPATH=/app:/app/src:/app/scripts
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - rqa2025-network

  # PostgreSQL + TimescaleDB数据库
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: rqa2025-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_MAX_CONNECTIONS=200
      - POSTGRESQL_SHARED_BUFFERS=512MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-timescaledb.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./scripts/init_historical_data_tables.sql:/docker-entrypoint-initdb.d/init_historical_data_tables.sql
    # 安全修复：移除端口映射，仅允许内部网络访问
    # ports:
    #   - "5432:5432"
    networks:
      - rqa2025-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} && psql -U ${DB_USER} -d ${DB_NAME} -c 'SELECT 1 FROM timescaledb_information.hypertables LIMIT 1;'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis缓存
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: rqa2025-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # 安全修复：移除端口映射，仅允许内部网络访问
    # ports:
    #   - "6379:6379"
    networks:
      - rqa2025-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 前端应用服务
  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: rqa2025-web
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - rqa2025-network

  # Nginx负载均衡器
  nginx:
    image: docker.1ms.run/nginx:alpine
    container_name: rqa2025-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./web-static:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
      - web
    restart: unless-stopped
    networks:
      - rqa2025-network

networks:
  rqa2025-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rqa2025-logs:
    driver: local
  rqa2025-data:
    driver: local
