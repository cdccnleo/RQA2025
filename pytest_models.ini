[tool:pytest]
# 模型层专用测试配置
testpaths = tests/unit/models
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 模型层测试执行配置 - 更保守的设置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --durations=5
    --timeout=30
    # 禁用并行执行以避免线程冲突
    # -n=1
    # 测试隔离配置
    --strict-config
    --disable-pytest-warnings
    # 覆盖率配置 - 模型层专用
    --cov=src/models
    --cov-report=term-missing
    --cov-report=html:htmlcov_models
    --cov-report=xml:coverage_models.xml
    --cov-fail-under=30
    # 允许更多失败以便一次性修复所有问题
    --maxfail=10
    # 添加资源清理
    --capture=no

# 标记配置
markers =
    unit: 单元测试
    integration: 集成测试
    performance: 性能测试
    slow: 慢速测试
    benchmark: 基准测试
    stress: 压力测试
    memory: 内存测试
    stop: 停止标记
    model: 模型相关测试
    inference: 推理相关测试
    training: 训练相关测试

# 性能测试特定配置
[benchmark]
min_rounds = 3
warmup = false
warmup_iterations = 1
rounds = 5
timeout = 180.0
max_time = 30.0
save = false
autosave = false
group_by = name
sort = name
