apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-service
  namespace: rqa-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: feature-service
  template:
    metadata:
      labels:
        app: feature-service
    spec:
      containers:
      - name: feature-service
        image: registry.rqa.com/feature-service:prod
        resources:
          limits:
            cpu: "4"
            memory: 8Gi
        ports:
        - containerPort: 8080
