apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-intelligence-service
  namespace: rqa2025-monitoring
  labels:
    app: rqa2025
    component: alert-intelligence
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rqa2025
      component: alert-intelligence
  template:
    metadata:
      labels:
        app: rqa2025
        component: alert-intelligence
        version: v1.0.0
    spec:
      containers:
      - name: alert-intelligence
        image: rqa2025/alert-service:latest
        ports:
        - containerPort: 5001
          name: http
          protocol: TCP
        env:
        - name: FLASK_APP
          value: "src/monitoring/alert_intelligence_dashboard.py"
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: rqa2025-config
              key: FLASK_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: rqa2025-config
              key: LOG_LEVEL
        - name: ML_ENABLED
          valueFrom:
            configMapKeyRef:
              name: rqa2025-config
              key: ML_ENABLED
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rqa2025-secrets
              key: WEB_SECRET_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: models-volume
          mountPath: /app/models
      volumes:
      - name: logs-volume
        persistentVolumeClaim:
          claimName: rqa2025-logs-pvc
      - name: models-volume
        persistentVolumeClaim:
          claimName: rqa2025-models-pvc
      restartPolicy: Always
      imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: alert-intelligence-service
  namespace: rqa2025-monitoring
  labels:
    app: rqa2025
    component: alert-intelligence
spec:
  selector:
    app: rqa2025
    component: alert-intelligence
  ports:
  - name: http
    port: 80
    targetPort: 5001
    protocol: TCP
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alert-intelligence-ingress
  namespace: rqa2025-monitoring
  labels:
    app: rqa2025
    component: alert-intelligence
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - alert.rqa2025.com
    secretName: alert-intelligence-tls
  rules:
  - host: alert.rqa2025.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: alert-intelligence-service
            port:
              number: 80
