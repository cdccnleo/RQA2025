---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rqa2026-ingress
  namespace: rqa2026
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/rate-limit: |
      burst=100
      average=50
    traefik.ingress.kubernetes.io/circuit-breaker: |
      expression=NetworkErrorRatio() > 0.5
spec:
  tls:
  - hosts:
    - api.rqa2026.com
    secretName: rqa2026-tls
  rules:
  - host: api.rqa2026.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: rqa2026-api-gateway
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: rqa2026-api-gateway
            port:
              number: 8000
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: rqa2026-api-gateway
            port:
              number: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rqa2026-monitoring-ingress
  namespace: rqa2026
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.middlewares: rqa2026-auth@kubernetescrd
spec:
  rules:
  - host: monitoring.rqa2026.com
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      - path: /jaeger
        pathType: Prefix
        backend:
          service:
            name: jaeger
            port:
              number: 16686




