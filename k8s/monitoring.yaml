apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.rules

    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    scrape_configs:
    - job_name: 'risk-control-api-gateway'
      static_configs:
      - targets: ['api-gateway-service:9090']
      scrape_interval: 10s
      metrics_path: '/metrics'

    - job_name: 'risk-control-calculation'
      static_configs:
      - targets: ['risk-calculation-service:9091']
      scrape_interval: 15s
      metrics_path: '/metrics'

    - job_name: 'risk-control-monitor'
      static_configs:
      - targets: ['risk-realtime-monitor-service:9092']
      scrape_interval: 20s
      metrics_path: '/metrics'

    - job_name: 'risk-control-alert'
      static_configs:
      - targets: ['risk-alert-system-service:9093']
      scrape_interval: 30s
      metrics_path: '/metrics'

    - job_name: 'redis'
      static_configs:
      - targets: ['redis-service:6379']
      scrape_interval: 30s

    - job_name: 'postgresql'
      static_configs:
      - targets: ['postgres-service:5432']
      scrape_interval: 30s

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-rules
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: monitoring
data:
  risk-control.rules: |
    groups:
    - name: risk-control
      rules:
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | printf \"%.2f\" }}%"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / process_virtual_memory_max_bytes > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | printf \"%.2f\" }}%"

      - alert: HighCPUUsage
        expr: rate(process_cpu_user_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage rate is {{ $value }}"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.job }} is down"

      - alert: RiskCalculationQueueFull
        expr: risk_calculation_queue_size / risk_calculation_max_queue_size > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Risk calculation queue is full"
          description: "Queue utilization is {{ $value | printf \"%.2f\" }}%"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/containers/*risk-control*.log
        Parser            docker
        Tag               risk-control.*
        Refresh_Interval  5

    [FILTER]
        Name                kubernetes
        Match               risk-control.*
        Kube_URL           https://kubernetes.default.svc.cluster.local:443
        Kube_CA_File       /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File    /var/run/secrets/kubernetes.io/serviceaccount/token

    [FILTER]
        Name                grep
        Match               risk-control.*
        Regex              log ^((?!DEBUG).)*$

    [OUTPUT]
        Name                es
        Match               risk-control.*
        Host                elasticsearch
        Port                9200
        Index               risk-control-%Y.%m.%d
        Type                _doc
        Logstash_Format    On
        Replace_Dots       On

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: logging
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: risk-control-service-account
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.1
        volumeMounts:
        - name: varlogcontainers
          mountPath: /var/log/containers
          readOnly: true
        - name: varlogpods
          mountPath: /var/log/pods
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/
      volumes:
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: fluent-bit-config
        configMap:
          name: fluent-bit-config
