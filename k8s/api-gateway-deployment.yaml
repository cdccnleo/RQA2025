apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: api-gateway
    version: v2.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-control
      component: api-gateway
  template:
    metadata:
      labels:
        app: risk-control
        component: api-gateway
        version: v2.0.0
    spec:
      serviceAccountName: risk-control-service-account
      containers:
      - name: api-gateway
        image: rqa2025/api-gateway:v2.0.0
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: API_GATEWAY_PORT
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: API_GATEWAY_PORT
        - name: API_GATEWAY_HOST
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: API_GATEWAY_HOST
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: risk-control-secrets
              key: JWT_SECRET
        - name: SERVICE_DISCOVERY_BACKEND
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: SERVICE_DISCOVERY_BACKEND
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: REDIS_HOST
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: LOG_LEVEL
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: risk-control-logs
      - name: config
        configMap:
          name: risk-control-config
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: risk-control
    component: api-gateway

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: api-gateway
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.rqa2025.com
    secretName: api-gateway-tls
  rules:
  - host: api.rqa2025.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 8080
