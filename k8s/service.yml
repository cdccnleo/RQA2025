---
apiVersion: v1
kind: Service
metadata:
  name: rqa2026-api-gateway
  namespace: rqa2026
  labels:
    app: rqa2026
    component: api-gateway
spec:
  selector:
    app: rqa2026
    component: api-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  type: LoadBalancer
  sessionAffinity: None

