apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: risk-control-psp
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: security
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  allowedCapabilities:
    - NET_BIND_SERVICE
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'persistentVolumeClaim'
    - 'secret'
    - 'projected'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  supplementalGroups:
    rule: 'MustRunAs'
    ranges:
    - min: 1
      max: 65535
  fsGroup:
    rule: 'MustRunAs'
    ranges:
    - min: 1
      max: 65535
  readOnlyRootFilesystem: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: risk-control-psp-role
  labels:
    app: risk-control
    component: security
rules:
- apiGroups: ['policy']
  resources: ['podsecuritypolicies']
  verbs: ['use']
  resourceNames:
  - risk-control-psp

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: risk-control-psp-binding
  labels:
    app: risk-control
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: risk-control-psp-role
subjects:
- kind: ServiceAccount
  name: risk-control-service-account
  namespace: rqa2025-risk-control

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: risk-control-quota
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: resource-management
spec:
  hard:
    requests.cpu: "8000m"
    requests.memory: 16Gi
    limits.cpu: "16000m"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    configmaps: "20"
    secrets: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: risk-control-limits
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: resource-management
spec:
  limits:
  - default:
      cpu: "2000m"
      memory: 4Gi
    defaultRequest:
      cpu: "500m"
      memory: 1Gi
    type: Container
  - max:
      cpu: "4000m"
      memory: 8Gi
    min:
      cpu: "100m"
      memory: 128Mi
    type: Container
