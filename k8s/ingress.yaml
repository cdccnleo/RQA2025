apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rqa2025-monitoring-ingress
  namespace: rqa2025-monitoring
  labels:
    app: rqa2025
    component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - monitoring.rqa2025.com
    - api.rqa2025.com
    secretName: rqa2025-monitoring-tls
  rules:
  # 主监控域名
  - host: monitoring.rqa2025.com
    http:
      paths:
      - path: /alerts
        pathType: Prefix
        backend:
          service:
            name: alert-intelligence-service
            port:
              number: 80
      - path: /trading
        pathType: Prefix
        backend:
          service:
            name: trading-monitor-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: trading-monitor-service
            port:
              number: 80

  # API域名
  - host: api.rqa2025.com
    http:
      paths:
      - path: /api/v1/alerts
        pathType: Prefix
        backend:
          service:
            name: alert-intelligence-service
            port:
              number: 80
      - path: /api/v1/trading
        pathType: Prefix
        backend:
          service:
            name: trading-monitor-service
            port:
              number: 80
      - path: /api/v1/performance
        pathType: Prefix
        backend:
          service:
            name: performance-analyzer-api
            port:
              number: 8080
      - path: /health
        pathType: Exact
        backend:
          service:
            name: alert-intelligence-service
            port:
              number: 80

---
# 网络策略 - 限制服务间通信
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rqa2025-monitoring-network-policy
  namespace: rqa2025-monitoring
  labels:
    app: rqa2025
    component: networking
spec:
  podSelector:
    matchLabels:
      app: rqa2025
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 允许来自同一命名空间的Pod访问
  - from:
    - podSelector:
        matchLabels:
          app: rqa2025
    ports:
    - protocol: TCP
      port: 5001  # 告警服务
    - protocol: TCP
      port: 5002  # 交易监控
    - protocol: TCP
      port: 8001  # 性能分析器
  # 允许来自Ingress的访问
  - from: []
    ports:
    - protocol: TCP
      port: 5001
    - protocol: TCP
      port: 5002
    - protocol: TCP
      port: 8001
  egress:
  # 允许DNS查询
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # 允许HTTP/HTTPS出站
  - to: []
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  # 允许同一命名空间的通信
  - to:
    - podSelector:
        matchLabels:
          app: rqa2025
    ports:
    - protocol: TCP
