apiVersion: apps/v1
kind: Deployment
metadata:
  name: rqa2025-app
  namespace: rqa2025-app
  labels:
    app: rqa2025
    component: app
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rqa2025
      component: app
  template:
    metadata:
      labels:
        app: rqa2025
        component: app
        environment: production
    spec:
      serviceAccountName: rqa2025-service-account
      containers:
      - name: rqa2025-app
        image: rqa2025:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: REDIS_URL
          value: "redis://redis-service.rqa2025-data:6379"
        - name: DB_URL
          value: "postgresql://user:password@postgres-service.rqa2025-data:5432/rqa2025"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
