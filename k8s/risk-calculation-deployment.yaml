apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-calculation-service
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: risk-calculation
    version: v2.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: risk-control
      component: risk-calculation
  template:
    metadata:
      labels:
        app: risk-control
        component: risk-calculation
        version: v2.0.0
    spec:
      serviceAccountName: risk-control-service-account
      containers:
      - name: risk-calculation
        image: rqa2025/risk-calculation:v2.0.0
        ports:
        - containerPort: 8081
          name: http
        - containerPort: 9091
          name: metrics
        env:
        - name: RISK_CALCULATION_WORKERS
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: RISK_CALCULATION_WORKERS
        - name: RISK_CALCULATION_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: RISK_CALCULATION_TIMEOUT
        - name: GPU_ENABLED
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: GPU_ENABLED
        - name: CUDA_VISIBLE_DEVICES
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: CUDA_VISIBLE_DEVICES
        - name: CACHE_L1_MAX_SIZE
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: CACHE_L1_MAX_SIZE
        - name: ASYNC_MAX_WORKERS
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: ASYNC_MAX_WORKERS
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: REDIS_HOST
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: risk-control-config
              key: DATABASE_URL
        resources:
          requests:
            cpu: "2000m"
            memory: "4Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        # GPU资源请求
        # resources:
        #   limits:
        #     nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: cache
          mountPath: /app/cache
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: risk-control-logs
      - name: cache
        persistentVolumeClaim:
          claimName: risk-control-cache
      - name: config
        configMap:
          name: risk-control-config
      # GPU设备挂载
      # - name: nvidia-driver
      #   hostPath:
      #     path: /usr/lib/nvidia
      restartPolicy: Always
      # GPU节点亲和性
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #       - matchExpressions:
      #         - key: nvidia.com/gpu.present
      #           operator: In
      #           values:
      #           - "true"

---
apiVersion: v1
kind: Service
metadata:
  name: risk-calculation-service
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: risk-calculation
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  - port: 9091
    targetPort: 9091
    protocol: TCP
    name: metrics
  selector:
    app: risk-control
    component: risk-calculation

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-calculation-hpa
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: risk-calculation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-calculation-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
