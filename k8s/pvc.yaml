apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: risk-control-storage
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: risk-control-logs
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: risk-control-cache
  namespace: rqa2025-risk-control
  labels:
    app: risk-control
    component: cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd