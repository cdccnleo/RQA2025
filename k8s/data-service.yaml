apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: rqa2025
  labels:
    app: rqa2025
    component: data-service
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rqa2025
      component: data-service
  template:
    metadata:
      labels:
        app: rqa2025
        component: data-service
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - data-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: data-service
        image: rqa2025/data-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
          name: http
          protocol: TCP
        - containerPort: 9002
          name: metrics
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: "data-service"
        - name: SERVICE_PORT
          value: "8002"
        - name: METRICS_PORT
          value: "9002"
        envFrom:
        - configMapRef:
            name: rqa2025-env-config
        - secretRef:
            name: rqa2025-secrets
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: data-volume
          mountPath: /app/data
        - name: logs-volume
          mountPath: /app/logs
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            cpu: 4
            memory: 8Gi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 60
      volumes:
      - name: config-volume
        configMap:
          name: rqa2025-config
      - name: data-volume
        persistentVolumeClaim:
          claimName: data-service-pvc
      - name: logs-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: rqa2025
  labels:
    app: rqa2025
    component: data-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9002"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: 8002
    protocol: TCP
    name: http
  - port: 9002
    targetPort: 9002
    protocol: TCP
    name: metrics
  selector:
    app: rqa2025
    component: data-service
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-service-pvc
  namespace: rqa2025
  labels:
    app: rqa2025
    component: data-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-service-hpa
  namespace: rqa2025
  labels:
    app: rqa2025
    component: data-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30