name: Smart Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  analyze-changes:
    runs-on: ubuntu-latest
    outputs:
      build-backend: ${{ steps.changes.outputs.backend }}
      build-frontend: ${{ steps.changes.outputs.frontend }}
      deploy-dev: ${{ steps.changes.outputs.deploy-dev }}
      deploy-prod: ${{ steps.changes.outputs.deploy-prod }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Analyze changed files
      id: changes
      run: |
        # 检查后端代码变更
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(py)$|^src/|^main\.py|^requirements\.txt|^Dockerfile$'; then
          echo "backend=true" >> $GITHUB_OUTPUT
          echo "📦 检测到后端代码变更"
        else
          echo "backend=false" >> $GITHUB_OUTPUT
          echo "ℹ️  后端代码无变更"
        fi

        # 检查前端代码变更
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^web-static/|^frontend/|\.(html|css|js)$'; then
          echo "frontend=true" >> $GITHUB_OUTPUT
          echo "🎨 检测到前端代码变更"
        else
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "ℹ️  前端代码无变更"
        fi

        # 检查部署配置变更
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^k8s/|^docker-compose|\.yml$|\.yaml$'; then
          echo "deploy-dev=true" >> $GITHUB_OUTPUT
          echo "deploy-prod=true" >> $GITHUB_OUTPUT
          echo "🔧 检测到部署配置变更"
        else
          echo "deploy-dev=false" >> $GITHUB_OUTPUT
          echo "deploy-prod=false" >> $GITHUB_OUTPUT
          echo "ℹ️  部署配置无变更"
        fi

  build-backend:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.build-backend == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  update-frontend-config:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.build-frontend == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Update ConfigMap
      run: |
        # 创建或更新前端ConfigMap
        kubectl create configmap web-static-files \
          --from-file=web-static/ \
          --dry-run=client -o yaml | \
          kubectl apply -f -

        kubectl create configmap frontend-nginx-config \
          --from-file=nginx.conf=web-static/nginx.conf \
          --dry-run=client -o yaml | \
          kubectl apply -f -

  deploy-dev:
    needs: [analyze-changes, build-backend, update-frontend-config]
    if: needs.analyze-changes.outputs.deploy-dev == 'true' && (needs.analyze-changes.outputs.build-backend == 'true' || needs.analyze-changes.outputs.build-frontend == 'true')
    runs-on: ubuntu-latest
    environment: development
    steps:
    - name: Deploy to Dev
      run: |
        # 滚动更新开发环境
        kubectl set image deployment/rqa2025-app-dev \
          rqa2025-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          -n rqa2025-dev

        # 等待部署完成
        kubectl rollout status deployment/rqa2025-app-dev -n rqa2025-dev

        # 运行集成测试
        echo "🧪 运行集成测试..."

  deploy-prod:
    needs: [analyze-changes, build-backend, update-frontend-config, deploy-dev]
    if: needs.analyze-changes.outputs.deploy-prod == 'true' && needs.analyze-changes.outputs.build-backend == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Deploy to Prod
      run: |
        # 滚动更新生产环境
        kubectl set image deployment/rqa2025-app \
          rqa2025-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          -n rqa2025-app

        # 等待部署完成
        kubectl rollout status deployment/rqa2025-app -n rqa2025-app

        # 运行冒烟测试
        echo "🚀 运行冒烟测试..."

  notify:
    needs: [deploy-dev, deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Notify
      run: |
        if [ ${{ needs.deploy-dev.result }} == "success" ] && [ ${{ needs.deploy-prod.result }} == "success" ]; then
          echo "✅ 部署成功完成"
        else
          echo "❌ 部署过程中出现问题"
        fi