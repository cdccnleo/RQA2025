# GitHub Actions 环境配置
# 定义测试和生产环境的保护规则和审批流程

# 测试环境配置
staging:
  name: 测试环境
  description: 用于功能测试和集成测试的环境
  protection_rules:
    # 分支保护规则
    required_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews: true
      require_code_owner_reviews: false
      require_last_push_approval: false
      
    # 状态检查要求
    required_status_checks:
      strict: true
      contexts:
        - "代码质量检查"
        - "单元测试"
        - "集成测试"
        - "构建Docker镜像"
        
    # 分支限制
    restrictions:
      users: []
      teams: []
      
    # 其他保护规则
    enforce_admins: false
    allow_force_pushes: false
    allow_deletions: false
    block_creations: false
    required_conversation_resolution: true
    required_signatures: false
    required_linear_history: false
    lock_branch: false
    allow_fork_syncing: true

# 生产环境配置
production:
  name: 生产环境
  description: 生产环境，需要严格的审批流程
  protection_rules:
    # 分支保护规则
    required_reviews:
      required_approving_review_count: 2
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      require_last_push_approval: true
      
    # 状态检查要求
    required_status_checks:
      strict: true
      contexts:
        - "代码质量检查"
        - "单元测试"
        - "集成测试"
        - "构建Docker镜像"
        - "部署到测试环境"
        - "性能测试"
        - "安全扫描"
        
    # 分支限制
    restrictions:
      users: []
      teams:
        - "production-deployers"
        - "devops-team"
        
    # 其他保护规则
    enforce_admins: true
    allow_force_pushes: false
    allow_deletions: false
    block_creations: true
    required_conversation_resolution: true
    required_signatures: true
    required_linear_history: true
    lock_branch: true
    allow_fork_syncing: false
    
  # 部署审批流程
  deployment_branch_policy:
    protected_branches: true
    custom_branch_policies: false
    
  # 环境变量
  environment_variables:
    KUBERNETES_CLUSTER: "rqa2025-production-cluster"
    NAMESPACE: "rqa2025-production"
    REGISTRY: "ghcr.io"
    
  # 环境密钥
  secrets:
    PRODUCTION_KUBECONFIG: "base64编码的kubeconfig文件"
    PRODUCTION_DB_PASSWORD: "生产数据库密码"
    PRODUCTION_API_KEYS: "生产环境API密钥"
    PRODUCTION_TLS_CERT: "生产环境TLS证书"
    PRODUCTION_MONITORING_TOKEN: "生产环境监控令牌"
