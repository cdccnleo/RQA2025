name: Cache System CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/infrastructure/cache/**'
      - 'tests/unit/infrastructure/cache/**'
      - 'docs/architecture/infrastructure_architecture_design.md'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/infrastructure/cache/**'
      - 'tests/unit/infrastructure/cache/**'
      - 'docs/architecture/infrastructure_architecture_design.md'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-xdist
        pip install -r requirements.txt

    - name: Run cache system tests
      run: |
        python -m pytest tests/unit/infrastructure/cache/ \
          --cov=src/infrastructure/cache \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junitxml=test-results.xml \
          -v \
          --tb=short

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          test-results.xml

    - name: Code quality check
      run: |
        python -c "
        import os
        import ast
        
        os.chdir('src/infrastructure/cache')
        
        # 快速质量检查
        total_files = 0
        total_functions = 0
        type_hints = 0
        docstrings = 0
        
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.endswith('.py') and not file.startswith('test_'):
                    filepath = os.path.join(root, file)
                    try:
                        with open(filepath, 'r', encoding='utf-8') as f:
                            content = f.read()
                        
                        total_files += 1
                        tree = ast.parse(content)
                        
                        for node in ast.walk(tree):
                            if isinstance(node, ast.FunctionDef):
                                total_functions += 1
                                has_return_hint = node.returns is not None
                                has_arg_hints = any(arg.annotation for arg in node.args.args)
                                if has_return_hint or has_arg_hints:
                                    type_hints += 1
                                
                                if node.body and isinstance(node.body[0], ast.Expr) and isinstance(node.body[0].value, ast.Str):
                                    docstrings += 1
                                    
                    except:
                        pass
        
        type_ratio = type_hints / max(total_functions, 1) * 100
        doc_ratio = docstrings / max(total_functions, 1) * 100
        
        print(f'类型提示覆盖率: {type_ratio:.1f}%')
        print(f'文档字符串覆盖率: {doc_ratio:.1f}%')
        
        if type_ratio >= 80 and doc_ratio >= 85:
            print('✅ 代码质量标准达到')
            exit(0)
        else:
            print('❌ 代码质量标准未达到')
            exit(1)
        "

  architecture_validation:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Validate Protocol+Mixin Architecture
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        
        print('=== Protocol+Mixin架构验证 ===')
        
        try:
            # 验证核心组件
            from infrastructure.cache.interfaces import ICacheComponent, IBaseComponent
            from infrastructure.cache.core.cache_components import CacheComponent
            from infrastructure.cache.core.mixins import MonitoringMixin, CRUDOperationsMixin
            
            # 测试结构化子类型
            cache_comp = CacheComponent(component_id=1, component_type='memory')
            assert isinstance(cache_comp, ICacheComponent)
            assert isinstance(cache_comp, IBaseComponent)
            
            # 测试Mixin功能
            monitoring = MonitoringMixin(enable_monitoring=True, monitor_interval=5)
            crud = CRUDOperationsMixin()
            
            monitoring.start_monitoring()
            crud.set('test', 'value')
            value = crud.get('test')
            assert value == 'value'
            monitoring.stop_monitoring()
            
            print('✅ Protocol+Mixin架构验证通过')
            
        except Exception as e:
            print(f'❌ 架构验证失败: {e}')
            import traceback
            traceback.print_exc()
            exit(1)
        "

  quality_gate:
    runs-on: ubuntu-latest
    needs: [test, architecture_validation]

    steps:
    - uses: actions/checkout@v4

    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: coverage-report-3.9

    - name: Quality Gate Check
      run: |
        # 检查测试覆盖率
        if [ -f coverage.xml ]; then
          # 解析coverage.xml获取覆盖率
          coverage_percent=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          coverage = root.get('line-rate', '0')
          print(float(coverage) * 100)
          ")
          
          echo \"测试覆盖率: $coverage_percent%\"
          
          if (( $(echo \"$coverage_percent < 80\" | bc -l) )); then
            echo \"❌ 测试覆盖率不足: $coverage_percent% < 80%\"
            exit 1
          fi
        fi

        # 检查测试结果
        if [ -f test-results.xml ]; then
          # 检查是否有失败的测试
          if grep -q '<failure>' test-results.xml; then
            echo \"❌ 有测试失败\"
            exit 1
          fi
          
          if grep -q '<error>' test-results.xml; then
            echo \"❌ 有测试错误\"
            exit 1
          fi
        fi

        echo \"✅ 质量门禁检查通过\"

  deploy_docs:
    runs-on: ubuntu-latest
    needs: quality_gate
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy architecture documentation
      run: |
        echo \"部署架构文档到GitHub Pages\"
        # 这里可以添加文档部署逻辑
        echo \"✅ 文档部署完成\"
