name: RQA2025 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - unit
          - integration
          - e2e

env:
  PYTHON_VERSION: '3.9'
  POETRY_VERSION: '1.8.2'

jobs:
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pytest pytest-cov

      - name: Run code quality checks
        run: |
          # 停止构建如果有Python语法错误或未定义的名称
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          # 退出为零如果所有检查都通过，否则为非零
          flake8 src --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check code formatting with Black
        run: |
          black --check --diff src/ || (echo "Code is not formatted with Black. Run 'black src/' to fix." && exit 1)

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff src/ || (echo "Imports are not sorted. Run 'isort src/' to fix." && exit 1)

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-check
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-json-report

      - name: Run unit tests
        run: |
          python scripts/ci_cd_test_runner.py --parallel --max-workers 4

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./test_logs/*.json
          flags: unit-tests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: test_logs/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-json-report

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ \
            -v --tb=short --maxfail=3 \
            --json-report --json-report-file=test_logs/integration_report.json \
            --cov=src --cov-report=json:test_logs/integration_coverage.json

      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: test_logs/

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-json-report

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ \
            -v --tb=short --maxfail=1 \
            --json-report --json-report-file=test_logs/e2e_report.json

      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results
          path: test_logs/

  quality-gate-check:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v3
        with:
          path: test_logs/

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check quality gates
        run: |
          python -c "
          import json
          import sys
          from pathlib import Path

          # 读取最新的测试报告
          test_logs = Path('test_logs')
          json_files = list(test_logs.glob('*test_report*.json'))

          if not json_files:
              print('❌ 未找到测试报告文件')
              sys.exit(1)

          # 读取最新的报告
          latest_report = max(json_files, key=lambda x: x.stat().st_mtime)
          print(f'📄 读取测试报告: {latest_report}')

          with open(latest_report) as f:
              report = json.load(f)

          summary = report.get('summary', {})
          quality_gates_passed = summary.get('quality_gates_passed', False)
          deployment_ready = summary.get('deployment_ready', False)

          print(f'🔍 质量门禁状态: {\"✅ 通过\" if quality_gates_passed else \"❌ 失败\"}')
          print(f'🚀 部署就绪状态: {\"✅ 是\" if deployment_ready else \"❌ 否\"}')

          if not deployment_ready:
              print('❌ 质量门禁检查失败，系统不可部署')
              sys.exit(1)

          print('✅ 所有质量检查通过，系统可以部署')
          "

      - name: Generate deployment badge
        run: |
          echo '## 🚀 Deployment Status' > deployment_status.md
          echo '' >> deployment_status.md
          echo '| Status | Value |' >> deployment_status.md
          echo '|--------|-------|' >> deployment_status.md
          echo '| Quality Gates | ✅ PASSED |' >> deployment_status.md
          echo '| Deployment Ready | ✅ YES |' >> deployment_status.md
          echo '| Timestamp | $(date) |' >> deployment_status.md

      - name: Upload deployment status
        uses: actions/upload-artifact@v3
        with:
          name: deployment-status
          path: deployment_status.md

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality-gate-check
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 部署到预发布环境..."
          # 这里添加实际的部署命令
          echo "✅ 预发布环境部署完成"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: quality-gate-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 部署到生产环境..."
          # 这里添加实际的部署命令
          echo "✅ 生产环境部署完成"

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    needs: [quality-gate-check, deploy-staging, deploy-production]

    steps:
      - name: Cleanup artifacts
        run: |
          echo "🧹 清理临时文件..."
          # 清理工作可以在这里添加