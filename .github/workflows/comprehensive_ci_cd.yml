name: 🚀 Comprehensive CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天早上8点运行完整测试套件
    - cron: '0 8 * * 1-5'  # 周一到周五

env:
  PYTHON_VERSION: '3.9'
  POETRY_VERSION: '1.7.1'

jobs:
  # 1. 代码质量检查
  quality-check:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy bandit safety pre-commit

    - name: 🔧 Run pre-commit hooks
      run: |
        pre-commit run --all-files --show-diff-on-failure

    - name: 🐍 Type checking with mypy
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional

    - name: 🔒 Security scanning with bandit
      run: |
        bandit -r src/ -f json -o security-report.json || true
        if [ -f security-report.json ]; then
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          jq -r '.results[] | "- \(.filename):\(.line_number): \(.issue_text)"' security-report.json >> $GITHUB_STEP_SUMMARY
        fi

    - name: 📦 Dependency vulnerability check
      run: |
        safety check --output json > safety-report.json || true
        if [ -f safety-report.json ]; then
          echo "## 📦 Dependency Security" >> $GITHUB_STEP_SUMMARY
          jq -r '.vulnerabilities[] | "- \(.package): \(.vulnerability_id) - \(.vulnerable_spec)"' safety-report.json >> $GITHUB_STEP_SUMMARY
        fi

  # 2. 多环境测试矩阵
  test-matrix:
    name: 🧪 Multi-Environment Test Matrix
    needs: quality-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']
        exclude:
          # Windows上只测试主要版本
          - os: windows-latest
            python-version: '3.8'
          - os: windows-latest
            python-version: '3.10'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-mock pytest-asyncio
        pip install coverage[toml]

    - name: 🧪 Run tests with coverage
      run: |
        pytest tests/ \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=70 \
          -x \
          --tb=short \
          --strict-markers \
          --disable-warnings \
          -q \
          --maxfail=5

    - name: 📊 Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: ${{ matrix.os }}_${{ matrix.python-version }}
        name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
        fail_ci_if_error: false

  # 3. 性能基准测试
  performance-test:
    name: ⚡ Performance Benchmark Test
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark

    - name: ⚡ Run performance benchmarks
      run: |
        pytest tests/ \
          -k "benchmark or performance" \
          --benchmark-only \
          --benchmark-json=benchmark-results.json \
          --benchmark-save=benchmark-data \
          --benchmark-compare \
          --benchmark-compare-fail=min:5% \
          -v

    - name: 📈 Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results-${{ github.run_id }}
        path: benchmark-results.json

  # 4. 集成测试
  integration-test:
    name: 🔗 Integration Test Suite
    needs: test-matrix
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: 🗄️ Setup test database
      run: |
        # 如果需要数据库，可以在这里设置
        echo "Setting up test database..."

    - name: 🔗 Run integration tests
      run: |
        pytest tests/integration/ \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=65 \
          --tb=short \
          --disable-warnings \
          -v \
          -x

    - name: 📊 Upload integration test coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: integration
        name: integration-coverage

  # 5. 端到端测试
  e2e-test:
    name: 🌐 End-to-End Test Suite
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[e2e]'))
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest playwright

    - name: 🎭 Install Playwright browsers
      run: playwright install

    - name: 🌐 Run E2E tests
      run: |
        pytest tests/e2e/ \
          --tb=short \
          --disable-warnings \
          -v \
          -x \
          --video=retain-on-failure \
          --screenshot=only-on-failure

  # 6. 安全测试
  security-test:
    name: 🔒 Security Test Suite
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔒 Run security tests
      run: |
        pip install bandit safety
        bandit -r src/ -f json -o bandit-report.json --severity-level medium
        safety check --output json > safety-report.json

    - name: 📤 Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # 7. 部署准备检查
  deployment-check:
    name: 🚀 Deployment Readiness Check
    needs: [test-matrix, integration-test, performance-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: ✅ Run deployment checks
      run: |
        python tests/production_coverage_monitor.py

    - name: 📋 Generate deployment report
      run: |
        echo "## 🚀 Deployment Readiness Report" >> deployment-report.md
        echo "- ✅ Code quality checks passed" >> deployment-report.md
        echo "- ✅ Multi-environment tests passed" >> deployment-report.md
        echo "- ✅ Integration tests passed" >> deployment-report.md
        echo "- ✅ Performance benchmarks passed" >> deployment-report.md
        echo "- ✅ Security scans completed" >> deployment-report.md
        echo "- 📊 Coverage reports generated" >> deployment-report.md

    - name: 📤 Upload deployment report
      uses: actions/upload-artifact@v3
      with:
        name: deployment-report
        path: deployment-report.md

  # 8. 部署到暂存环境
  deploy-staging:
    name: 🎭 Deploy to Staging
    needs: deployment-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🚀 Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # 这里可以添加实际的部署命令
        echo "✅ Staging deployment completed"

  # 9. 生产环境部署（需要手动触发）
  deploy-production:
    name: 🎯 Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🚀 Deploy to production
      run: |
        echo "🚨 Starting production deployment..."
        # 这里可以添加实际的生产部署命令
        echo "✅ Production deployment completed"

  # 10. 监控和报告
  monitoring-report:
    name: 📊 Monitoring & Reporting
    needs: [quality-check, test-matrix, integration-test, performance-test, security-test]
    runs-on: ubuntu-latest
    if: always()  # 即使前面有失败也运行
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📊 Generate comprehensive report
      run: |
        echo "# 📊 RQA2025 CI/CD Pipeline Report" >> pipeline-report.md
        echo "" >> pipeline-report.md
        echo "## 📅 Pipeline Execution Summary" >> pipeline-report.md
        echo "- **Date**: $(date)" >> pipeline-report.md
        echo "- **Commit**: ${{ github.sha }}" >> pipeline-report.md
        echo "- **Branch**: ${{ github.ref }}" >> pipeline-report.md
        echo "- **Triggered by**: ${{ github.actor }}" >> pipeline-report.md
        echo "" >> pipeline-report.md

        echo "## ✅ Job Status Summary" >> pipeline-report.md
        echo "| Job | Status | Duration |" >> pipeline-report.md
        echo "|-----|--------|----------|" >> pipeline-report.md
        echo "| 🔍 Code Quality | ${{ needs.quality-check.result }} | - |" >> pipeline-report.md
        echo "| 🧪 Test Matrix | ${{ needs.test-matrix.result }} | - |" >> pipeline-report.md
        echo "| ⚡ Performance | ${{ needs.performance-test.result }} | - |" >> pipeline-report.md
        echo "| 🔗 Integration | ${{ needs.integration-test.result }} | - |" >> pipeline-report.md
        echo "| 🔒 Security | ${{ needs.security-test.result }} | - |" >> pipeline-report.md
        echo "" >> pipeline-report.md

        echo "## 📈 Quality Metrics" >> pipeline-report.md
        echo "- **Test Coverage**: See coverage reports" >> pipeline-report.md
        echo "- **Performance**: See benchmark results" >> pipeline-report.md
        echo "- **Security**: See security scan reports" >> pipeline-report.md
        echo "" >> pipeline-report.md

        echo "## 🚀 Deployment Status" >> pipeline-report.md
        echo "- **Staging**: ${{ needs.deploy-staging.result || 'Not executed' }}" >> pipeline-report.md
        echo "- **Production**: ${{ needs.deploy-production.result || 'Not executed' }}" >> pipeline-report.md
        echo "" >> pipeline-report.md

        echo "## 📋 Recommendations" >> pipeline-report.md
        if [ "${{ needs.quality-check.result }}" = "failure" ]; then
          echo "- ⚠️ Fix code quality issues before merging" >> pipeline-report.md
        fi
        if [ "${{ needs.test-matrix.result }}" = "failure" ]; then
          echo "- ⚠️ Fix test failures in test matrix" >> pipeline-report.md
        fi
        if [ "${{ needs.integration-test.result }}" = "failure" ]; then
          echo "- ⚠️ Fix integration test failures" >> pipeline-report.md
        fi
        echo "- ✅ Pipeline completed successfully" >> pipeline-report.md

    - name: 📤 Upload pipeline report
      uses: actions/upload-artifact@v3
      with:
        name: pipeline-report-${{ github.run_id }}
        path: pipeline-report.md

    - name: 📧 Send notification (if configured)
      if: always()
      run: |
        # 这里可以添加邮件通知或其他通知机制
        echo "Pipeline completed with status: ${{ job.status }}"
