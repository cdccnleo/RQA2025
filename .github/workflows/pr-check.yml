name: Pull Request Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  pr-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-xdist pytest-html

    - name: Run core tests
      run: |
        python tests/framework/test_runner.py core --verbose

    - name: Run data layer tests
      run: |
        python tests/framework/test_runner.py data --verbose

    - name: Run boundary condition tests
      run: |
        python -m pytest tests/test_boundary_conditions.py -v

    - name: Generate test report
      if: always()
      run: |
        echo "Test results available in test_logs/ directory"
        ls -la test_logs/
