name: Comprehensive Quality Assurance

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天早上8点运行
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: '检查类型'
        required: false
        default: 'full'
        type: choice
        options:
        - full
        - quick
        - critical

env:
  PYTHON_VERSION: '3.8'

jobs:
  # 1. 代码质量检查
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 获取完整历史用于趋势分析

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage pytest pytest-cov pytest-xdist
        # 安装项目依赖（如果有requirements.txt）
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Determine check scope
      id: check_scope
      run: |
        if [ "${{ github.event.inputs.check_type }}" == "quick" ]; then
          echo "scope=src/infrastructure/cache" >> $GITHUB_OUTPUT
          echo "preset=normal" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.inputs.check_type }}" == "critical" ]; then
          echo "scope=src/" >> $GITHUB_OUTPUT
          echo "preset=strict" >> $GITHUB_OUTPUT
        else
          echo "scope=src/" >> $GITHUB_OUTPUT
          echo "preset=quality" >> $GITHUB_OUTPUT
        fi

    - name: Run Automated Quality Check
      run: |
        python scripts/automated_quality_check.py \
          --output quality_report.json \
          ${{ steps.check_scope.outputs.scope }}

    - name: Upload Quality Report
      uses: actions/upload-artifact@v3
      with:
        name: quality-report
        path: quality_report.json

    - name: Quality Gate Check
      id: quality_gates
      run: |
        # 检查质量门禁是否通过
        python -c "
        import json
        with open('quality_report.json') as f:
            report = json.load(f)
        gates = report.get('quality_gates', {})
        overall_passed = gates.get('overall_passed', False)

        if overall_passed:
            print('✅ All quality gates passed')
            print('gates_passed=true')
        else:
            print('❌ Quality gates failed')
            blocking_gates = gates.get('blocking_gates', [])
            print(f'Failed gates: {blocking_gates}')
            print('gates_passed=false')
            exit(1)
        "

    - name: Generate Trend Report
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: |
        python scripts/generate_quality_trend_report.py \
          --days 30 \
          --output quality_trend_report.json

    - name: Upload Trend Report
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v3
      with:
        name: quality-trend-report
        path: quality_trend_report.json

  # 2. 测试执行
  test-execution:
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage pytest pytest-cov pytest-xdist
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Create test directory
      run: mkdir -p tests/unit tests/integration

    - name: Run Quality Tests
      run: |
        python scripts/run_quality_tests.py \
          --output quality_test_report.json

    - name: Upload Test Reports
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: |
          quality_test_report.json
          coverage_reports/

    - name: Test Results Check
      run: |
        python -c "
        import json
        with open('quality_test_report.json') as f:
            report = json.load(f)
        summary = report.get('summary', {})
        if summary.get('overall_success', False):
            print('✅ All tests passed')
        else:
            print('❌ Some tests failed')
            exit(1)
        "

  # 3. 安全检查
  security-check:
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Bandit Security Linter
      run: |
        pip install bandit
        bandit -r src/ -f json -o security_report.json || true

    - name: Upload Security Report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security_report.json

  # 4. 性能监控
  performance-monitoring:
    runs-on: ubuntu-latest
    needs: [quality-check, test-execution]
    if: github.event_name == 'schedule'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Performance Benchmark
      run: |
        python -c "
        import time
        import psutil
        import os

        # 简单的性能基准测试
        start_time = time.time()
        start_memory = psutil.Process(os.getpid()).memory_info().rss / 1024 / 1024

        # 运行质量检查作为基准
        os.system('python scripts/automated_quality_check.py --quiet src/ > /dev/null 2>&1')

        end_time = time.time()
        end_memory = psutil.Process(os.getpid()).memory_info().rss / 1024 / 1024

        execution_time = end_time - start_time
        memory_usage = end_memory - start_memory

        with open('performance_metrics.json', 'w') as f:
            import json
            json.dump({
                'execution_time_seconds': execution_time,
                'memory_usage_mb': memory_usage,
                'timestamp': time.time()
            }, f, indent=2)
        "

    - name: Upload Performance Metrics
      uses: actions/upload-artifact@v3
      with:
        name: performance-metrics
        path: performance_metrics.json

  # 5. 报告汇总与通知
  reporting:
    runs-on: ubuntu-latest
    needs: [quality-check, test-execution, security-check]
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Generate Comprehensive Report
      run: |
        python -c "
        import json
        import os
        from datetime import datetime

        # 收集所有报告
        reports = {}

        # 查找所有下载的报告文件
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.endswith('.json'):
                    file_path = os.path.join(root, file)
                    try:
                        with open(file_path, 'r') as f:
                            data = json.load(f)
                        reports[file] = data
                    except:
                        pass

        # 生成综合报告
        comprehensive_report = {
            'timestamp': datetime.now().isoformat(),
            'workflow_run': os.environ.get('GITHUB_RUN_ID', 'unknown'),
            'commit_sha': os.environ.get('GITHUB_SHA', 'unknown'),
            'reports': reports,
            'summary': {
                'quality_gates_passed': 'quality_gates' in reports.get('quality-report', {}).get('quality_gates', {}),
                'tests_passed': 'summary' in reports.get('quality_test_report.json', {}) and reports['quality_test_report.json']['summary'].get('overall_success', False),
                'security_issues': len(reports.get('security_report.json', {}).get('results', [])),
                'total_reports': len(reports)
            }
        }

        with open('comprehensive_report.json', 'w', encoding='utf-8') as f:
            json.dump(comprehensive_report, f, indent=2, ensure_ascii=False)
        "

    - name: Upload Comprehensive Report
      uses: actions/upload-artifact@v3
      with:
        name: comprehensive-report
        path: comprehensive_report.json

    - name: Create Issue on Failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const title = `🚨 Quality Assurance Failed - ${new Date().toISOString().split('T')[0]}`;
          const body = `
          ## Quality Assurance Failure

          The automated quality assurance pipeline has failed. Please review the attached reports for details.

          ### Failed Checks:
          - ❌ Quality Gates
          - ❌ Test Execution
          - ❌ Security Checks

          ### Next Steps:
          1. Review the comprehensive report
          2. Address failing quality gates
          3. Fix any test failures
          4. Resolve security issues

          ---
          *Generated by Quality Assurance Pipeline*
          `;

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['quality-assurance', 'bug']
          });

    - name: Slack Notification
      if: always()
      run: |
        # 这里可以配置Slack通知
        # 如果配置了SLACK_WEBHOOK_URL环境变量
        echo "Quality assurance workflow completed"

  # 6. 部署门禁（仅在main分支且所有检查通过时）
  deploy-gate:
    runs-on: ubuntu-latest
    needs: [quality-check, test-execution, security-check, reporting]
    if: github.ref == 'refs/heads/main' && needs.quality-check.result == 'success' && needs.test-execution.result == 'success' && needs.security-check.result == 'success'

    steps:
    - name: Deploy Gate Check
      run: |
        echo "✅ All quality checks passed - Ready for deployment"
        echo "🚀 Deployment can proceed"

    - name: Tag Release
      if: github.event_name == 'push'
      run: |
        # 如果需要自动打标签
        echo "Tagging release candidate"