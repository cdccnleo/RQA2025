name: RQA2025 监控模块集成测试和部署

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/infrastructure/monitoring/**'
      - 'tests/**'
      - '.github/workflows/monitoring_integration_ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/infrastructure/monitoring/**'
      - 'tests/**'
      - '.github/workflows/monitoring_integration_ci.yml'
  schedule:
    # 每天凌晨2点运行完整测试
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.9'
  POETRY_VERSION: '1.4.0'

jobs:
  # 单元测试
  unit-tests:
    name: 单元测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 缓存 pip 依赖
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist

    - name: 运行监控模块单元测试
      run: |
        cd src/infrastructure/monitoring
        python -m pytest ../../tests/unit/infrastructure/monitoring/ \
          --cov=. \
          --cov-report=xml \
          --cov-report=html \
          -n auto \
          --tb=short

    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unit-tests
        name: monitoring-unit-tests

  # 集成测试
  integration-tests:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      # Redis 服务用于缓存测试
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          postgresql postgresql-contrib \
          redis-server \
          sqlite3

    - name: 启动 PostgreSQL
      run: |
        sudo systemctl start postgresql
        sudo -u postgres createuser --createdb --superuser testuser
        sudo -u postgres psql -c "ALTER USER testuser PASSWORD 'testpass';"
        sudo -u postgres createdb -O testuser testdb

    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-xdist psutil

    - name: 运行集成测试框架
      run: |
        cd src/infrastructure/monitoring/core
        python integration_test_framework.py
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        REDIS_URL: redis://localhost:6379/0

    - name: 运行监控模块集成测试
      run: |
        python -m pytest tests/integration/infrastructure/monitoring/ \
          --tb=short \
          --durations=10 \
          -v
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        REDIS_URL: redis://localhost:6379/0

    - name: 生成集成测试报告
      run: |
        python -m pytest tests/integration/infrastructure/monitoring/ \
          --html=integration_test_report.html \
          --self-contained-html

    - name: 上传集成测试报告
      uses: actions/upload-artifact@v3
      with:
        name: integration-test-report
        path: integration_test_report.html

  # 性能测试
  performance-tests:
    name: 性能测试
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark psutil memory_profiler

    - name: 运行性能基准测试
      run: |
        python -m pytest tests/unit/infrastructure/monitoring/ \
          --benchmark-only \
          --benchmark-save=performance_baseline \
          --benchmark-save-data \
          -k "benchmark"

    - name: 运行内存分析测试
      run: |
        python -c "
        from src.infrastructure.monitoring.core.integration_test_framework import PerformanceBenchmarkTest
        import unittest
        suite = unittest.TestSuite()
        suite.addTest(PerformanceBenchmarkTest('test_memory_usage_stability'))
        runner = unittest.TextTestRunner(verbosity=2)
        result = runner.run(suite)
        "

    - name: 上传性能测试结果
      uses: actions/upload-artifact@v3
      with:
        name: performance-test-results
        path: .benchmarks/

  # 代码质量检查
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 安装代码质量工具
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy bandit safety

    - name: 运行代码格式检查
      run: |
        black --check --diff src/infrastructure/monitoring/
        isort --check-only --diff src/infrastructure/monitoring/

    - name: 运行静态类型检查
      run: |
        mypy src/infrastructure/monitoring/ \
          --ignore-missing-imports \
          --no-strict-optional

    - name: 运行安全检查
      run: |
        bandit -r src/infrastructure/monitoring/ \
          -f json \
          -o security_report.json \
          --exclude-dir tests

    - name: 运行依赖安全检查
      run: |
        safety check --output json > dependency_security.json

    - name: 上传安全检查报告
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          security_report.json
          dependency_security.json

  # 部署到测试环境
  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: [integration-tests, performance-tests, code-quality]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: 配置 SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

    - name: 部署到测试环境
      run: |
        rsync -avz --delete \
          --exclude='.git' \
          --exclude='tests' \
          --exclude='.github' \
          --exclude='docs' \
          ./ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/rqa2025/

    - name: 在测试环境运行健康检查
      run: |
        ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          cd /opt/rqa2025
          source venv/bin/activate
          python -c "
          from src.infrastructure.monitoring.core.component_registry import global_component_registry
          from src.infrastructure.monitoring.components.monitoring_coordinator import MonitoringCoordinator

          # 注册并启动核心组件
          global_component_registry.register_component(
              'monitoring_coordinator',
              MonitoringCoordinator
          )
          global_component_registry.start_component('monitoring_coordinator')

          # 检查系统健康状态
          health = global_component_registry.get_system_health()
          print(f'系统健康状态: {health}')

          if health['overall_health'] == 'healthy':
              print('✅ 部署成功，系统运行正常')
              exit(0)
          else:
              print('❌ 部署失败，系统异常')
              exit(1)
          "
        EOF

  # 部署到生产环境
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [integration-tests, performance-tests, code-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: 配置 SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

    - name: 创建部署包
      run: |
        tar -czf rqa2025-monitoring-${{ github.sha }}.tar.gz \
          --exclude='.git' \
          --exclude='tests' \
          --exclude='.github' \
          --exclude='docs' \
          --exclude='*.pyc' \
          --exclude='__pycache__' \
          .

    - name: 上传部署包
      run: |
        scp rqa2025-monitoring-${{ github.sha }}.tar.gz \
          ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/

    - name: 部署到生产环境
      run: |
        ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << EOF
          set -e

          # 备份当前版本
          if [ -d /opt/rqa2025 ]; then
            timestamp=$(date +%Y%m%d_%H%M%S)
            mv /opt/rqa2025 /opt/rqa2025_backup_$timestamp
          fi

          # 解压新版本
          cd /opt
          tar -xzf /tmp/rqa2025-monitoring-${{ github.sha }}.tar.gz
          mv rqa2025-monitoring-${{ github.sha }} rqa2025

          # 安装依赖
          cd /opt/rqa2025
          source venv/bin/activate
          pip install -r requirements.txt

          # 运行数据库迁移（如需要）
          # python manage.py migrate

          # 重启服务
          sudo systemctl restart rqa2025-monitoring

          # 等待服务启动
          sleep 30

          # 健康检查
          python -c "
          from src.infrastructure.monitoring.core.component_registry import global_component_registry
          health = global_component_registry.get_system_health()
          if health['overall_health'] == 'healthy':
              print('✅ 生产环境部署成功')
          else:
              print('❌ 生产环境部署失败')
              exit(1)
          "
        EOF

    - name: 清理部署包
      run: |
        ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} \
          rm /tmp/rqa2025-monitoring-${{ github.sha }}.tar.gz

  # 生成发布说明
  release-notes:
    name: 生成发布说明
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 生成变更日志
      run: |
        # 获取最近的提交信息
        git log --oneline --since="1 week ago" -- src/infrastructure/monitoring/ > recent_changes.txt

        # 分析变更类型
        features=$(grep -c "feat:" recent_changes.txt || echo "0")
        fixes=$(grep -c "fix:" recent_changes.txt || echo "0")
        docs=$(grep -c "docs:" recent_changes.txt || echo "0")

        # 生成发布说明
        cat > release_notes.md << EOF
        # RQA2025 监控模块发布说明

        ## 构建信息
        - 构建时间: $(date)
        - 提交: ${{ github.sha }}
        - 分支: ${{ github.ref }}

        ## 测试结果
        - ✅ 单元测试: 通过
        - ✅ 集成测试: 通过
        - ✅ 性能测试: 通过

        ## 变更统计
        - 新功能: $features
        - 修复: $fixes
        - 文档: $docs

        ## 最近变更
        $(cat recent_changes.txt)

        ## 系统健康状态
        - 部署环境: ${{ github.ref == 'refs/heads/main' && '生产环境' || '测试环境' }}
        - 状态: 正常运行
        EOF

    - name: 上传发布说明
      uses: actions/upload-artifact@v3
      with:
        name: release-notes
        path: release_notes.md
