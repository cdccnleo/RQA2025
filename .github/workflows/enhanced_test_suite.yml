name: Enhanced Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天早上8点运行完整测试套件
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      test_layers:
        description: 'Test layers to run (comma-separated)'
        required: false
        default: 'unit,integration,e2e'
      run_quality_check:
        description: 'Run quality assessment'
        type: boolean
        default: true
      run_performance_benchmark:
        description: 'Run performance benchmarks'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, "3.10", "3.11"]

    services:
      # PostgreSQL服务
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rqa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis服务
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        # 安装测试增强依赖
        pip install pytest-xdist pytest-cov pytest-benchmark psutil

    - name: Set up test environment
      run: |
        # 创建测试目录
        mkdir -p test_logs

        # 设置测试环境变量
        echo "TEST_DB_HOST=localhost" >> $GITHUB_ENV
        echo "TEST_DB_PORT=5432" >> $GITHUB_ENV
        echo "TEST_REDIS_HOST=localhost" >> $GITHUB_ENV
        echo "TEST_REDIS_PORT=6379" >> $GITHUB_ENV
        echo "TEST_ENVIRONMENT=ci" >> $GITHUB_ENV

    - name: Run Enhanced Test Suite
      run: |
        # 解析输入参数
        TEST_LAYERS="${{ github.event.inputs.test_layers || 'unit,integration,e2e' }}"
        RUN_QUALITY="${{ github.event.inputs.run_quality_check != false }}"
        RUN_PERFORMANCE="${{ github.event.inputs.run_performance_benchmark == true }}"

        # 构建命令
        CMD="python tests/run_enhanced_test_suite.py --layers $TEST_LAYERS"

        if [ "$RUN_QUALITY" = "true" ]; then
          CMD="$CMD --quality-check"
        fi

        if [ "$RUN_PERFORMANCE" = "true" ]; then
          CMD="$CMD --performance-benchmark"
        fi

        echo "Running: $CMD"
        eval $CMD

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test_logs/
          coverage.xml
          *.xml
        retention-days: 30

    - name: Generate Test Summary
      if: always()
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # 检查测试报告是否存在
        if [ -f "test_logs/enhanced_test_suite_report.md" ]; then
          echo "✅ Enhanced test suite completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Report Preview" >> $GITHUB_STEP_SUMMARY
          head -20 test_logs/enhanced_test_suite_report.md >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Test report not found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Check Test Results
      if: always()
      run: |
        # 检查是否有测试失败
        if [ -f "test_logs/enhanced_test_suite_report.md" ]; then
          if grep -q "失败.*[1-9]" test_logs/enhanced_test_suite_report.md; then
            echo "❌ Tests failed - please check the detailed report"
            exit 1
          else
            echo "✅ All tests passed"
          fi
        else
          echo "⚠️ Test report not generated"
          exit 1
        fi

  quality-gate:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: test-results-3.9
        path: test_logs/

    - name: Quality Gate Check
      run: |
        # 检查质量阈值
        if [ -f "test_logs/enhanced_test_suite_report.md" ]; then
          # 检查覆盖率
          if ! grep -q "代码覆盖率.*[8-9][0-9]\.[0-9]%" test_logs/enhanced_test_suite_report.md; then
            echo "❌ Code coverage below 80%"
            exit 1
          fi

          # 检查测试成功率
          if grep -q "失败.*[1-9]" test_logs/enhanced_test_suite_report.md; then
            echo "❌ Test failures detected"
            exit 1
          fi

          # 检查质量状态
          if grep -q "质量状态.*❌\|质量状态.*⚠️" test_logs/enhanced_test_suite_report.md; then
            echo "❌ Quality standards not met"
            exit 1
          fi

          echo "✅ Quality gate passed"
        else
          echo "❌ Quality report not found"
          exit 1
        fi

  performance-regression-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.event.schedule != '' || github.event.inputs.run_performance_benchmark == true

    steps:
    - uses: actions/checkout@v4

    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: test-results-3.9
        path: test_logs/

    - name: Performance Regression Check
      run: |
        # 检查性能基准
        if [ -f "test_logs/performance_benchmark_report.md" ]; then
          if grep -q "fail\|warning" test_logs/performance_benchmark_report.md; then
            echo "⚠️ Performance regression detected"
            # 在这里可以添加通知逻辑
          else
            echo "✅ No performance regression"
          fi
        else
          echo "ℹ️ Performance benchmark report not available"
        fi

  notify:
    runs-on: ubuntu-latest
    needs: [test, quality-gate]
    if: always()

    steps:
    - name: Notify Test Results
      run: |
        if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.quality-gate.result }}" = "success" ]; then
          echo "🎉 All tests passed and quality standards met!"
        elif [ "${{ needs.test.result }}" = "failure" ]; then
          echo "❌ Tests failed - check the test report for details"
        elif [ "${{ needs.quality-gate.result }}" = "failure" ]; then
          echo "⚠️ Quality standards not met - review code quality"
        fi
