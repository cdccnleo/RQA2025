name: Test Quality CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天早上8点运行质量监控
    - cron: '0 8 * * *'

jobs:
  test-quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-json-report

    - name: Run Test Quality Monitor
      run: |
        python scripts/test_quality_monitor.py --run-tests --check-gates
      env:
        PYTHONPATH: ${{ github.workspace }}/src

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ github.run_number }}
        path: |
          test_logs/
          test_results.json
          coverage.json

    - name: Quality Gate Check
      run: |
        if [ ! -f "test_logs/quality_gate_passed" ]; then
          echo "❌ Quality gates failed"
          exit 1
        fi

  layer-coverage-audit:
    runs-on: ubuntu-latest
    needs: test-quality-check

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-json-report

    - name: Run Layer Coverage Audit
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from scripts.layer_coverage_audit import LayerCoverageAudit
        auditor = LayerCoverageAudit()
        results = auditor.audit_all_layers()
        auditor.generate_report(results)
        print('✅ Layer coverage audit completed')
        "

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-reports-${{ github.run_number }}
        path: test_logs/coverage_reports/

  regression-test:
    runs-on: ubuntu-latest
    needs: test-quality-check
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[regression]')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-json-report

    - name: Run Full Regression Test
      run: |
        python -m pytest tests/ --tb=short --maxfail=100 --durations=30 \
          --cov=src --cov-report=html:test_logs/coverage_reports \
          --cov-report=xml:test_logs/coverage_reports/coverage.xml \
          --junitxml=test_logs/test_results.xml \
          -n auto --dist=loadscope

    - name: Upload regression results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: regression-results-${{ github.run_number }}
        path: |
          test_logs/
          htmlcov/

  deploy-readiness-check:
    runs-on: ubuntu-latest
    needs: [test-quality-check, layer-coverage-audit]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check Deploy Readiness
      run: |
        # 检查质量门禁
        if [ ! -f "test_logs/quality_gate_passed" ]; then
          echo "❌ Quality gates not passed"
          exit 1
        fi

        # 检查覆盖率报告
        if [ ! -f "test_logs/coverage_reports/layer_coverage_audit_report.md" ]; then
          echo "❌ Coverage audit report not found"
          exit 1
        fi

        # 检查测试通过率
        if [ -f "test_results.json" ]; then
          PASSED=$(python -c "import json; print(json.load(open('test_results.json'))['summary']['passed'])")
          TOTAL=$(python -c "import json; print(json.load(open('test_results.json'))['summary']['num_tests'])")
          RATE=$((PASSED * 100 / TOTAL))

          if [ $RATE -lt 85 ]; then
            echo "❌ Test pass rate too low: ${RATE}%"
            exit 1
          fi
        fi

        echo "✅ System ready for deployment"
        echo "DEPLOY_READY=true" >> $GITHUB_ENV

    - name: Create Deployment Badge
      if: env.DEPLOY_READY == 'true'
      run: |
        echo "🏆 System deployment ready!" > deploy_badge.md
        echo "✅ All quality gates passed" >> deploy_badge.md
        echo "✅ Test coverage sufficient" >> deploy_badge.md
        echo "✅ No critical issues found" >> deploy_badge.md

    - name: Upload deploy badge
      if: env.DEPLOY_READY == 'true'
      uses: actions/upload-artifact@v3
      with:
        name: deploy-readiness-badge
        path: deploy_badge.md
