name: 数据真实性检查

on:
  pull_request:
    paths:
      - 'src/gateway/web/**/*.py'
      - 'web-static/**/*.html'
  push:
    branches:
      - main
      - develop

jobs:
  check-mock-data:
    name: 检查模拟数据使用
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 运行数据来源审计
        run: |
          python scripts/audit_dashboard_data_sources.py
      
      - name: 检查审计报告
        run: |
          if [ -f docs/dashboard_data_authenticity_report.json ]; then
            python -c "
            import json
            with open('docs/dashboard_data_authenticity_report.json', 'r', encoding='utf-8') as f:
                report = json.load(f)
            summary = report['summary']
            if summary['total_mock_calls'] > 0:
                print(f'⚠️ 发现 {summary[\"total_mock_calls\"]} 个模拟数据函数调用')
                print('请检查并移除所有模拟数据降级机制')
                exit(1)
            if summary['api_routes_with_mock_fallback'] > 0:
                print(f'⚠️ 发现 {summary[\"api_routes_with_mock_fallback\"]} 个API路由有模拟数据降级')
                print('请移除所有API路由中的模拟数据降级机制')
                exit(1)
            print('✅ 未发现模拟数据使用')
            "
          else
            echo "审计报告未生成"
            exit(1
          fi
      
      - name: 检查代码中的模拟数据标识
        run: |
          # 检查是否有新的模拟数据函数调用
          if grep -r "_get_mock_" src/gateway/web/*_routes.py; then
            echo "❌ 发现API路由中使用模拟数据函数"
            echo "量化交易系统要求：不使用模拟数据，请移除所有 _get_mock_* 函数调用"
            exit 1
          fi
          
          # 检查是否有硬编码的性能估算
          if grep -r "base_latency\s*=\s*[0-9]" src/gateway/web/*.py; then
            echo "❌ 发现硬编码的性能估算值"
            echo "量化交易系统要求：使用真实监控数据，请移除所有硬编码估算"
            exit 1
          fi
          
          echo "✅ 未发现新的模拟数据使用"
      
      - name: 上传审计报告
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: data-authenticity-report
          path: |
            docs/dashboard_data_authenticity_report.md
            docs/dashboard_data_authenticity_report.json

  test-data-authenticity:
    name: 数据真实性测试
    runs-on: ubuntu-latest
    needs: check-mock-data
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rqa2025
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest requests
      
      - name: 启动后端服务
        run: |
          # 这里应该启动实际的后端服务
          # 暂时跳过，因为需要完整的服务环境
          echo "后端服务启动（需要完整环境）"
        continue-on-error: true
      
      - name: 运行数据真实性测试
        run: |
          pytest tests/dashboard_verification/test_data_authenticity.py -v || true
        continue-on-error: true
      
      - name: 运行业务流程数据流测试
        run: |
          pytest tests/dashboard_verification/test_business_process_data_flow.py -v || true
        continue-on-error: true

