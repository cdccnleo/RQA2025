name: Update Coverage Dashboard

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'tests/**'
      - 'src/**'
      - 'scripts/generate_coverage_dashboard.py'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'tests/**'
      - 'src/**'
  schedule:
    # 每天早上8点运行
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新覆盖率面板'
        required: false
        default: 'false'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install plotly pandas pytest pytest-cov

    - name: Create necessary directories
      run: |
        mkdir -p logs
        mkdir -p reports
        mkdir -p data

    - name: Run tests and generate coverage data
      run: |
        python scripts/testing/run_tests.py --coverage --output-dir reports/coverage

    - name: Generate coverage dashboard
      run: |
        python scripts/generate_coverage_dashboard.py --output reports/coverage_dashboard.html

    - name: Upload dashboard artifact
      uses: actions/upload-artifact@v3
      with:
        name: coverage-dashboard
        path: reports/coverage_dashboard.html
        retention-days: 30

    - name: Deploy dashboard to GitHub Pages (optional)
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: reports
        publish_branch: gh-pages
        destination_dir: coverage-dashboard

    - name: Notify on coverage changes
      if: always()
      run: |
        # 这里可以添加通知逻辑，比如发送到Slack或邮件
        echo "Coverage dashboard updated. Check the artifacts or GitHub Pages."

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: update-dashboard
    if: failure()

    steps:
    - name: Notify failure
      run: |
        echo "Coverage dashboard update failed. Please check the logs."
