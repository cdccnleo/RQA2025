name: Data Layer CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/data/**'
      - 'tests/**'
      - 'docs/data/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/data/**'
      - 'tests/**'
      - 'docs/data/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run linting
      run: |
        flake8 src/data tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/data tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --tb=short --junitxml=test-reports/unit-results.xml

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v --tb=short --junitxml=test-reports/integration-results.xml

    - name: Run performance tests
      run: |
        python -m pytest tests/performance/ -v --tb=short --junitxml=test-reports/performance-results.xml

    - name: Run API documentation tests
      run: |
        python -m pytest tests/api/ -v --tb=short --junitxml=test-reports/api-results.xml

    - name: Generate coverage report
      run: |
        pip install coverage
        coverage run --source=src/data -m pytest tests/ -v
        coverage report --fail-under=85
        coverage html -d test-reports/coverage-html
        coverage xml -o test-reports/coverage.xml

    - name: Run test automation framework
      run: |
        python tests/automation/test_automation_framework.py --report-only

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports-python${{ matrix.python-version }}
        path: |
          test-reports/
          test_reports/

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run performance benchmarks
      run: |
        mkdir -p benchmarks
        python -m pytest tests/performance/test_performance_benchmarks.py -v --tb=short

    - name: Store benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: benchmarks/

  security:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run security checks
      run: |
        pip install bandit[sarif]
        bandit -r src/data -f sarif -o security-report.sarif || true

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: security-report.sarif

  deploy:
    runs-on: ubuntu-latest
    needs: [test, benchmark, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build package
      run: |
        python setup.py sdist bdist_wheel

    - name: Publish to TestPyPI
      if: github.event_name == 'push' && contains(github.event.head_commit.modified, 'src/')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        repository_url: https://test.pypi.org/legacy/

  notify:
    runs-on: ubuntu-latest
    needs: [test, benchmark, security, deploy]
    if: always()

    steps:
    - name: Send notification
      run: |
        echo "CI/CD Pipeline completed"
        echo "Test status: ${{ needs.test.result }}"
        echo "Benchmark status: ${{ needs.benchmark.result }}"
        echo "Security status: ${{ needs.security.result }}"
        echo "Deploy status: ${{ needs.deploy.result }}"

    - name: Create summary comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const testResult = '${{ needs.test.result }}';
          const benchmarkResult = '${{ needs.benchmark.result }}';
          const securityResult = '${{ needs.security.result }}';

          const summary = `## 🔍 CI/CD Pipeline Results

          ### ✅ Test Results
          - **Unit Tests**: ${{ testResult }}
          - **Integration Tests**: ${{ testResult }}
          - **Performance Tests**: ${{ testResult }}
          - **API Tests**: ${{ testResult }}

          ### 📊 Benchmarks
          - **Status**: ${{ benchmarkResult }}

          ### 🔒 Security
          - **Status**: ${{ securityResult }}

          ### 🚀 Deployment
          - **Status**: ${{ needs.deploy.result || 'skipped' }}

          ---
          *Generated by RQA2025 Data Layer CI/CD Pipeline*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
