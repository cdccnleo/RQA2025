jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run performance tests
      run: pytest tests/unit/distributed/test_performance_pressure_benchmark.py -v
        --durations=0
  quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install quality tools
      run: pip install flake8 black isort mypy bandit safety
    - name: Run code quality checks
      run: flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503
    - name: Run type checking
      run: mypy src/ --ignore-missing-imports
    - name: Run security checks
      run: bandit -r src/ -f json -o security_report.json
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run tests with coverage
      run: pytest --cov=src --cov-report=xml --cov-report=term-missing -n auto
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
    strategy:
      matrix:
        python-version:
        - '3.8'
        - '3.9'
        - '3.10'
name: RQA2025 Quality Assurance
'on':
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
    - develop
