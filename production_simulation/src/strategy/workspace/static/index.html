<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQA2025 策略工作空间</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s;
        }

        .sidebar .nav-link:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .status-healthy {
            color: #28a745;
        }

        .status-unhealthy {
            color: #dc3545;
        }

        .status-warning {
            color: #ffc107;
        }

        .loading-spinner {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <nav class="sidebar col-md-2 d-none d-md-block">
        <div class="sidebar-sticky">
            <div class="p-3">
                <h5 class="text-center mb-4">
                    <i class="fas fa-chart-line me-2"></i>
                    RQA2025
                </h5>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#dashboard" onclick="showSection('dashboard')">
                            <i class="fas fa-tachometer-alt me-2"></i>
                            仪表板
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#strategies" onclick="showSection('strategies')">
                            <i class="fas fa-brain me-2"></i>
                            策略管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#backtests" onclick="showSection('backtests')">
                            <i class="fas fa-chart-bar me-2"></i>
                            回测分析
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#optimization" onclick="showSection('optimization')">
                            <i class="fas fa-sliders-h me-2"></i>
                            参数优化
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#monitoring" onclick="showSection('monitoring')">
                            <i class="fas fa-heartbeat me-2"></i>
                            系统监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#logs" onclick="showSection('logs')">
                            <i class="fas fa-file-alt me-2"></i>
                            日志查看
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="col-md-10 ms-sm-auto px-md-4">
        <!-- 顶部导航栏 -->
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2" id="page-title">仪表板</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <div class="btn-group me-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="refreshData()">
                        <i class="fas fa-sync-alt me-1"></i>
                        刷新
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="showSettings()">
                        <i class="fas fa-cog me-1"></i>
                        设置
                    </button>
                </div>
            </div>
        </div>

        <!-- 仪表板内容 -->
        <div id="dashboard-section" class="section">
            <div class="row">
                <!-- 系统状态卡片 -->
                <div class="col-md-3 mb-4">
                    <div class="card metric-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="card-title">系统状态</h6>
                                    <h3 id="system-status">健康</h3>
                                </div>
                                <i class="fas fa-server fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 策略数量卡片 -->
                <div class="col-md-3 mb-4">
                    <div class="card metric-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="card-title">策略数量</h6>
                                    <h3 id="strategies-count">0</h3>
                                </div>
                                <i class="fas fa-brain fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 回测任务卡片 -->
                <div class="col-md-3 mb-4">
                    <div class="card metric-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="card-title">回测任务</h6>
                                    <h3 id="backtests-count">0</h3>
                                </div>
                                <i class="fas fa-chart-bar fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 活跃告警卡片 -->
                <div class="col-md-3 mb-4">
                    <div class="card metric-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="card-title">活跃告警</h6>
                                    <h3 id="alerts-count">0</h3>
                                </div>
                                <i class="fas fa-exclamation-triangle fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 图表区域 -->
            <div class="row">
                <div class="col-md-8 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0">系统性能监控</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="performanceChart" width="400" height="200"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0">最近活动</h6>
                        </div>
                        <div class="card-body">
                            <div id="recent-activities" class="list-group list-group-flush">
                                <div class="list-group-item">
                                    <small class="text-muted">暂无活动记录</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 策略管理内容 -->
        <div id="strategies-section" class="section" style="display: none;">
            <div class="row">
                <div class="col-12 mb-4">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between">
                            <h6 class="mb-0">策略列表</h6>
                            <button class="btn btn-primary btn-sm" onclick="showCreateStrategyModal()">
                                <i class="fas fa-plus me-1"></i>
                                创建策略
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped" id="strategies-table">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>名称</th>
                                            <th>类型</th>
                                            <th>状态</th>
                                            <th>创建时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="strategies-tbody">
                                        <tr>
                                            <td colspan="6" class="text-center text-muted">
                                                <i class="fas fa-spinner fa-spin me-2"></i>
                                                加载中...
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 其他section的内容可以后续添加 -->
        <div id="backtests-section" class="section" style="display: none;">
            <div class="text-center text-muted">
                <i class="fas fa-chart-bar fa-3x mb-3"></i>
                <h4>回测分析</h4>
                <p>该功能正在开发中...</p>
            </div>
        </div>

        <div id="optimization-section" class="section" style="display: none;">
            <div class="text-center text-muted">
                <i class="fas fa-sliders-h fa-3x mb-3"></i>
                <h4>参数优化</h4>
                <p>该功能正在开发中...</p>
            </div>
        </div>

        <div id="monitoring-section" class="section" style="display: none;">
            <div class="text-center text-muted">
                <i class="fas fa-heartbeat fa-3x mb-3"></i>
                <h4>系统监控</h4>
                <p>该功能正在开发中...</p>
            </div>
        </div>

        <div id="logs-section" class="section" style="display: none;">
            <div class="text-center text-muted">
                <i class="fas fa-file-alt fa-3x mb-3"></i>
                <h4>日志查看</h4>
                <p>该功能正在开发中...</p>
            </div>
        </div>
    </main>

    <!-- 创建策略模态框 -->
    <div class="modal fade" id="createStrategyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建策略</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="create-strategy-form">
                        <div class="mb-3">
                            <label for="strategy-name" class="form-label">策略名称</label>
                            <input type="text" class="form-control" id="strategy-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="strategy-type" class="form-label">策略类型</label>
                            <select class="form-select" id="strategy-type" required>
                                <option value="">请选择策略类型</option>
                                <option value="momentum">动量策略</option>
                                <option value="mean_reversion">均值回归策略</option>
                                <option value="arbitrage">套利策略</option>
                                <option value="ml">机器学习策略</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="strategy-description" class="form-label">描述</label>
                            <textarea class="form-control" id="strategy-description" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createStrategy()">
                        <i class="fas fa-save me-1"></i>
                        创建
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 自定义JavaScript -->
    <script>
        // API基础URL
        const API_BASE_URL = '';

        // 当前活动section
        let currentSection = 'dashboard';

        // 图表实例
        let performanceChart = null;

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
            loadDashboardData();
        });

        // 初始化页面
        function initializePage() {
            // 初始化图表
            initializeCharts();

            // 设置定期刷新
            setInterval(refreshData, 30000); // 30秒刷新一次
        }

        // 初始化图表
        function initializeCharts() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'CPU使用率',
                        data: [],
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1
                    }, {
                        label: '内存使用率',
                        data: [],
                        borderColor: 'rgb(255, 99, 132)',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }

        // 显示指定section
        function showSection(sectionId) {
            // 隐藏所有section
            document.querySelectorAll('.section').forEach(section => {
                section.style.display = 'none';
            });

            // 显示指定section
            document.getElementById(sectionId + '-section').style.display = 'block';

            // 更新导航栏活动状态
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            document.querySelector(`[href="#${sectionId}"]`).classList.add('active');

            // 更新页面标题
            const titles = {
                'dashboard': '仪表板',
                'strategies': '策略管理',
                'backtests': '回测分析',
                'optimization': '参数优化',
                'monitoring': '系统监控',
                'logs': '日志查看'
            };
            document.getElementById('page-title').textContent = titles[sectionId];

            currentSection = sectionId;

            // 加载对应数据
            loadSectionData(sectionId);
        }

        // 加载仪表板数据
        async function loadDashboardData() {
            try {
                const response = await axios.get(`${API_BASE_URL}/api/dashboard/summary`);
                const data = response.data;

                // 更新指标卡片
                document.getElementById('strategies-count').textContent = data.strategies_count;
                document.getElementById('backtests-count').textContent = data.backtests_count;
                document.getElementById('alerts-count').textContent = data.active_alerts_count;

                // 更新系统状态
                const statusElement = document.getElementById('system-status');
                statusElement.textContent = data.system_health === 'healthy' ? '健康' : '异常';
                statusElement.className = data.system_health === 'healthy' ? 'status-healthy' : 'status-unhealthy';

                // 更新图表
                updatePerformanceChart();

            } catch (error) {
                console.error('加载仪表板数据失败:', error);
                showError('加载仪表板数据失败');
            }
        }

        // 加载section数据
        function loadSectionData(sectionId) {
            switch (sectionId) {
                case 'strategies':
                    loadStrategiesData();
                    break;
                case 'backtests':
                    loadBacktestsData();
                    break;
                case 'monitoring':
                    loadMonitoringData();
                    break;
            }
        }

        // 加载策略数据
        async function loadStrategiesData() {
            try {
                const response = await axios.get(`${API_BASE_URL}/api/strategies`);
                const strategies = response.data.strategies;

                const tbody = document.getElementById('strategies-tbody');

                if (strategies.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center text-muted">
                                <i class="fas fa-info-circle me-2"></i>
                                暂无策略数据
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = strategies.map(strategy => `
                    <tr>
                        <td>${strategy.strategy_id}</td>
                        <td>${strategy.strategy_name}</td>
                        <td>${getStrategyTypeName(strategy.strategy_type)}</td>
                        <td><span class="badge bg-success">活跃</span></td>
                        <td>${new Date().toLocaleString()}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="executeStrategy('${strategy.strategy_id}')">
                                <i class="fas fa-play"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-info me-1" onclick="viewStrategy('${strategy.strategy_id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteStrategy('${strategy.strategy_id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('加载策略数据失败:', error);
                document.getElementById('strategies-tbody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            加载失败
                        </td>
                    </tr>
                `;
            }
        }

        // 获取策略类型名称
        function getStrategyTypeName(type) {
            const typeNames = {
                'momentum': '动量策略',
                'mean_reversion': '均值回归策略',
                'arbitrage': '套利策略',
                'ml': '机器学习策略'
            };
            return typeNames[type] || type;
        }

        // 更新性能图表
        function updatePerformanceChart() {
            // 这里可以从API获取实际的性能数据
            const now = new Date();
            const timeLabels = Array.from({length: 10}, (_, i) =>
                new Date(now.getTime() - (9 - i) * 60000).toLocaleTimeString()
            );

            // 模拟数据
            const cpuData = Array.from({length: 10}, () => Math.random() * 100);
            const memoryData = Array.from({length: 10}, () => Math.random() * 100);

            performanceChart.data.labels = timeLabels;
            performanceChart.data.datasets[0].data = cpuData;
            performanceChart.data.datasets[1].data = memoryData;
            performanceChart.update();
        }

        // 刷新数据
        function refreshData() {
            loadDashboardData();
            if (currentSection !== 'dashboard') {
                loadSectionData(currentSection);
            }
        }

        // 显示创建策略模态框
        function showCreateStrategyModal() {
            const modal = new bootstrap.Modal(document.getElementById('createStrategyModal'));
            modal.show();
        }

        // 创建策略
        async function createStrategy() {
            const form = document.getElementById('create-strategy-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const strategyData = {
                strategy_name: document.getElementById('strategy-name').value,
                strategy_type: document.getElementById('strategy-type').value,
                description: document.getElementById('strategy-description').value,
                parameters: {},
                risk_limits: {}
            };

            try {
                const response = await axios.post(`${API_BASE_URL}/api/strategies`, strategyData);
                if (response.data.success) {
                    showSuccess('策略创建成功');
                    bootstrap.Modal.getInstance(document.getElementById('createStrategyModal')).hide();
                    form.reset();
                    loadStrategiesData();
                }
            } catch (error) {
                console.error('创建策略失败:', error);
                showError('创建策略失败');
            }
        }

        // 执行策略
        async function executeStrategy(strategyId) {
            try {
                const response = await axios.post(`${API_BASE_URL}/api/strategies/${strategyId}/execute`);
                if (response.data.success) {
                    showSuccess('策略执行已启动');
                }
            } catch (error) {
                console.error('执行策略失败:', error);
                showError('执行策略失败');
            }
        }

        // 显示成功消息
        function showSuccess(message) {
            // 这里可以实现更好的消息提示
            alert('✅ ' + message);
        }

        // 显示错误消息
        function showError(message) {
            // 这里可以实现更好的错误提示
            alert('❌ ' + message);
        }

        // 设置相关函数（暂时占位）
        function viewStrategy(strategyId) {
            showInfo('查看策略功能正在开发中');
        }

        function deleteStrategy(strategyId) {
            if (confirm('确定要删除这个策略吗？')) {
                showInfo('删除策略功能正在开发中');
            }
        }

        function loadBacktestsData() {
            showInfo('回测分析功能正在开发中');
        }

        function loadMonitoringData() {
            showInfo('系统监控功能正在开发中');
        }

        function showSettings() {
            showInfo('设置功能正在开发中');
        }

        function showInfo(message) {
            alert('ℹ️ ' + message);
        }
    </script>
</body>
</html>
