[pytest]
rootdir = .
testpaths = tests
norecursedirs = scripts
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not legacy"
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
    --cov-branch
    --timeout=120
    --timeout-method=thread
    --durations=20
    --durations-min=2.0
    -n=4
    --capture=no
pythonpath = src
env =
    PYTHONUTF8=1
    PYTHONIOENCODING=utf-8:replace
markers =
    # 测试类型标记
    unit: 单元测试 - 测试单个函数或方法
    integration: 集成测试 - 测试模块间的协作
    e2e: 端到端测试 - 完整业务流程测试
    performance: 性能测试 - 性能基准和压力测试

    # 特殊条件标记
    boundary: 边界条件测试 - 极端输入和边界情况
    concurrent: 并发测试 - 多线程和并发安全
    error: 错误处理测试 - 异常情况和错误恢复
    slow: 慢速测试 - 执行时间较长的测试
    flaky: 不稳定测试 - 仍需修复，默认跳过
    timeout: 使用 pytest-timeout 的测试

    # 风险标记
    deadlock_risk: 死锁风险 - 可能导致死锁的测试
    infinite_loop_risk: 无限循环风险 - 可能导致无限循环的测试

    # 功能模块标记
    config_system: 配置系统测试
    config_service: 配置服务测试
    config: 配置测试
    cache: 缓存系统测试
    monitoring: 监控系统测试
    logging: 日志系统测试
    error_handling: 错误处理测试
    protocol: 协议与Protocol接口测试
    mixin: Mixin结构相关测试
    distributed: 分布式缓存测试
    multi_level: 多级缓存测试
    base_components: 基础组件测试
    utils: 工具函数测试
    interfaces: 接口定义测试
    business: 业务流程测试
    features: 特征层测试 - 覆盖特征工程与指标组件
    database: 数据库测试
    resource_monitoring: 资源监控测试

    # 安全相关标记
    security: 安全测试标记
    audit: 审计测试标记
    phase2: Phase 2标记

    # 异步测试标记
    asyncio: 异步测试 - 使用asyncio的测试

    # CI/CD 相关标记
    skip_ci: 在CI环境中跳过此测试
    ci_only: 仅在CI环境中运行
    nightly: 夜间构建时运行
    smoke: 冒烟测试 - 快速验证基本功能
    legacy: 遗留重量级测试，默认跳过，需明确指定才运行
    functional: 功能层测试
    ml: 机器学习层测试
    trading: 交易层测试
    strategy: 策略层测试
    risk: 风险控制层测试

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::pytest.PytestCollectionWarning
    ignore::pytest.PytestCollectionWarning:cannot collect test class
    error::ResourceWarning