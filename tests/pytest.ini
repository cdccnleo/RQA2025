[pytest]
# 测试配置优化 - E2E效率优化专项
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 修复并行执行配置 - 解决路径冲突问题（2025-12-04）
# 禁用并行执行，使用顺序执行避免模块路径冲突
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --maxfail=5
    -ra
    --asyncio-mode=strict
    -m "not performance and not flaky and not legacy"

# E2E测试效率优化标记（增强版 - 2025-10-24）
markers =
    # 测试类型标记
    unit: 单元测试 - 测试单个函数或方法
    integration: 集成测试 - 测试模块间的协作
    e2e: 端到端测试 - 完整业务流程测试
    performance: 性能测试 - 性能基准和压力场景

    # 特殊条件标记
    boundary: 边界条件测试 - 极端输入和边界情况
    concurrent: 并发测试 - 多线程与竞争场景
    error: 错误处理测试 - 异常恢复与降级
    slow: 慢速测试 - 执行时间较长
    flaky: 不稳定测试 - 仍需修复，默认跳过
    timeout: 使用 pytest-timeout 的测试

    # 风险标记
    deadlock_risk: 可能存在死锁风险
    infinite_loop_risk: 可能存在无限循环风险

    # 功能模块标记
    config_system: 配置系统测试
    config_service: 配置服务测试
    config: 配置通用测试
    cache: 缓存系统测试
    monitoring: 监控系统测试
    logging: 日志系统测试
    error_handling: 错误处理相关
    protocol: Protocol 接口测试
    mixin: Mixin 结构测试
    distributed: 分布式缓存测试
    multi_level: 多级缓存测试
    base_components: 基础组件测试
    utils: 工具函数测试
    interfaces: 接口定义测试
    business: 业务流程测试
    features: 特征层测试 - 覆盖特征工程与指标组件
    legacy: 遗留重量级测试，默认跳过
    functional: 功能层测试
    ml: 机器学习层测试
    trading: 交易层测试
    database: 数据库相关测试
    resource_monitoring: 资源监控测试

    # 安全与阶段标记
    security: 安全相关测试
    audit: 审计相关测试
    phase2: Phase 2 计划专用标记

    # 异步标记
    asyncio: 异步测试

    # CI/CD 相关
    skip_ci: CI 环境跳过
    ci_only: 仅在 CI 环境运行
    nightly: 夜间构建执行
    smoke: 冒烟测试 - 快速回归
    no_models_adapter_patch: 禁用分布式训练器中默认的 models adapter 补丁，用于验证真实依赖路径

# 过滤配置 - E2E测试稳定性优化
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::ResourceWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# 缓存配置 - 提高测试执行效率
cache_dir = .pytest_cache

# 输出配置 - 优化日志显示
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# JUnit XML输出 - CI/CD集成优化
junit_family = xunit2
junit_logging = all
junit_suite_name = RQA2025_Test_Suite

# 覆盖率配置 - E2E测试覆盖率优化
# 注意：覆盖率配置通过命令行 --cov 参数指定

# E2E测试执行超时配置
timeout = 300
timeout_method = thread
