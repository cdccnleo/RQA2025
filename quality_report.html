<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础设施层质量检查报告</title>
    
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                line-height: 1.6;
                color: #333;
                background-color: #f5f5f5;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }

            header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 30px;
                border-radius: 10px;
                margin-bottom: 30px;
                text-align: center;
            }

            header h1 {
                font-size: 2.5em;
                margin-bottom: 10px;
            }

            .report-info {
                display: flex;
                justify-content: center;
                gap: 20px;
                font-size: 0.9em;
            }

            .summary-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }

            .summary-card {
                background: white;
                padding: 25px;
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            .summary-card h3 {
                font-size: 2em;
                margin-bottom: 5px;
            }

            .summary-card p {
                color: #666;
                font-size: 0.9em;
            }

            .status-badge {
                display: inline-block;
                padding: 5px 15px;
                border-radius: 20px;
                font-weight: bold;
                text-transform: uppercase;
                font-size: 0.8em;
            }

            .status-passed { background-color: #d4edda; color: #155724; }
            .status-warning { background-color: #fff3cd; color: #856404; }
            .status-failed { background-color: #f8d7da; color: #721c24; }

            .issues-section {
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin-bottom: 30px;
            }

            .issues-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
            }

            .issues-table th,
            .issues-table td {
                padding: 12px;
                text-align: left;
                border-bottom: 1px solid #ddd;
            }

            .issues-table th {
                background-color: #f8f9fa;
                font-weight: 600;
            }

            .severity-critical { color: #dc3545; font-weight: bold; }
            .severity-error { color: #dc3545; }
            .severity-warning { color: #ffc107; }
            .severity-info { color: #17a2b8; }

            .charts-section {
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin-bottom: 30px;
            }

            .chart-container {
                margin-bottom: 30px;
            }

            .chart-container h3 {
                margin-bottom: 20px;
                color: #333;
            }

            footer {
                text-align: center;
                color: #666;
                margin-top: 50px;
                padding: 20px;
                border-top: 1px solid #ddd;
            }

            @media (max-width: 768px) {
                .container {
                    padding: 10px;
                }

                header {
                    padding: 20px;
                }

                header h1 {
                    font-size: 2em;
                }

                .summary-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
        
    
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 基础设施层质量检查报告</h1>
            <div class="report-info">
                <span>生成时间: 2025-09-21 21:11:02</span>
                <span>版本: 1.0.0</span>
            </div>
        </header>

        
        <div class="summary-grid">
            <div class="summary-card">
                <h3>N/A</h3>
                <p>执行检查器</p>
            </div>
            <div class="summary-card">
                <h3>0</h3>
                <p>发现问题</p>
            </div>
            <div class="summary-card">
                <h3 style="color: #dc3545;">0</h3>
                <p>错误</p>
            </div>
            <div class="summary-card">
                <h3 style="color: #ffc107;">0</h3>
                <p>警告</p>
            </div>
            <div class="summary-card">
                <h3>0.00s</h3>
                <p>总耗时</p>
            </div>
            <div class="summary-card">
                <span class="status-badge status-passed">✅ 通过</span>
                <p>检查状态</p>
            </div>
        </div>
        

        
        <div class="charts-section">
            <h2>📊 数据可视化</h2>
            <div class="chart-container">
                <h3>问题严重程度分布</h3>
                <canvas id="severityChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-container">
                <h3>各检查器问题统计</h3>
                <canvas id="checkerChart" width="400" height="200"></canvas>
            </div>
        </div>

        <script>
            // 严重程度图表
            const severityCtx = document.getElementById('severityChart').getContext('2d');
            new Chart(severityCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Critical', 'Error', 'Warning', 'Info'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#dc3545', '#fd7e14', '#ffc107', '#17a2b8']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // 检查器图表
            const checkerCtx = document.getElementById('checkerChart').getContext('2d');
            const checkerLabels = [];
            const checkerIssues = checkerLabels.map(function(label) {
                return charts_data['checker_data'][label]['issues'];
            });

            new Chart(checkerCtx, {
                type: 'bar',
                data: {
                    labels: checkerLabels,
                    datasets: [{
                        label: '问题数量',
                        data: checkerIssues,
                        backgroundColor: '#667eea'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        </script>
        

        <div class="issues-section"><h2>📋 详细检查结果</h2></div>

        <footer>
            <p>报告由专项修复小组质量检查工具生成</p>
        </footer>
    </div>

    <script>
        
        // 页面加载完成后初始化图表
        document.addEventListener('DOMContentLoaded', function() {
            initializeCharts();
        });

        function initializeCharts() {
            // 图表初始化逻辑会在这里添加
            console.log('质量检查报告已加载');
        }
        
    </script>
</body>
</html>
