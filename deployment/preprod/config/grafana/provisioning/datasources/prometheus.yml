apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: rqa2025_metrics
    user: rqa2025_admin
    secureJsonData:
      password: ${INFLUXDB_PASSWORD:-rqa2025_influx_pass}
    jsonData:
      httpMode: POST
      dbName: rqa2025_metrics
      organization: rqa2025_org
      defaultBucket: rqa2025_metrics
      version: Flux
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "[rqa2025-*]YYYY.MM.DD"
    jsonData:
      esVersion: 80
      timeField: "@timestamp"
      interval: Daily
      timeInterval: 1h
    editable: true

