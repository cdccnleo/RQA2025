[pytest]
testpaths = tests/unit/infrastructure
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short
    --disable-warnings
    --no-header
    --no-summary
    --maxfail=10
    --durations=0
    --disable-pytest-warnings
    --strict-markers
    --cov=src/infrastructure
    --cov-report=term-missing
    --cov-report=html:htmlcov/infrastructure_coverage
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --cov=src/infrastructure
    --cov-report=term-missing
    --cov-report=html:htmlcov/infrastructure_coverage
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

# 内存优化设置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning

# 自定义标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    performance: 性能测试
    slow: 慢速测试
    stress: 压力测试
    error: 错误处理测试
    concurrent: 并发测试
    memory_intensive: 内存密集型测试
    lightweight: 轻量级测试
    deadlock_risk: 死锁风险测试
    infinite_loop_risk: 无限循环风险测试
    config_system: 配置系统测试
    config_service: 配置服务测试
    config: 配置测试
    database: 数据库测试
    resource_monitoring: 资源监控测试

# 内存优化环境变量
env =
    LIGHTWEIGHT_TEST = true
    DISABLE_HEAVY_IMPORTS = true
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = true
    MPLBACKEND = Agg
    DISABLE_LOGGING = true
    DISABLE_MONITORING = true