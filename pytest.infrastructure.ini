[pytest]
# 基础设施层专用配置 - 单线程执行以避免模块导入冲突
rootdir = C:\PythonProject\RQA2025

# 测试文件配置
testpaths = tests/unit/infrastructure
norecursedirs = scripts
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# pytest执行选项 - 基础设施层使用单线程
addopts =
    # 禁用并行执行 (基础设施层单线程)
    # -n=auto
    # --dist=loadscope
    # 覆盖率配置
    --cov=src.infrastructure
    --cov-report=term-missing
    --cov-report=html:test_logs/infrastructure_coverage
    --cov-report=xml:test_logs/infrastructure_coverage.xml
    --cov-fail-under=95
    --cov-config=.coveragerc.infrastructure
    # 其他配置
    --tb=short
    --maxfail=10
    -v

# Python路径配置
pythonpath =
    C:\PythonProject\RQA2025
    C:\PythonProject\RQA2025\src

env =
    PYTHONUTF8=1
    PYTHONIOENCODING=utf-8:replace
    PYTHONPATH = C:\PythonProject\RQA2025\src;C:\PythonProject\RQA2025\tests

markers =
    # 继承基础标记
    unit: 单元测试 - 测试单个函数或方法
    integration: 集成测试 - 测试模块间的协作
    e2e: 端到端测试 - 完整业务流程测试
    performance: 性能测试 - 性能基准和压力测试

    # 特殊条件标记
    boundary: 边界条件测试 - 极端输入和边界情况
    concurrent: 并发测试 - 多线程和并发安全
    error: 错误处理测试 - 异常情况和错误恢复
    slow: 慢速测试 - 执行时间较长的测试
    flaky: 不稳定测试 - 仍需修复，默认跳过

    # 功能模块标记
    config_system: 配置系统测试
    config_service: 配置服务测试
    cache: 缓存系统测试
    monitoring: 监控系统测试
    logging: 日志系统测试
    error_handling: 错误处理测试
    distributed: 分布式缓存测试
    multi_level: 多级缓存测试
    base_components: 基础组件测试
    utils: 工具函数测试
    interfaces: 接口定义测试
    database: 数据库测试
    resource_monitoring: 资源监控测试

    # 安全相关标记
    security: 安全测试标记
    audit: 审计测试标记

    # 异步测试标记
    asyncio: 异步测试 - 使用asyncio的测试

    # CI/CD 相关标记
    skip_ci: 在CI环境中跳过此测试
    ci_only: 仅在CI环境中运行
    nightly: 夜间构建时运行
    smoke: 冒烟测试 - 快速验证基本功能
    functional: 功能层测试

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::pytest.PytestCollectionWarning
    error::ResourceWarning
