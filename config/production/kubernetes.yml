apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rqa2025-api
    version: v1.0.0
  name: rqa2025-api
  namespace: rqa2025
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rqa2025-api
  template:
    metadata:
      labels:
        app: rqa2025-api
    spec:
      containers:
      - env:
        - name: ENVIRONMENT
          value: production
        - name: LOG_LEVEL
          value: INFO
        image: rqa2025/rqa2025-api:v1.0.0
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        name: api
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
