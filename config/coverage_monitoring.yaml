# 覆盖率监控配置
# 定义各层级的覆盖率阈值和监控规则

global:
  # 全局覆盖率阈值
  minimum_coverage: 80.0  # 最低总覆盖率要求
  warning_threshold: 85.0  # 警告阈值
  target_coverage: 90.0    # 目标覆盖率

  # 告警配置
  alert_on_regression: true  # 覆盖率下降时告警
  regression_threshold: 2.0  # 下降百分比阈值
  alert_channels:  # 告警渠道
    - email
    - slack
    - teams

  # 监控频率
  monitoring_schedule: "0 9 * * 1"  # 每周一早上9点
  trend_analysis_days: 30  # 趋势分析天数

layers:
  # 各层级特定的覆盖率要求
  infrastructure:
    minimum_coverage: 85.0
    target_coverage: 95.0
    critical_paths:  # 关键路径必须达到的覆盖率
      - src/infrastructure/constants/
      - src/infrastructure/cache/
    exclude_patterns:  # 排除的文件模式
      - "*test*.py"
      - "*mock*.py"

  data:
    minimum_coverage: 80.0
    target_coverage: 90.0
    critical_paths:
      - src/data/processing/
      - src/data/validation/
    exclude_patterns:
      - "*test*.py"
      - "*example*.py"

  strategy:
    minimum_coverage: 75.0  # 策略层复杂度较高，阈值略低
    target_coverage: 85.0
    critical_paths:
      - src/strategy/strategies/
      - src/strategy/backtest/
    exclude_patterns:
      - "*test*.py"
      - "*benchmark*.py"

  risk:
    minimum_coverage: 78.0
    target_coverage: 88.0
    critical_paths:
      - src/risk/models/
      - src/risk/validation/
    exclude_patterns:
      - "*test*.py"

  ml:
    minimum_coverage: 70.0  # ML层包含复杂算法，阈值适当放宽
    target_coverage: 85.0
    critical_paths:
      - src/ml/model_training/
      - src/ml/model_inference/
    exclude_patterns:
      - "*test*.py"
      - "*demo*.py"
      - "*experiment*.py"

  async_processor:
    minimum_coverage: 82.0
    target_coverage: 92.0
    critical_paths:
      - src/async_processor/
    exclude_patterns:
      - "*test*.py"

# 质量门配置
quality_gates:
  # 单元测试质量门
  unit_tests:
    minimum_pass_rate: 95.0  # 最少通过率
    maximum_failures: 5      # 最大失败数
    timeout_minutes: 30      # 超时时间

  # 集成测试质量门
  integration_tests:
    minimum_pass_rate: 90.0
    timeout_minutes: 60

  # 端到端测试质量门
  e2e_tests:
    minimum_pass_rate: 85.0
    timeout_minutes: 120

# 性能基准配置
performance_baselines:
  # 各测试类型的基准时间
  unit_test_timeout: 5.0      # 单个单元测试超时(秒)
  integration_test_timeout: 30.0  # 集成测试超时(秒)
  e2e_test_timeout: 300.0     # E2E测试超时(秒)

  # 性能回归阈值
  performance_regression_threshold: 10.0  # 性能下降10%触发告警

# 安全扫描配置
security_scanning:
  enabled: true
  severity_threshold: "medium"  # 中等及以上严重程度告警
  fail_on_high_severity: true   # 高严重程度失败构建

  # 安全检查规则
  rules:
    - name: "SQL注入检查"
      pattern: "(SELECT|INSERT|UPDATE|DELETE).*(\\+|\\%s|format)"
      severity: "high"

    - name: "硬编码密码检查"
      pattern: "password.*=.*['\"][^'\"]*['\"]"
      severity: "medium"

    - name: "危险函数使用检查"
      pattern: "(eval|exec|pickle\\.loads)"
      severity: "high"

# 报告配置
reporting:
  # 覆盖率报告
  coverage_report:
    format: ["html", "xml", "json"]
    output_dir: "test_reports/coverage"
    include_trends: true

  # 质量报告
  quality_report:
    format: ["html", "json"]
    output_dir: "test_reports/quality"
    include_metrics:
      - complexity
      - maintainability
      - duplication

  # 告警报告
  alert_report:
    format: ["json", "markdown"]
    output_dir: "alerts"
    retention_days: 90  # 告警保留天数

# 通知配置
notifications:
  email:
    enabled: true
    recipients:
      - alerts@company.com
      - qa@company.com
    templates:
      high_severity: "templates/alert_high.md"
      medium_severity: "templates/alert_medium.md"
      low_severity: "templates/alert_low.md"

  slack:
    enabled: true
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#qa-alerts"
    username: "RQA2025-QA-Bot"

  teams:
    enabled: true
    webhook_url: "${TEAMS_WEBHOOK_URL}"
    title_template: "🚨 RQA2025 质量告警 - {severity}"

# CI/CD集成配置
ci_cd_integration:
  # 分支保护规则
  branch_protection:
    required_checks:
      - "code-quality"
      - "unit-tests"
      - "integration-tests"
      - "coverage-quality-gate"

    required_coverage: 80.0

  # 自动合并配置
  auto_merge:
    enabled: false  # 默认关闭，需要手动启用
    required_approvals: 2
    require_branches_up_to_date: true

  # 部署门控
  deployment_gates:
    staging:
      require_coverage: 80.0
      require_security_scan: true
      require_performance_test: true

    production:
      require_coverage: 85.0
      require_security_scan: true
      require_performance_test: true
      require_manual_approval: true

# 监控和告警规则
monitoring_rules:
  # 覆盖率监控
  coverage_monitoring:
    enabled: true
    check_interval_hours: 24
    alert_cooldown_hours: 6  # 告警冷却时间

  # 质量趋势监控
  quality_trends:
    enabled: true
    metrics:
      - name: "code_complexity"
        threshold: 10
        trend_window_days: 30

      - name: "test_execution_time"
        threshold: 5.0  # 百分比变化
        trend_window_days: 7

      - name: "failure_rate"
        threshold: 2.0  # 百分比
        trend_window_days: 7

  # 资源使用监控
  resource_monitoring:
    enabled: true
    memory_threshold_mb: 1024
    disk_threshold_gb: 10
    alert_on_exceed: true
