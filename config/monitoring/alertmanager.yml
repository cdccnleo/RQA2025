global:
  smtp_from: alertmanager@rqa.com
  smtp_smarthost: localhost:587
receivers:
- email_configs:
  - send_resolved: true
    to: team@rqa.com
  name: rqa-team
  webhook_configs:
  - send_resolved: true
    url: http://webhook:5001/webhook
route:
  group_by:
  - alertname
  group_interval: 10s
  group_wait: 10s
  receiver: rqa-team
  repeat_interval: 1h
