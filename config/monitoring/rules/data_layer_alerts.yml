groups:
- name: data_layer_alerts
  rules:
  - alert: DataLoadTimeHigh
    annotations:
      description: "\u6570\u636E\u52A0\u8F7D\u65F6\u95F4\u8D85\u8FC75\u79D2"
      summary: "\u6570\u636E\u52A0\u8F7D\u65F6\u95F4\u8FC7\u957F"
    expr: data_load_time_seconds > 5
    for: 2m
    labels:
      severity: warning
  - alert: CacheHitRateLow
    annotations:
      description: "\u7F13\u5B58\u547D\u4E2D\u7387\u4F4E\u4E8E80%"
      summary: "\u7F13\u5B58\u547D\u4E2D\u7387\u8FC7\u4F4E"
    expr: cache_hit_rate < 0.8
    for: 5m
    labels:
      severity: warning
  - alert: ErrorRateHigh
    annotations:
      description: "\u9519\u8BEF\u7387\u8D85\u8FC71%"
      summary: "\u9519\u8BEF\u7387\u8FC7\u9AD8"
    expr: error_rate > 0.01
    for: 2m
    labels:
      severity: critical
  - alert: CPUUsageHigh
    annotations:
      description: "CPU\u4F7F\u7528\u7387\u8D85\u8FC780%"
      summary: "CPU\u4F7F\u7528\u7387\u8FC7\u9AD8"
    expr: cpu_usage_percent > 80
    for: 5m
    labels:
      severity: warning
  - alert: MemoryUsageHigh
    annotations:
      description: "\u5185\u5B58\u4F7F\u7528\u7387\u8D85\u8FC785%"
      summary: "\u5185\u5B58\u4F7F\u7528\u7387\u8FC7\u9AD8"
    expr: memory_usage_percent > 85
    for: 5m
    labels:
      severity: warning
