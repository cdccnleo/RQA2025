global:
  evaluation_interval: 15s
  scrape_interval: 30s
rule_files:
- /etc/prometheus/rules/*.yml
scrape_configs:
- job_name: rqa-services
  metrics_path: /metrics
  scrape_interval: 30s
  static_configs:
  - targets:
    - api-service:8000
    - business-service:8001
    - model-service:8002
    - trading-service:8003
    - cache-service:8004
    - validation-service:8005
