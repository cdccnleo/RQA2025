# RQA2025 生产环境配置文件

# 应用配置
application:
  name: "RQA2025量化交易系统"
  version: "1.0.0"
  environment: "production"
  debug: false

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 30

# 数据库配置
database:
  host: "localhost"
  port: 5432
  name: "rqa2025_prod"
  user: "rqa_user"
  password: "${DATABASE_PASSWORD}"  # 从环境变量读取
  min_connections: 10
  max_connections: 50
  connection_timeout: 30
  ssl_mode: "require"

# Redis缓存配置
redis:
  host: "localhost"
  port: 6379
  password: "${REDIS_PASSWORD}"  # 从环境变量读取
  db: 0
  max_connections: 20
  socket_timeout: 5

# 日志配置
logging:
  level: "INFO"
  format: "json"
  file: "/var/log/rqa2025/app.log"
  max_size: "100MB"
  backup_count: 10

# 安全配置
security:
  jwt_secret_key: "${JWT_SECRET_KEY}"  # 从环境变量读取
  jwt_algorithm: "HS256"
  jwt_expiration: 3600  # 1小时
  cors_origins:
    - "https://yourdomain.com"
    - "https://app.yourdomain.com"
  rate_limit: 1000  # 请求/分钟

# 监控配置
monitoring:
  enabled: true
  prometheus_port: 9090
  metrics_interval: 30
  alert_webhook: "${ALERT_WEBHOOK_URL}"

# 交易配置
trading:
  max_order_size: 1000000
  max_daily_orders: 1000
  supported_symbols: ["000001.SZ", "600000.SH"]  # 示例
  market_open_time: "09:30:00"
  market_close_time: "15:00:00"

# 风险控制配置
risk:
  max_position_size: 100000
  max_daily_loss: 50000
  max_drawdown: 0.1
  circuit_breaker_threshold: 0.05

# 性能配置
performance:
  cache_ttl: 300
  db_query_timeout: 30
  api_timeout: 10
  max_concurrent_requests: 100


