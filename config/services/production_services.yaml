# 生产环境服务配置
services:
  # 基础设施服务
  infrastructure:
    # 配置管理服务
    config_manager:
      enabled: true
      type: "unified"
      config:
        auto_reload: true
        config_dir: "config/production"
        backup_enabled: true
        encryption_enabled: false
    
    # 监控服务
    monitoring:
      enabled: true
      type: "unified"
      config:
        metrics_collection: true
        alerting: true
        dashboard: true
        storage_type: "influxdb"
    
    # 缓存服务
    cache:
      enabled: true
      type: "smart"
      config:
        max_size: "2GB"
        ttl: 3600
        eviction_policy: "lru"
        persistence: true
    
    # 任务调度服务
    task_scheduler:
      enabled: true
      config:
        max_workers: 8
        queue_size: 1000
        task_timeout: 3600
        priority_enabled: true
        resource_management: true
  
  # 应用服务
  application:
    # API服务
    api:
      enabled: true
      config:
        host: "0.0.0.0"
        port: 8000
        workers: 4
        max_connections: 1000
        timeout: 30
    
    # Web服务
    web:
      enabled: true
      config:
        host: "0.0.0.0"
        port: 8080
        static_files: "static/"
        templates: "templates/"
    
    # 后台任务服务
    background_tasks:
      enabled: true
      config:
        max_concurrent: 10
        retry_attempts: 3
        retry_delay: 60
  
  # 数据服务
  data:
    # 数据库服务
    database:
      enabled: true
      type: "postgresql"
      config:
        host: "localhost"
        port: 5432
        database: "rqa2025_prod"
        username: "rqa2025_user"
        password: "secure_password"
        max_connections: 100
        connection_timeout: 30
    
    # 缓存数据库
    redis:
      enabled: true
      config:
        host: "localhost"
        port: 6379
        database: 0
        max_connections: 50
        connection_timeout: 10
    
    # 消息队列
    message_queue:
      enabled: true
      type: "redis"
      config:
        host: "localhost"
        port: 6379
        database: 1
        max_connections: 20
  
  # 外部服务
  external:
    # 邮件服务
    email:
      enabled: true
      type: "smtp"
      config:
        host: "smtp.gmail.com"
        port: 587
        username: "noreply@rqa2025.com"
        password: "app_password"
        tls: true
    
    # 日志服务
    logging:
      enabled: true
      type: "elasticsearch"
      config:
        host: "localhost"
        port: 9200
        index: "rqa2025_logs"
        retention_days: 90
    
    # 监控服务
    monitoring_external:
      enabled: true
      type: "prometheus"
      config:
        host: "localhost"
        port: 9090
        scrape_interval: 30
  
  # 安全服务
  security:
    # 认证服务
    authentication:
      enabled: true
      type: "jwt"
      config:
        secret_key: "your-secret-key-here"
        algorithm: "HS256"
        expiration_hours: 24
    
    # 授权服务
    authorization:
      enabled: true
      config:
        role_based: true
        permission_cache: true
        audit_logging: true
    
    # 加密服务
    encryption:
      enabled: true
      config:
        algorithm: "AES-256-GCM"
        key_rotation: true
        key_rotation_days: 90
  
  # 部署服务
  deployment:
    # 蓝绿部署
    blue_green:
      enabled: true
      config:
        switchover_time: 300  # 秒
        health_check_interval: 30
        rollback_threshold: 3
    
    # 滚动更新
    rolling_update:
      enabled: true
      config:
        max_unavailable: 1
        max_surge: 2
        update_strategy: "RollingUpdate"
    
    # 回滚服务
    rollback:
      enabled: true
      config:
        auto_rollback: true
        rollback_threshold: 3
        backup_retention: 7
