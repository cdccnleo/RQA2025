# RQA2025 量化交易系统 - 主配置文件
# 此文件为默认配置，可被环境特定配置和本地配置覆盖

application:
  name: "RQA2025"
  version: "1.0.0"
  description: "A股量化交易系统"

# 运行环境
environment: development

# 调试模式
debug: false

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 30
  max_requests: 10000

# 数据库配置
database:
  # TimescaleDB 时序数据库
  timescale:
    host: "localhost"
    port: 5432
    database: "rqa2025"
    user: "postgres"
    password: ""
    ssl_mode: "disable"
    pool:
      min_size: 5
      max_size: 20
      command_timeout: 60.0
      max_inactive_time: 300.0
      max_queries: 50000
      max_lifetime: 3600.0
    
  # Redis 缓存
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: ""
    ssl: false
    connection_pool:
      max_connections: 50
      timeout: 5.0

# 安全配置
security:
  secret_key: ""
  jwt_algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  password_min_length: 8
  max_login_attempts: 5
  lockout_duration_minutes: 30

# 日志配置
logging:
  level: "INFO"
  format: "json"
  output: "stdout"
  file:
    enabled: false
    path: "logs/rqa2025.log"
    max_size: 104857600  # 100MB
    max_backups: 10
    max_age: 30  # 30天
  
# 市场数据配置
market_data:
  use_mock: false
  fallback_to_mock: true
  cache_duration: 300  # 5分钟
  
  # 数据源配置
  sources:
    - name: "tushare"
      enabled: true
      priority: 1
      token: ""
      rate_limit: 500  # 每分钟请求数
      
    - name: "akshare"
      enabled: true
      priority: 2
      rate_limit: 200
      
    - name: "baostock"
      enabled: false
      priority: 3
      rate_limit: 100

# 特征工程配置
feature_engineering:
  enabled: true
  max_parallel_tasks: 4
  default_lookback_days: 252
  
  # GPU加速
  gpu_acceleration:
    enabled: true
    min_batch_size: 1000
    device: "auto"  # auto, cuda, cpu
  
  # 特征存储
  feature_store:
    enabled: true
    storage: "database"  # database, file
    retention_days: 365

# 模型训练配置
model_training:
  enabled: true
  max_parallel_jobs: 2
  default_train_test_split: 0.8
  
  # 超参数优化
  hyperparameter_optimization:
    enabled: true
    method: "bayesian"  # grid, random, bayesian
    max_iterations: 100
    
  # 模型存储
  model_store:
    enabled: true
    storage: "database"
    version_control: true
    max_versions: 10

# 策略回测配置
backtest:
  enabled: true
  max_parallel_backtests: 4
  default_initial_capital: 1000000
  default_commission_rate: 0.0003
  default_slippage: 0.0001
  default_market_impact: 0.0001
  
  # 回测引擎
  engine:
    type: "vectorized"  # vectorized, event_driven
    price_field: "close"
    
# 交易执行配置
trading:
  enabled: false  # 生产环境启用
  mode: "paper"  # paper, live
  
  # 订单管理
  order_management:
    max_pending_orders: 100
    order_timeout_seconds: 300
    auto_cancel_on_error: true
    
  # 执行算法
  execution_algorithms:
    - name: "market"
      enabled: true
    - name: "limit"
      enabled: true
    - name: "twap"
      enabled: true
    - name: "vwap"
      enabled: true

# 风控配置
risk:
  enabled: true
  check_interval_seconds: 5
  
  # 默认风控规则
  default_rules:
    position_limit:
      enabled: true
      max_position_value: 1000000
      max_position_ratio: 0.2
      
    loss_limit:
      enabled: true
      daily_loss_limit: 50000
      daily_loss_ratio: 0.05
      
    drawdown_limit:
      enabled: true
      max_drawdown: 0.10
      
    concentration_limit:
      enabled: true
      max_single_position_ratio: 0.1
      max_sector_ratio: 0.3

# 分布式配置
distributed:
  enabled: true
  
  coordinator:
    enabled: true
    heartbeat_interval: 10
    task_timeout: 3600
    max_retry_attempts: 3
    
  # 任务队列
  task_queue:
    type: "redis"  # redis, rabbitmq
    max_queue_size: 10000
    
  # 节点管理
  node_management:
    health_check_interval: 30
    node_timeout: 120
    auto_scale: true
    min_nodes: 1
    max_nodes: 10

# 监控告警配置
monitoring:
  enabled: true
  
  # 指标收集
  metrics:
    enabled: true
    interval: 60
    retention_days: 30
    
  # 告警
  alerting:
    enabled: true
    channels:
      - type: "email"
        enabled: false
        recipients: []
      - type: "webhook"
        enabled: false
        url: ""
      - type: "sms"
        enabled: false
        phone_numbers: []
        
  # 健康检查
  health_check:
    enabled: true
    interval: 30
    timeout: 5

# API配置
api:
  # 限流
  rate_limit:
    enabled: true
    requests_per_minute: 1000
    burst_size: 100
    
  # CORS
  cors:
    enabled: true
    allow_origins: ["http://localhost:3000", "http://localhost:8080"]
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["*"]
    
  # 文档
  documentation:
    enabled: true
    title: "RQA2025 API"
    version: "1.0.0"
    docs_url: "/docs"
    redoc_url: "/redoc"

# WebSocket配置
websocket:
  enabled: true
  max_connections: 1000
  heartbeat_interval: 30
  message_size_limit: 1048576  # 1MB

# 存储配置
storage:
  # 对象存储
  object_storage:
    type: "minio"  # minio, s3, local
    endpoint: "localhost:9000"
    access_key: ""
    secret_key: ""
    bucket: "rqa2025"
    secure: false
    
  # 文件存储
  file_storage:
    path: "data"
    max_size: 10737418240  # 10GB

# 通知配置
notifications:
  # 邮件
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    from_address: ""
    
  # 短信
  sms:
    enabled: false
    provider: ""  # aliyun, tencent
    access_key: ""
    secret_key: ""
    
  # 企业微信
  wechat_work:
    enabled: false
    webhook_url: ""

# 性能优化
performance:
  # 缓存
  cache:
    enabled: true
    type: "redis"  # redis, memory
    ttl: 300  # 5分钟
    
  # 连接池
  connection_pool:
    database:
      min_size: 5
      max_size: 20
    redis:
      min_size: 2
      max_size: 10
      
  # 批处理
  batch_processing:
    enabled: true
    batch_size: 1000
    flush_interval: 5  # 秒
