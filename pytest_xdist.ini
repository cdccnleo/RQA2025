[tool:pytest]
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    -n auto
    --dist worksteal
    --maxfail=10
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    serial: marks tests as serial (run sequentially)
    parallel: marks tests as parallel (run in parallel)
