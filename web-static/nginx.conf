server {
    listen 80;
    server_name localhost;

    # DNS解析器 - 移除以避免容器内DNS问题

    root /usr/share/nginx/html;
    index index.html;

    # 启用gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 处理favicon.ico请求（如果文件不存在，返回204 No Content避免404错误）
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API代理到后端服务（使用容器名称）
    set $backend "http://rqa2025-app:8000";
    location /api/ {
        # 统一处理CORS - 无论请求方法如何都添加CORS头
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH, HEAD' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Requested-With,Accept,Accept-Encoding,Accept-Language,X-CSRFToken' always;
        add_header 'Access-Control-Allow-Credentials' 'false' always;

        # 处理OPTIONS预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH, HEAD' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Requested-With,Accept,Accept-Encoding,Accept-Language,X-CSRFToken' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Type' 'text/plain' always;
            add_header 'Content-Length' '0' always;
            return 204;
        }

        # 代理到后端
        proxy_pass $backend;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket代理到后端服务
    location /ws/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 86400;
        proxy_read_timeout 86400;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓冲
        proxy_buffering off;
        proxy_cache off;
    }

    # API文档代理
    location /docs {
        proxy_pass $backend/docs;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 主页面
location / {
    try_files $uri $uri/ /index.html;
}

# 完整仪表板页面
location /dashboard {
    try_files /dashboard.html =404;
}

# 数据源配置页面
location /data-sources {
    try_files /data-sources-config.html =404;
}

# 数据源配置页面（别名）
location /data-sources-config {
    try_files /data-sources-config.html =404;
}

