<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQA2025 实时策略处理监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .metric-card {
            position: relative;
            overflow: hidden;
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }
        .pulse-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/dashboard" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-600 mr-2"></i>
                        <span class="text-xl font-bold text-indigo-600">RQA2025</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <div class="w-3 h-3 bg-green-500 rounded-full pulse-dot mr-2"></div>
                        <span class="text-sm text-gray-600">实时监控中</span>
                    </div>
                    <button onclick="toggleMonitoring()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-300" id="monitorBtn">
                        <i class="fas fa-pause mr-2"></i>暂停
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 px-4">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 flex items-center">
                <i class="fas fa-stream text-blue-600 mr-3"></i>
                实时策略处理监控
            </h1>
            <p class="text-gray-600">实时监控策略处理性能、数据流状态和信号生成</p>
        </div>

        <!-- Real-time Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 metric-card card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-gray-500">处理延迟</div>
                        <div class="text-2xl font-semibold text-gray-900" id="processing-latency">-- ms</div>
                        <div class="text-xs text-gray-500 mt-1">平均延迟</div>
                    </div>
                    <i class="fas fa-tachometer-alt text-blue-500 text-3xl"></i>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 metric-card card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-gray-500">吞吐量</div>
                        <div class="text-2xl font-semibold text-gray-900" id="throughput">-- /s</div>
                        <div class="text-xs text-gray-500 mt-1">信号/秒</div>
                    </div>
                    <i class="fas fa-bolt text-yellow-500 text-3xl"></i>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 metric-card card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-gray-500">队列长度</div>
                        <div class="text-2xl font-semibold text-gray-900" id="queue-length">0</div>
                        <div class="text-xs text-gray-500 mt-1">待处理任务</div>
                    </div>
                    <i class="fas fa-list text-purple-500 text-3xl"></i>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 metric-card card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm font-medium text-gray-500">错误率</div>
                        <div class="text-2xl font-semibold text-gray-900" id="error-rate">0%</div>
                        <div class="text-xs text-gray-500 mt-1">处理错误</div>
                    </div>
                    <i class="fas fa-exclamation-triangle text-red-500 text-3xl"></i>
                </div>
            </div>
        </div>

        <!-- Real-time Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800">延迟趋势</h3>
                </div>
                <div class="p-6">
                    <canvas id="latencyChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800">吞吐量趋势</h3>
                </div>
                <div class="p-6">
                    <canvas id="throughputChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Data Stream Status -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">数据流状态</h3>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <div class="text-sm text-gray-600 mb-2">数据流状态</div>
                        <div class="flex items-center">
                            <div class="w-3 h-3 bg-green-500 rounded-full pulse-dot mr-2"></div>
                            <span class="font-semibold text-green-600" id="stream-status">运行中</span>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600 mb-2">缓存命中率</div>
                        <div class="text-xl font-semibold" id="cache-hit-rate">--%</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600 mb-2">数据接收速率</div>
                        <div class="text-xl font-semibold" id="data-receive-rate">-- 条/s</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Strategy Processing Status -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">策略处理状态</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">策略名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">处理延迟</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">信号数</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">持仓数</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">交易数</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                        </tr>
                    </thead>
                    <tbody id="strategyTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Recent Signals -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-gray-800">最近信号</h3>
                    <button onclick="clearSignals()" class="text-sm text-gray-600 hover:text-gray-800">
                        <i class="fas fa-trash mr-1"></i>清空
                    </button>
                </div>
            </div>
            <div class="p-6">
                <div id="recentSignals" class="space-y-3 max-h-96 overflow-y-auto">
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-signal text-2xl mb-2"></i>
                        <div>等待信号...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let latencyChart, throughputChart;
        let isMonitoring = true;
        let monitoringInterval = null;
        let signalHistory = [];
        let wsConnection = null;

        function getApiBaseUrl(endpoint = '') {
            const baseUrl = '/api/v1';
            return baseUrl + endpoint;
        }

        function getWebSocketUrl(channel) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            return `${protocol}//${host}/ws/${channel}`;
        }

        function connectWebSocket() {
            if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
                return;
            }

            try {
                wsConnection = new WebSocket(getWebSocketUrl('realtime-metrics'));
                
                wsConnection.onopen = function() {
                    console.log('WebSocket连接已建立');
                };
                
                wsConnection.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'realtime_metrics') {
                            updateMetrics(data.data);
                            updateCharts(data.data);
                            updateStrategyTable(data.data.strategies || []);
                        }
                    } catch (error) {
                        console.error('解析WebSocket消息失败:', error);
                    }
                };
                
                wsConnection.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                    // 回退到轮询模式
                    startPolling();
                };
                
                wsConnection.onclose = function() {
                    console.log('WebSocket连接已关闭');
                    wsConnection = null;
                    // 如果仍在监控，尝试重连
                    if (isMonitoring) {
                        setTimeout(connectWebSocket, 3000);
                    }
                };
            } catch (error) {
                console.error('WebSocket连接失败:', error);
                // 回退到轮询模式
                startPolling();
            }
        }

        function startPolling() {
            if (monitoringInterval) return;
            monitoringInterval = setInterval(() => {
                loadRealtimeMetrics();
                loadRecentSignals();
            }, 2000);
        }

        async function loadRealtimeMetrics() {
            if (!isMonitoring) return;

            try {
                const response = await fetch(getApiBaseUrl('/strategy/realtime/metrics'));
                if (!response.ok) return;
                
                const data = await response.json();
                updateMetrics(data);
                updateCharts(data);
                updateStrategyTable(data.strategies || []);
            } catch (error) {
                console.error('加载实时指标失败:', error);
            }
        }

        function updateMetrics(data) {
            const metrics = data.metrics || {};
            const streamMetrics = data.stream_metrics || {};

            document.getElementById('processing-latency').textContent = 
                streamMetrics.processing_latency ? `${streamMetrics.processing_latency.toFixed(2)} ms` : '-- ms';
            document.getElementById('throughput').textContent = 
                streamMetrics.throughput ? `${streamMetrics.throughput.toFixed(2)} /s` : '-- /s';
            document.getElementById('queue-length').textContent = streamMetrics.queue_length || 0;
            document.getElementById('error-rate').textContent = 
                streamMetrics.error_rate ? (streamMetrics.error_rate * 100).toFixed(2) + '%' : '0%';
            
            document.getElementById('cache-hit-rate').textContent = 
                streamMetrics.cache_hit_rate ? (streamMetrics.cache_hit_rate * 100).toFixed(1) + '%' : '--%';
            document.getElementById('data-receive-rate').textContent = 
                streamMetrics.data_receive_rate ? `${streamMetrics.data_receive_rate.toFixed(1)} 条/s` : '-- 条/s';
        }

        function updateCharts(data) {
            const history = data.history || {};
            const latencyHistory = history.latency || [];
            const throughputHistory = history.throughput || [];

            if (latencyChart && latencyHistory.length > 0) {
                const labels = latencyHistory.map((_, i) => {
                    const now = new Date();
                    now.setSeconds(now.getSeconds() - (latencyHistory.length - i));
                    return now.toLocaleTimeString();
                });
                
                latencyChart.data.labels = labels;
                latencyChart.data.datasets[0].data = latencyHistory.map(d => d.value || d);
                
                if (latencyChart.data.labels.length > 50) {
                    latencyChart.data.labels.shift();
                    latencyChart.data.datasets[0].data.shift();
                }
                
                latencyChart.update('none');
            }

            if (throughputChart && throughputHistory.length > 0) {
                const labels = throughputHistory.map((_, i) => {
                    const now = new Date();
                    now.setSeconds(now.getSeconds() - (throughputHistory.length - i));
                    return now.toLocaleTimeString();
                });
                
                throughputChart.data.labels = labels;
                throughputChart.data.datasets[0].data = throughputHistory.map(d => d.value || d);
                
                if (throughputChart.data.labels.length > 50) {
                    throughputChart.data.labels.shift();
                    throughputChart.data.datasets[0].data.shift();
                }
                
                throughputChart.update('none');
            }
        }

        function updateStrategyTable(strategies) {
            const tbody = document.getElementById('strategyTableBody');
            
            if (strategies.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-2xl mb-2"></i>
                            <div>暂无运行中的策略</div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = strategies.map(strategy => {
                const metrics = strategy.metrics || {};
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="font-medium text-gray-900">${strategy.name || strategy.id}</div>
                            <div class="text-sm text-gray-500">${strategy.type || ''}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${metrics.latency ? `${metrics.latency.toFixed(2)} ms` : '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${metrics.signals_count || 0}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${metrics.positions_count || 0}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${metrics.trades_count || 0}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                运行中
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function loadRecentSignals() {
            if (!isMonitoring) return;

            try {
                const response = await fetch(getApiBaseUrl('/strategy/realtime/signals'));
                if (!response.ok) return;
                
                const data = await response.json();
                const signals = data.signals || [];
                
                // 只显示新信号
                signals.forEach(signal => {
                    if (!signalHistory.find(s => s.id === signal.id)) {
                        signalHistory.unshift(signal);
                        if (signalHistory.length > 50) {
                            signalHistory.pop();
                        }
                    }
                });

                renderSignals();
            } catch (error) {
                console.error('加载信号失败:', error);
            }
        }

        function renderSignals() {
            const container = document.getElementById('recentSignals');
            
            if (signalHistory.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-signal text-2xl mb-2"></i>
                        <div>等待信号...</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = signalHistory.slice(0, 20).map(signal => {
                const signalType = signal.signal_type || 'unknown';
                const typeColor = {
                    'buy': 'text-green-600',
                    'sell': 'text-red-600',
                    'hold': 'text-gray-600'
                }[signalType] || 'text-gray-600';

                return `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div class="flex items-center">
                            <i class="fas fa-signal ${typeColor} mr-3"></i>
                            <div>
                                <div class="font-medium text-gray-900">${signal.strategy_name || signal.strategy_id}</div>
                                <div class="text-sm text-gray-500">${signal.symbol || ''} - ${signalType.toUpperCase()}</div>
                            </div>
                        </div>
                        <div class="text-sm text-gray-500">
                            ${new Date(signal.timestamp * 1000).toLocaleTimeString()}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleMonitoring() {
            isMonitoring = !isMonitoring;
            const btn = document.getElementById('monitorBtn');
            
            if (isMonitoring) {
                btn.innerHTML = '<i class="fas fa-pause mr-2"></i>暂停';
                btn.classList.remove('bg-red-600', 'hover:bg-red-700');
                btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                startMonitoring();
            } else {
                btn.innerHTML = '<i class="fas fa-play mr-2"></i>继续';
                btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                btn.classList.add('bg-green-600', 'hover:bg-green-700');
                stopMonitoring();
            }
        }

        function startMonitoring() {
            // 优先使用WebSocket，失败则回退到轮询
            connectWebSocket();
            // 同时启动信号轮询（WebSocket可能不包含信号数据）
            if (!monitoringInterval) {
                monitoringInterval = setInterval(() => {
                    loadRecentSignals();
                }, 2000);
            }
        }

        function stopMonitoring() {
            if (wsConnection) {
                wsConnection.close();
                wsConnection = null;
            }
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
            }
        }

        function clearSignals() {
            signalHistory = [];
            renderSignals();
        }

        function initCharts() {
            const latencyCtx = document.getElementById('latencyChart').getContext('2d');
            latencyChart = new Chart(latencyCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '延迟 (ms)',
                        data: [],
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            const throughputCtx = document.getElementById('throughputChart').getContext('2d');
            throughputChart = new Chart(throughputCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '吞吐量 (信号/秒)',
                        data: [],
                        borderColor: 'rgb(16, 185, 129)',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            startMonitoring();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            stopMonitoring();
        });

        // 页面可见性变化时处理连接
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                // 页面隐藏时暂停监控
                if (wsConnection) {
                    wsConnection.close();
                }
            } else {
                // 页面显示时恢复监控
                if (isMonitoring) {
                    startMonitoring();
                }
            }
        });
    </script>
</body>
</html>
