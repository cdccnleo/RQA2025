<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQA2025 交易信号监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .signal-buy { color: #10b981; }
        .signal-sell { color: #ef4444; }
        .signal-hold { color: #6b7280; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/dashboard" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-600 mr-2"></i>
                        <span class="text-xl font-bold text-indigo-600">RQA2025</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">交易信号监控</span>
                    <button onclick="refreshData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-300">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 px-4">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 flex items-center">
                <i class="fas fa-broadcast-tower text-green-600 mr-3"></i>
                交易信号监控
            </h1>
            <p class="text-gray-600">实时信号生成状态、信号质量评估和信号有效性分析</p>
        </div>

        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-signal text-blue-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">今日信号数</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="today-signals">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-check-circle text-green-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">信号准确率</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="signal-accuracy">--%</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-clock text-yellow-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">平均延迟</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="avg-latency">--ms</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-chart-line text-purple-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">信号强度</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="signal-strength">--</dd>
                    </div>
                </div>
            </div>
        </div>

        <!-- Real-time Signals -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">实时信号</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">时间</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">标的</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">信号类型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">强度</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">价格</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody id="signalsBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Signal Distribution -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800">信号类型分布</h3>
                </div>
                <div class="p-6">
                    <canvas id="signalTypeChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800">信号质量趋势</h3>
                </div>
                <div class="p-6">
                    <canvas id="signalQualityChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Signal Effectiveness -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">信号有效性分析</h3>
            </div>
            <div class="p-6">
                <canvas id="effectivenessChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let signalTypeChart, signalQualityChart, effectivenessChart;

        function getApiBaseUrl(endpoint = '') {
            const baseUrl = '/api/v1';
            return baseUrl + endpoint;
        }

        async function loadSignalData() {
            try {
                const [signalsRes, statsRes, distributionRes] = await Promise.all([
                    fetch(getApiBaseUrl('/trading/signals/realtime')),
                    fetch(getApiBaseUrl('/trading/signals/stats')),
                    fetch(getApiBaseUrl('/trading/signals/distribution'))
                ]);

                if (signalsRes.ok) {
                    const signalsData = await signalsRes.json();
                    renderSignals(signalsData.signals || []);
                }

                if (statsRes.ok) {
                    const statsData = await statsRes.json();
                    updateStatistics(statsData);
                }

                if (distributionRes.ok) {
                    const distributionData = await distributionRes.json();
                    updateCharts(distributionData);
                }
            } catch (error) {
                console.error('加载信号数据失败:', error);
            }
        }

        function updateStatistics(data) {
            const stats = data.stats || {};
            document.getElementById('today-signals').textContent = stats.today_signals || 0;
            document.getElementById('signal-accuracy').textContent = 
                stats.accuracy ? (stats.accuracy * 100).toFixed(1) + '%' : '--%';
            document.getElementById('avg-latency').textContent = 
                stats.avg_latency ? stats.avg_latency.toFixed(1) + 'ms' : '--ms';
            document.getElementById('signal-strength').textContent = 
                stats.avg_strength ? stats.avg_strength.toFixed(2) : '--';
        }

        function renderSignals(signals) {
            const tbody = document.getElementById('signalsBody');
            
            if (signals.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-2xl mb-2"></i>
                            <div>暂无交易信号</div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = signals.map(signal => {
                const signalClass = {
                    'buy': 'signal-buy',
                    'sell': 'signal-sell',
                    'hold': 'signal-hold'
                }[signal.type] || 'signal-hold';

                const signalText = {
                    'buy': '买入',
                    'sell': '卖出',
                    'hold': '持有'
                }[signal.type] || signal.type;

                const statusColor = {
                    'executed': 'bg-green-100 text-green-800',
                    'pending': 'bg-yellow-100 text-yellow-800',
                    'expired': 'bg-gray-100 text-gray-800',
                    'cancelled': 'bg-red-100 text-red-800'
                }[signal.status] || 'bg-gray-100 text-gray-800';

                const statusText = {
                    'executed': '已执行',
                    'pending': '待执行',
                    'expired': '已过期',
                    'cancelled': '已取消'
                }[signal.status] || signal.status;

                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${signal.timestamp ? new Date(signal.timestamp * 1000).toLocaleString('zh-CN') : '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            ${signal.symbol || '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${signalClass}">
                                ${signalText}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${signal.strength ? signal.strength.toFixed(2) : '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${signal.price ? signal.price.toFixed(2) : '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button onclick="viewSignalDetails('${signal.id || signal.symbol}')" class="text-blue-600 hover:text-blue-900">
                                <i class="fas fa-eye"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateCharts(data) {
            const typeDistribution = data.type_distribution || {};
            const qualityTrend = data.quality_trend || [];
            const effectiveness = data.effectiveness || {};

            if (signalTypeChart && Object.keys(typeDistribution).length > 0) {
                signalTypeChart.data.labels = Object.keys(typeDistribution);
                signalTypeChart.data.datasets[0].data = Object.values(typeDistribution);
                signalTypeChart.update();
            }

            if (signalQualityChart && qualityTrend.length > 0) {
                const labels = qualityTrend.map((_, i) => {
                    const date = new Date();
                    date.setHours(date.getHours() - (qualityTrend.length - i));
                    return date.toLocaleTimeString();
                });
                signalQualityChart.data.labels = labels;
                signalQualityChart.data.datasets[0].data = qualityTrend.map(t => t.quality || 0);
                signalQualityChart.update();
            }

            if (effectivenessChart && Object.keys(effectiveness).length > 0) {
                effectivenessChart.data.labels = Object.keys(effectiveness);
                effectivenessChart.data.datasets[0].data = Object.values(effectiveness);
                effectivenessChart.update();
            }
        }

        function viewSignalDetails(signalId) {
            alert('查看信号详情功能开发中');
        }

        function refreshData() {
            loadSignalData();
        }

        function initCharts() {
            const typeCtx = document.getElementById('signalTypeChart').getContext('2d');
            signalTypeChart = new Chart(typeCtx, {
                type: 'doughnut',
                data: {
                    labels: ['买入', '卖出', '持有'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: [
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(239, 68, 68, 0.8)',
                            'rgba(107, 114, 128, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });

            const qualityCtx = document.getElementById('signalQualityChart').getContext('2d');
            signalQualityChart = new Chart(qualityCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '信号质量',
                        data: [],
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: { beginAtZero: true, max: 1 }
                    }
                }
            });

            const effectivenessCtx = document.getElementById('effectivenessChart').getContext('2d');
            effectivenessChart = new Chart(effectivenessCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '有效性',
                        data: [],
                        backgroundColor: 'rgba(139, 92, 246, 0.8)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: { beginAtZero: true, max: 1 }
                    }
                }
            });
        }

        // WebSocket连接
        let wsTradingSignals = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/trading-signals`;
            
            try {
                wsTradingSignals = new WebSocket(wsUrl);
                
                wsTradingSignals.onopen = function() {
                    console.log('交易信号WebSocket连接已建立');
                };
                
                wsTradingSignals.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'trading_signals' && data.data) {
                            updateStatistics({ stats: data.data });
                        }
                    } catch (error) {
                        console.error('处理WebSocket消息失败:', error);
                    }
                };
                
                wsTradingSignals.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                };
                
                wsTradingSignals.onclose = function() {
                    console.log('交易信号WebSocket连接已关闭，5秒后重连...');
                    setTimeout(connectWebSocket, 5000);
                };
            } catch (error) {
                console.error('WebSocket连接失败:', error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadSignalData();
            connectWebSocket();
            setInterval(loadSignalData, 30000); // 每30秒刷新（WebSocket负责实时更新）
        });

        // 页面关闭时断开WebSocket
        window.addEventListener('beforeunload', function() {
            if (wsTradingSignals) {
                wsTradingSignals.close();
            }
        });
    </script>
</body>
</html>
