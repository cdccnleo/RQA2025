<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQA2025 多策略优化器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .strategy-checkbox {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .strategy-checkbox:hover {
            background-color: #f3f4f6;
        }
        .strategy-checkbox.selected {
            background-color: #dbeafe;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/dashboard" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-600 mr-2"></i>
                        <span class="text-xl font-bold text-indigo-600">RQA2025</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">多策略优化器</span>
                    <button onclick="refreshData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-300">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 px-4">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 flex items-center">
                <i class="fas fa-layer-group text-indigo-600 mr-3"></i>
                多策略优化器
            </h1>
            <p class="text-gray-600">投资组合优化、风险平价和多策略组合管理</p>
        </div>

        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-list text-blue-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">已选策略</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="selected-strategies">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-chart-line text-green-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">组合收益</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="portfolio-return">--</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-shield-alt text-yellow-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">组合风险</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="portfolio-risk">--</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-balance-scale text-purple-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">夏普比率</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="portfolio-sharpe">--</dd>
                    </div>
                </div>
            </div>
        </div>

        <!-- Strategy Selection -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-gray-800">选择策略</h3>
                    <div class="flex space-x-2">
                        <button onclick="selectAll()" class="text-sm text-blue-600 hover:text-blue-800">全选</button>
                        <button onclick="deselectAll()" class="text-sm text-gray-600 hover:text-gray-800">全不选</button>
                    </div>
                </div>
            </div>
            <div class="p-6">
                <div id="strategyList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                        <div>加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Optimization Configuration -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">优化配置</h3>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">优化方法</label>
                        <select id="optimizationMethod" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                            <option value="risk_parity">风险平价</option>
                            <option value="mean_variance">均值方差</option>
                            <option value="equal_weight">等权重</option>
                            <option value="max_sharpe">最大夏普</option>
                            <option value="min_variance">最小方差</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">目标收益 (%)</label>
                        <input type="number" id="targetReturn" value="15" step="0.1" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">最大风险 (%)</label>
                        <input type="number" id="maxRisk" value="20" step="0.1" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                    </div>
                </div>
            </div>
        </div>

        <!-- Optimization Results -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800">权重分配</h3>
                </div>
                <div class="p-6">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800">收益风险图</h3>
                </div>
                <div class="p-6">
                    <canvas id="riskReturnChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Correlation Matrix -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">策略相关性矩阵</h3>
            </div>
            <div class="p-6 overflow-x-auto">
                <div id="correlationMatrix" class="text-center text-gray-500 py-8">
                    <i class="fas fa-info-circle text-2xl mb-2"></i>
                    <div>请先选择策略并运行优化</div>
                </div>
            </div>
        </div>

        <!-- Weight Allocation Table -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">权重分配详情</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">策略名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">权重</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">预期收益</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">风险贡献</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody id="weightTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                <i class="fas fa-info-circle text-2xl mb-2"></i>
                                <div>请先选择策略并运行优化</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-end space-x-4">
            <button onclick="runOptimization()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition duration-300">
                <i class="fas fa-play mr-2"></i>运行优化
            </button>
            <button onclick="exportPortfolio()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition duration-300">
                <i class="fas fa-download mr-2"></i>导出组合
            </button>
        </div>
    </div>

    <script>
        let weightChart, riskReturnChart;
        let selectedStrategies = new Set();
        let allStrategies = [];

        function getApiBaseUrl(endpoint = '') {
            const baseUrl = '/api/v1';
            return baseUrl + endpoint;
        }

        async function loadStrategies() {
            try {
                const response = await fetch(getApiBaseUrl('/strategy/conceptions'));
                if (!response.ok) throw new Error('加载失败');
                
                allStrategies = await response.json();
                renderStrategyList();
            } catch (error) {
                console.error('加载策略列表失败:', error);
            }
        }

        function renderStrategyList() {
            const container = document.getElementById('strategyList');
            
            if (allStrategies.length === 0) {
                container.innerHTML = `
                    <div class="col-span-3 text-center text-gray-500 py-8">
                        <i class="fas fa-inbox text-2xl mb-2"></i>
                        <div>暂无策略</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = allStrategies.map(strategy => {
                const isSelected = selectedStrategies.has(strategy.id);
                return `
                    <div class="strategy-checkbox border-2 rounded-lg p-4 ${isSelected ? 'selected border-blue-500' : 'border-gray-200'}" 
                         onclick="toggleStrategy('${strategy.id}')">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <div class="font-semibold text-gray-900">${strategy.name || strategy.id}</div>
                                <div class="text-sm text-gray-500">${strategy.type || ''}</div>
                            </div>
                            <input type="checkbox" ${isSelected ? 'checked' : ''} 
                                   onclick="event.stopPropagation(); toggleStrategy('${strategy.id}')"
                                   class="w-5 h-5 text-blue-600 rounded">
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleStrategy(strategyId) {
            if (selectedStrategies.has(strategyId)) {
                selectedStrategies.delete(strategyId);
            } else {
                selectedStrategies.add(strategyId);
            }
            renderStrategyList();
            updateSelectedCount();
        }

        function selectAll() {
            allStrategies.forEach(s => selectedStrategies.add(s.id));
            renderStrategyList();
            updateSelectedCount();
        }

        function deselectAll() {
            selectedStrategies.clear();
            renderStrategyList();
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selected-strategies').textContent = selectedStrategies.size;
        }

        async function runOptimization() {
            if (selectedStrategies.size < 2) {
                alert('请至少选择2个策略');
                return;
            }

            const method = document.getElementById('optimizationMethod').value;
            const targetReturn = parseFloat(document.getElementById('targetReturn').value) / 100;
            const maxRisk = parseFloat(document.getElementById('maxRisk').value) / 100;

            try {
                const response = await fetch(getApiBaseUrl('/strategy/portfolio/optimize'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        strategy_ids: Array.from(selectedStrategies),
                        method: method,
                        target_return: targetReturn,
                        max_risk: maxRisk
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    renderOptimizationResults(result);
                } else {
                    alert('优化失败');
                }
            } catch (error) {
                console.error('运行优化失败:', error);
                alert('优化失败: ' + error.message);
            }
        }

        function renderOptimizationResults(result) {
            const weights = result.weights || {};
            const portfolioMetrics = result.portfolio_metrics || {};
            const correlation = result.correlation_matrix || {};

            // 更新统计卡片
            document.getElementById('portfolio-return').textContent = 
                portfolioMetrics.expected_return ? (portfolioMetrics.expected_return * 100).toFixed(2) + '%' : '--';
            document.getElementById('portfolio-risk').textContent = 
                portfolioMetrics.volatility ? (portfolioMetrics.volatility * 100).toFixed(2) + '%' : '--';
            document.getElementById('portfolio-sharpe').textContent = 
                portfolioMetrics.sharpe_ratio ? portfolioMetrics.sharpe_ratio.toFixed(4) : '--';

            // 更新权重图表
            updateWeightChart(weights);

            // 更新收益风险图
            updateRiskReturnChart(result.strategy_metrics || []);

            // 更新相关性矩阵
            renderCorrelationMatrix(correlation);

            // 更新权重分配表
            renderWeightTable(weights, result.strategy_metrics || []);
        }

        function updateWeightChart(weights) {
            if (!weightChart) return;

            const labels = Object.keys(weights);
            const data = Object.values(weights).map(w => w * 100);

            weightChart.data.labels = labels;
            weightChart.data.datasets[0].data = data;
            weightChart.update();
        }

        function updateRiskReturnChart(strategyMetrics) {
            if (!riskReturnChart || strategyMetrics.length === 0) return;

            const data = strategyMetrics.map(s => ({
                x: s.volatility || 0,
                y: s.expected_return || 0,
                label: s.name || s.id
            }));

            riskReturnChart.data.datasets[0].data = data;
            riskReturnChart.update();
        }

        function renderCorrelationMatrix(correlation) {
            const strategies = Object.keys(correlation);
            if (strategies.length === 0) {
                document.getElementById('correlationMatrix').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-info-circle text-2xl mb-2"></i>
                        <div>请先选择策略并运行优化</div>
                    </div>
                `;
                return;
            }

            let html = '<table class="min-w-full"><thead><tr><th class="px-4 py-2"></th>';
            strategies.forEach(s => {
                html += `<th class="px-4 py-2 text-sm font-medium text-gray-700">${s.substring(0, 10)}</th>`;
            });
            html += '</tr></thead><tbody>';

            strategies.forEach(s1 => {
                html += `<tr><td class="px-4 py-2 text-sm font-medium text-gray-700">${s1.substring(0, 10)}</td>`;
                strategies.forEach(s2 => {
                    const corr = correlation[s1] && correlation[s1][s2] ? correlation[s1][s2] : 0;
                    const color = corr > 0.7 ? 'bg-red-100' : corr > 0.3 ? 'bg-yellow-100' : 'bg-green-100';
                    html += `<td class="px-4 py-2 text-center ${color}">${corr.toFixed(2)}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';

            document.getElementById('correlationMatrix').innerHTML = html;
        }

        function renderWeightTable(weights, strategyMetrics) {
            const tbody = document.getElementById('weightTableBody');
            
            const rows = Object.entries(weights).map(([strategyId, weight]) => {
                const strategy = strategyMetrics.find(s => s.id === strategyId) || {};
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">
                            ${strategy.name || strategyId}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="w-32 bg-gray-200 rounded-full h-2 mr-2">
                                    <div class="bg-blue-600 h-2 rounded-full" style="width: ${weight * 100}%"></div>
                                </div>
                                <span class="text-sm font-medium">${(weight * 100).toFixed(2)}%</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${strategy.expected_return ? (strategy.expected_return * 100).toFixed(2) + '%' : '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${strategy.risk_contribution ? (strategy.risk_contribution * 100).toFixed(2) + '%' : '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button onclick="adjustWeight('${strategyId}')" class="text-blue-600 hover:text-blue-900">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            tbody.innerHTML = rows || `
                <tr>
                    <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                        <i class="fas fa-info-circle text-2xl mb-2"></i>
                        <div>请先选择策略并运行优化</div>
                    </td>
                </tr>
            `;
        }

        function adjustWeight(strategyId) {
            const newWeight = prompt('请输入新的权重 (0-100):');
            if (newWeight !== null) {
                const weight = parseFloat(newWeight) / 100;
                if (weight >= 0 && weight <= 1) {
                    alert('调整权重功能开发中');
                } else {
                    alert('权重必须在0-100之间');
                }
            }
        }

        function exportPortfolio() {
            alert('导出组合功能开发中');
        }

        function refreshData() {
            loadStrategies();
        }

        function initCharts() {
            const weightCtx = document.getElementById('weightChart').getContext('2d');
            weightChart = new Chart(weightCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            'rgba(59, 130, 246, 0.8)',
                            'rgba(139, 92, 246, 0.8)',
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(245, 158, 11, 0.8)',
                            'rgba(239, 68, 68, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });

            const riskReturnCtx = document.getElementById('riskReturnChart').getContext('2d');
            riskReturnChart = new Chart(riskReturnCtx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '策略',
                        data: [],
                        backgroundColor: 'rgba(59, 130, 246, 0.5)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            title: { display: true, text: '风险 (波动率)' }
                        },
                        y: {
                            title: { display: true, text: '预期收益' }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.raw.label || '';
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadStrategies();
        });
    </script>
</body>
</html>
