<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器缓存检查工具</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .code { background: #f8f9fa; padding: 10px; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>数据源配置页面缓存检查工具</h1>
    <p>此工具用于检查浏览器是否正确加载了最新版本的数据源配置页面功能。</p>

    <button onclick="checkPageVersion()">检查页面版本</button>
    <button onclick="testNewFeatures()">测试新功能</button>
    <button onclick="clearBrowserCache()">清除浏览器缓存</button>
    <button onclick="openDataSourcesPage()">打开数据源配置页面</button>

    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            resultsDiv.appendChild(div);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        async function checkPageVersion() {
            try {
                addResult('正在检查页面版本...', 'info');

                // 检查数据源配置页面是否可访问
                const response = await fetch('/data-sources-config.html', {
                    cache: 'no-cache',
                    headers: { 'Cache-Control': 'no-cache' }
                });

                if (!response.ok) {
                    addResult(`❌ 无法访问页面: HTTP ${response.status}`, 'error');
                    return;
                }

                const html = await response.text();
                addResult(`✅ 页面可访问，内容长度: ${html.length} 字符`, 'success');

                // 检查关键功能是否存在
                const checks = [
                    { name: '数据源类型过滤', pattern: '数据源类型过滤', required: true },
                    { name: '图表数据缓存', pattern: '图表数据状态', required: true },
                    { name: '状态指示器', pattern: '数据源状态指示器', required: true },
                    { name: '可见计数修复', pattern: 'updateVisibleCount', required: true },
                    { name: '过滤功能', pattern: 'applyFilters', required: true },
                    { name: '缓存功能', pattern: 'chartDataCache', required: true }
                ];

                let allPassed = true;
                checks.forEach(check => {
                    const found = html.includes(check.pattern);
                    if (found) {
                        addResult(`✅ ${check.name}功能存在`, 'success');
                    } else {
                        addResult(`❌ ${check.name}功能缺失`, 'error');
                        if (check.required) allPassed = false;
                    }
                });

                if (allPassed) {
                    addResult('🎉 所有必需功能都存在，页面版本正确！', 'success');
                } else {
                    addResult('⚠️ 部分功能缺失，可能需要强制刷新', 'warning');
                }

            } catch (error) {
                addResult(`❌ 检查失败: ${error.message}`, 'error');
            }
        }

        async function testNewFeatures() {
            try {
                addResult('正在测试新功能...', 'info');

                // 打开数据源配置页面
                const dataSourcesWindow = window.open('/data-sources-config.html', '_blank');
                if (!dataSourcesWindow) {
                    addResult('❌ 无法打开新窗口，请允许弹出窗口', 'error');
                    return;
                }

                addResult('✅ 已打开数据源配置页面', 'success');
                addResult('请在新页面中检查以下功能:', 'info');

                const instructions = [
                    '1. 查看页面顶部是否有"数据源类型过滤"区域',
                    '2. 查看页面顶部是否有"数据源状态指示器"区域',
                    '3. 查看页面顶部是否有"图表数据状态"区域',
                    '4. 尝试点击"显示禁用数据源"开关，观察计数是否正确更新',
                    '5. 尝试使用过滤功能，观察图表是否相应更新'
                ];

                instructions.forEach(instruction => {
                    addResult(instruction, 'info');
                });

            } catch (error) {
                addResult(`❌ 测试失败: ${error.message}`, 'error');
            }
        }

        function clearBrowserCache() {
            try {
                addResult('正在清除浏览器缓存...', 'info');

                // 清除所有缓存
                if ('caches' in window) {
                    caches.keys().then(names => {
                        names.forEach(name => {
                            caches.delete(name);
                            addResult(`🗑️ 清除缓存: ${name}`, 'info');
                        });
                    });
                }

                // 清除localStorage
                localStorage.clear();
                addResult('🗑️ 清除localStorage', 'info');

                // 清除sessionStorage
                sessionStorage.clear();
                addResult('🗑️ 清除sessionStorage', 'info');

                addResult('✅ 缓存清除完成，请刷新页面', 'success');

            } catch (error) {
                addResult(`❌ 清除缓存失败: ${error.message}`, 'error');
            }
        }

        function openDataSourcesPage() {
            window.open('/data-sources-config.html', '_blank');
            addResult('✅ 已打开数据源配置页面', 'success');
        }

        // 页面加载时自动检查
        window.addEventListener('load', () => {
            addResult('缓存检查工具已加载', 'info');
            addResult('建议步骤:', 'info');
            addResult('1. 点击"检查页面版本"确认代码已更新', 'info');
            addResult('2. 如果功能缺失，点击"清除浏览器缓存"', 'info');
            addResult('3. 然后点击"打开数据源配置页面"进行测试', 'info');
        });
    </script>
</body>
</html>
