<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RQA2025 策略生命周期管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .lifecycle-stage {
            position: relative;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: all 0.5s ease;
            cursor: pointer;
        }
        .lifecycle-stage:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .lifecycle-stage.active {
            background-color: #dbeafe;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
            animation: pulse 2s infinite;
        }
        .lifecycle-stage.completed {
            background-color: #d1fae5;
            border-left: 4px solid #10b981;
        }
        .lifecycle-stage.pending {
            background-color: #f3f4f6;
            border-left: 4px solid #9ca3af;
            opacity: 0.7;
        }
        .lifecycle-arrow {
            text-align: center;
            color: #6b7280;
            font-size: 1.5rem;
            margin: 0.5rem 0;
            transition: all 0.3s ease;
        }
        .lifecycle-stage.completed + .lifecycle-arrow {
            color: #10b981;
        }
        .lifecycle-stage.active + .lifecycle-arrow {
            color: #3b82f6;
            animation: bounce 1s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
            }
            50% {
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            }
            100% {
                box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
            }
        }
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }
        .stage-icon {
            transition: all 0.3s ease;
        }
        .lifecycle-stage:hover .stage-icon {
            transform: scale(1.1);
        }
        .lifecycle-stage.completed .stage-icon {
            animation: checkmark 0.5s ease;
        }
        @keyframes checkmark {
            0% {
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/dashboard" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-600 mr-2"></i>
                        <span class="text-xl font-bold text-indigo-600">RQA2025</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">策略生命周期管理</span>
                    <button onclick="refreshData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-300">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 px-4">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 flex items-center">
                <i class="fas fa-sitemap text-indigo-600 mr-3"></i>
                策略生命周期管理
            </h1>
            <p class="text-gray-600">管理策略从创建到退市的完整生命周期流程</p>
        </div>

        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-layer-group text-blue-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">总策略数</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="total-strategies">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-play-circle text-green-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">运行中</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="running-strategies">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-code-branch text-yellow-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">开发中</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="developing-strategies">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-archive text-gray-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">已退市</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="retired-strategies">0</dd>
                    </div>
                </div>
            </div>
        </div>

        <!-- Strategy Selection -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">选择策略</h3>
            </div>
            <div class="p-6">
                <select id="strategySelect" onchange="loadStrategyLifecycle()" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                    <option value="">请选择策略...</option>
                </select>
            </div>
        </div>

        <!-- Lifecycle Visualization -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">生命周期流程</h3>
            </div>
            <div class="p-6" id="lifecycleFlow">
                <div class="text-center text-gray-500 py-8">
                    <i class="fas fa-info-circle text-2xl mb-2"></i>
                    <div>请选择一个策略查看其生命周期</div>
                </div>
            </div>
        </div>

        <!-- Lifecycle Events Timeline -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">生命周期事件历史</h3>
            </div>
            <div class="p-6">
                <div id="lifecycleEvents" class="space-y-4">
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-clock text-2xl mb-2"></i>
                        <div>暂无事件记录</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Model Strategy Deployment -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-brain text-purple-600 mr-2"></i>
                    模型策略部署
                </h3>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 模型选择 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">选择训练好的模型</label>
                        <select id="modelSelect" onchange="onModelSelectChange()" 
                                class="w-full border border-gray-300 rounded-lg px-4 py-2">
                            <option value="">加载中...</option>
                        </select>
                    </div>
                    
                    <!-- 策略名称 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">策略名称</label>
                        <input type="text" id="modelStrategyName" 
                               placeholder="例如：LSTM趋势策略"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2">
                    </div>
                    
                    <!-- 预测阈值 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            预测阈值: <span id="thresholdValue">0.5</span>
                        </label>
                        <input type="range" id="predictionThreshold" min="0.1" max="0.9" step="0.1" value="0.5"
                               oninput="document.getElementById('thresholdValue').textContent = this.value"
                               class="w-full">
                        <p class="text-xs text-gray-500 mt-1">阈值越高，交易信号越保守</p>
                    </div>
                    
                    <!-- 置信度阈值 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            置信度阈值: <span id="confidenceValue">0.7</span>
                        </label>
                        <input type="range" id="confidenceThreshold" min="0.5" max="0.95" step="0.05" value="0.7"
                               oninput="document.getElementById('confidenceValue').textContent = this.value"
                               class="w-full">
                        <p class="text-xs text-gray-500 mt-1">低于此置信度的信号将被过滤</p>
                    </div>
                    
                    <!-- 仓位管理 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">仓位管理方式</label>
                        <select id="positionSizing" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                            <option value="equal">等权重</option>
                            <option value="confidence_based">基于置信度</option>
                            <option value="kelly">Kelly公式</option>
                        </select>
                    </div>
                    
                    <!-- 最大仓位 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            最大仓位: <span id="positionValue">20%</span>
                            <span class="text-xs text-red-500 ml-1">*最大30%</span>
                        </label>
                        <input type="range" id="maxPositionSize" min="0.05" max="0.30" step="0.05" value="0.2"
                               oninput="document.getElementById('positionValue').textContent = Math.round(this.value * 100) + '%'; validatePositionSize(this.value)"
                               class="w-full">
                        <p class="text-xs text-gray-500 mt-1">建议不超过20%，最高30%</p>
                    </div>
                </div>
                
                <!-- 风险控制参数 -->
                <div class="mt-6 p-4 bg-red-50 rounded-lg border border-red-200">
                    <h4 class="font-semibold text-red-800 mb-3 flex items-center">
                        <i class="fas fa-shield-alt mr-2"></i>风险控制参数（必需）
                    </h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- 止损比例 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                止损比例: <span id="stopLossValue">5%</span>
                            </label>
                            <input type="range" id="stopLoss" min="0.01" max="0.10" step="0.01" value="0.05"
                                   oninput="document.getElementById('stopLossValue').textContent = Math.round(this.value * 100) + '%'"
                                   class="w-full">
                            <p class="text-xs text-gray-500 mt-1">建议范围: 1%-10%</p>
                        </div>
                        
                        <!-- 止盈比例 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                止盈比例: <span id="takeProfitValue">10%</span>
                            </label>
                            <input type="range" id="takeProfit" min="0.02" max="0.20" step="0.01" value="0.10"
                                   oninput="document.getElementById('takeProfitValue').textContent = Math.round(this.value * 100) + '%'"
                                   class="w-full">
                            <p class="text-xs text-gray-500 mt-1">建议范围: 2%-20%</p>
                        </div>
                        
                        <!-- 最大回撤 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                最大回撤限制: <span id="maxDrawdownValue">10%</span>
                            </label>
                            <input type="range" id="maxDrawdown" min="0.05" max="0.15" step="0.01" value="0.10"
                                   oninput="document.getElementById('maxDrawdownValue').textContent = Math.round(this.value * 100) + '%'"
                                   class="w-full">
                            <p class="text-xs text-gray-500 mt-1">建议范围: 5%-15%</p>
                        </div>
                    </div>
                </div>
                
                <!-- 模型信息 -->
                <div id="modelInfo" class="hidden mt-4 p-4 bg-purple-50 rounded-lg">
                    <h4 class="font-semibold text-purple-800 mb-2">模型信息</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                        <div><span class="text-gray-600">模型类型:</span> <span id="modelType" class="font-medium">-</span></div>
                        <div><span class="text-gray-600">准确率:</span> <span id="modelAccuracy" class="font-medium">-</span></div>
                        <div><span class="text-gray-600">训练日期:</span> <span id="modelTrainDate" class="font-medium">-</span></div>
                        <div><span class="text-gray-600">模型ID:</span> <span id="modelIdDisplay" class="font-medium text-xs">-</span></div>
                    </div>
                </div>
                
                <!-- 部署按钮 -->
                <div class="mt-6">
                    <button onclick="deployModelStrategy()" 
                            class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-lg transition duration-300 flex items-center">
                        <i class="fas fa-robot mr-2"></i>部署模型策略
                    </button>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">生命周期操作</h3>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="deployStrategy()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition duration-300">
                        <i class="fas fa-rocket mr-2"></i>部署策略
                    </button>
                    <button onclick="retireStrategy()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg transition duration-300">
                        <i class="fas fa-archive mr-2"></i>退市策略
                    </button>
                    <button onclick="viewLifecycleHistory()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition duration-300">
                        <i class="fas fa-history mr-2"></i>查看历史
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const lifecycleStages = [
            { id: 'created', name: '已创建', icon: 'fa-plus-circle' },
            { id: 'designing', name: '设计中', icon: 'fa-pencil-alt' },
            { id: 'developing', name: '开发中', icon: 'fa-code' },
            { id: 'testing', name: '测试中', icon: 'fa-vial' },
            { id: 'backtesting', name: '回测中', icon: 'fa-chart-line' },
            { id: 'optimizing', name: '优化中', icon: 'fa-cogs' },
            { id: 'validating', name: '验证中', icon: 'fa-check-circle' },
            { id: 'deploying', name: '部署中', icon: 'fa-rocket' },
            { id: 'running', name: '运行中', icon: 'fa-play-circle' },
            { id: 'monitoring', name: '监控中', icon: 'fa-eye' },
            { id: 'maintaining', name: '维护中', icon: 'fa-wrench' },
            { id: 'retiring', name: '退市中', icon: 'fa-hourglass-half' },
            { id: 'retired', name: '已退市', icon: 'fa-archive' }
        ];

        function getApiBaseUrl(endpoint = '') {
            const baseUrl = '/api/v1';
            return baseUrl + endpoint;
        }

        function showLoading(elementId, message = '加载中...') {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                        <div>${message}</div>
                    </div>
                `;
            }
        }

        function showError(elementId, message = '加载失败') {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `
                    <div class="text-center text-red-500 py-8">
                        <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
                        <div>${message}</div>
                    </div>
                `;
            }
        }

        function showSuccess(message = '操作成功') {
            alert(`✅ ${message}`);
        }

        function showErrorAlert(message = '操作失败') {
            alert(`❌ ${message}`);
        }

        // 加载可用模型列表
        async function loadAvailableModels() {
            const select = document.getElementById('modelSelect');
            const modelInfo = document.getElementById('modelInfo');
            
            select.innerHTML = '<option value="">加载中...</option>';
            select.disabled = true;
            modelInfo.classList.add('hidden');
            
            try {
                const response = await fetch(getApiBaseUrl('/strategy/lifecycle/models/available'));
                if (!response.ok) {
                    throw new Error('加载模型列表失败');
                }
                
                const result = await response.json();
                
                // 防御性编程：确保返回的数据格式正确
                let models = [];
                if (result && typeof result === 'object') {
                    models = result.models || result.data || [];
                }
                
                // 确保 models 是数组
                if (!Array.isArray(models)) {
                    console.warn('API返回的模型数据不是数组:', models);
                    models = [];
                }
                
                if (models.length === 0) {
                    select.innerHTML = '<option value="">没有可用的训练好的模型</option>';
                } else {
                    select.innerHTML = '<option value="">请选择模型...</option>' +
                        models.map(m => `<option value="${m.model_id}" data-info='${JSON.stringify(m)}'>${m.description}</option>`).join('');
                }
            } catch (error) {
                console.error('加载模型列表失败:', error);
                select.innerHTML = '<option value="">加载失败</option>';
            } finally {
                select.disabled = false;
            }
        }
        
        // 模型选择变化处理
        function onModelSelectChange() {
            const select = document.getElementById('modelSelect');
            const modelInfo = document.getElementById('modelInfo');
            const selectedOption = select.options[select.selectedIndex];
            
            if (selectedOption.value && selectedOption.dataset.info) {
                const model = JSON.parse(selectedOption.dataset.info);
                
                // 显示模型信息
                document.getElementById('modelType').textContent = model.model_type || '-';
                document.getElementById('modelAccuracy').textContent = model.accuracy ? (model.accuracy * 100).toFixed(2) + '%' : '-';
                document.getElementById('modelTrainDate').textContent = model.trained_at ? new Date(model.trained_at).toLocaleDateString() : '-';
                document.getElementById('modelIdDisplay').textContent = model.model_id || '-';
                
                // 自动填充策略名称
                if (!document.getElementById('modelStrategyName').value) {
                    document.getElementById('modelStrategyName').value = `${model.model_type}策略-${model.model_id.slice(-6)}`;
                }
                
                modelInfo.classList.remove('hidden');
            } else {
                modelInfo.classList.add('hidden');
            }
        }
        
        // 验证部署参数
        function validateDeploymentParams() {
            const errors = [];
            
            // 验证预测阈值
            const predThreshold = parseFloat(document.getElementById('predictionThreshold').value);
            if (isNaN(predThreshold) || predThreshold < 0.1 || predThreshold > 0.9) {
                errors.push('预测阈值必须在 0.1-0.9 之间');
            }
            
            // 验证置信度阈值
            const confThreshold = parseFloat(document.getElementById('confidenceThreshold').value);
            if (isNaN(confThreshold) || confThreshold < 0.5 || confThreshold > 0.95) {
                errors.push('置信度阈值必须在 0.5-0.95 之间');
            }
            
            // 验证最大仓位
            const maxPosition = parseFloat(document.getElementById('maxPositionSize').value);
            if (isNaN(maxPosition) || maxPosition < 0.05 || maxPosition > 0.30) {
                errors.push('最大仓位必须在 5%-30% 之间');
            }
            if (maxPosition > 0.20) {
                if (!confirm('最大仓位超过20%，风险较高，是否继续？')) {
                    return false;
                }
            }
            
            // 验证风控参数
            const stopLoss = parseFloat(document.getElementById('stopLoss').value);
            if (isNaN(stopLoss) || stopLoss < 0.01 || stopLoss > 0.10) {
                errors.push('止损比例必须在 1%-10% 之间');
            }
            
            const takeProfit = parseFloat(document.getElementById('takeProfit').value);
            if (isNaN(takeProfit) || takeProfit < 0.02 || takeProfit > 0.20) {
                errors.push('止盈比例必须在 2%-20% 之间');
            }
            
            const maxDrawdown = parseFloat(document.getElementById('maxDrawdown').value);
            if (isNaN(maxDrawdown) || maxDrawdown < 0.05 || maxDrawdown > 0.15) {
                errors.push('最大回撤限制必须在 5%-15% 之间');
            }
            
            if (errors.length > 0) {
                showErrorAlert('参数验证失败:\n' + errors.join('\n'));
                return false;
            }
            
            return true;
        }
        
        // 验证仓位大小并显示警告
        function validatePositionSize(value) {
            const numValue = parseFloat(value);
            const warningEl = document.getElementById('positionWarning');
            if (numValue > 0.20) {
                if (!warningEl) {
                    const input = document.getElementById('maxPositionSize');
                    const warning = document.createElement('p');
                    warning.id = 'positionWarning';
                    warning.className = 'text-xs text-red-600 mt-1 font-semibold';
                    warning.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i>警告：仓位超过20%，风险较高';
                    input.parentNode.appendChild(warning);
                }
            } else if (warningEl) {
                warningEl.remove();
            }
        }
        
        // 部署模型策略
        async function deployModelStrategy() {
            const modelId = document.getElementById('modelSelect').value;
            const strategyName = document.getElementById('modelStrategyName').value;
            
            // 基础验证
            if (!modelId) {
                showErrorAlert('请选择训练好的模型');
                return;
            }
            
            if (!strategyName.trim()) {
                showErrorAlert('请输入策略名称');
                return;
            }
            
            // 参数验证
            if (!validateDeploymentParams()) {
                return;
            }
            
            // 获取所有参数
            const predictionThreshold = parseFloat(document.getElementById('predictionThreshold').value);
            const confidenceThreshold = parseFloat(document.getElementById('confidenceThreshold').value);
            const positionSizing = document.getElementById('positionSizing').value;
            const maxPositionSize = parseFloat(document.getElementById('maxPositionSize').value);
            const stopLoss = parseFloat(document.getElementById('stopLoss').value);
            const takeProfit = parseFloat(document.getElementById('takeProfit').value);
            const maxDrawdown = parseFloat(document.getElementById('maxDrawdown').value);
            
            try {
                const response = await fetch(getApiBaseUrl('/strategy/lifecycle/model/deploy'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model_id: modelId,
                        name: strategyName,
                        prediction_threshold: predictionThreshold,
                        confidence_threshold: confidenceThreshold,
                        position_sizing: positionSizing,
                        max_position_size: maxPositionSize,
                        stop_loss: stopLoss,
                        take_profit: takeProfit,
                        max_drawdown: maxDrawdown,
                        operator: 'user'  // TODO: 从登录会话获取实际用户名
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: '部署失败' }));
                    throw new Error(errorData.detail || '部署失败');
                }
                
                const result = await response.json();
                showSuccess(`模型策略部署成功！策略ID: ${result.strategy_id}\n状态: ${result.status}\n注意: ${result.note}`);
                
                // 刷新策略列表
                await loadStrategies();
                
                // 清空表单
                document.getElementById('modelSelect').value = '';
                document.getElementById('modelStrategyName').value = '';
                document.getElementById('modelInfo').classList.add('hidden');
                
            } catch (error) {
                console.error('部署模型策略失败:', error);
                showErrorAlert(`部署失败: ${error.message}`);
            }
        }
        
        async function loadStrategies() {
            try {
                const select = document.getElementById('strategySelect');
                if (!select) {
                    console.error('strategySelect 元素未找到');
                    return;
                }
                
                select.innerHTML = '<option value="">加载中...</option>';
                
                // 添加时间戳防止缓存
                const timestamp = new Date().getTime();
                
                // 同时从两个数据源加载：策略构思和执行状态
                const [conceptionsRes, executionRes] = await Promise.all([
                    fetch(getApiBaseUrl('/strategy/conceptions') + '?_t=' + timestamp),
                    fetch(getApiBaseUrl('/strategy/execution/status') + '?_t=' + timestamp).catch(() => null)
                ]);
                
                if (!conceptionsRes.ok) {
                    const errorData = await conceptionsRes.json().catch(() => ({ detail: '加载失败' }));
                    throw new Error(errorData.detail || '加载失败');
                }
                
                const conceptionsResult = await conceptionsRes.json();
                
                // 调试日志
                console.log('策略构思 API 响应:', conceptionsResult);
                
                // 防御性编程：确保返回的数据格式正确
                let strategies = [];
                if (conceptionsResult && typeof conceptionsResult === 'object') {
                    strategies = conceptionsResult.conceptions || conceptionsResult.data || conceptionsResult.strategies || conceptionsResult;
                }
                
                // 确保 strategies 是数组
                if (!Array.isArray(strategies)) {
                    console.warn('API返回的策略数据不是数组:', strategies);
                    strategies = [];
                }
                
                // 从执行状态获取运行中的策略
                let executionStrategies = [];
                if (executionRes && executionRes.ok) {
                    const executionResult = await executionRes.json();
                    console.log('执行状态 API 响应:', executionResult);
                    executionStrategies = executionResult.strategies || [];
                }
                
                // 合并两个数据源：将执行状态中的策略添加到列表中（如果不存在）
                const strategyMap = new Map(strategies.map(s => [s.id, s]));
                
                executionStrategies.forEach(execStrategy => {
                    if (!strategyMap.has(execStrategy.id)) {
                        // 创建一个新的策略对象，融合执行状态信息
                        const mergedStrategy = {
                            id: execStrategy.id,
                            name: execStrategy.name || execStrategy.id,
                            type: execStrategy.type || 'unknown',
                            // 如果策略在运行中，设置生命周期阶段为 live_trading
                            lifecycle_stage: execStrategy.status === 'running' ? 'live_trading' : 'draft',
                            // 标记这是从执行状态添加的策略
                            from_execution: true,
                            execution_status: execStrategy.status,
                            latency: execStrategy.latency,
                            throughput: execStrategy.throughput,
                            signals_count: execStrategy.signals_count,
                            positions_count: execStrategy.positions_count
                        };
                        strategyMap.set(execStrategy.id, mergedStrategy);
                        strategies.push(mergedStrategy);
                        console.log(`从执行状态添加策略: ${execStrategy.id}`);
                    } else {
                        // 更新现有策略的执行状态
                        const existingStrategy = strategyMap.get(execStrategy.id);
                        existingStrategy.execution_status = execStrategy.status;
                        // 如果正在运行，确保生命周期阶段反映运行状态
                        if (execStrategy.status === 'running' && !['live_trading', 'monitoring'].includes(existingStrategy.lifecycle_stage)) {
                            existingStrategy.lifecycle_stage = 'live_trading';
                        }
                    }
                });
                
                console.log('合并后的策略数组:', strategies);
                console.log('策略数量:', strategies.length);
                console.log('运行中策略数量:', strategies.filter(s => ['live_trading', 'running', 'monitoring'].includes(s.lifecycle_stage)).length);
                
                // 安全调用 map
                if (strategies.length === 0) {
                    select.innerHTML = '<option value="">暂无策略</option>';
                } else {
                    select.innerHTML = '<option value="">请选择策略...</option>' +
                        strategies.map(s => {
                            const statusIndicator = s.execution_status === 'running' ? '🟢 ' : 
                                                  s.from_execution ? '⚪ ' : '';
                            return `<option value="${s.id}">${statusIndicator}${s.name || s.id}</option>`;
                        }).join('');
                }
                
                updateStatistics(strategies);
            } catch (error) {
                console.error('加载策略列表失败:', error);
                console.error('错误堆栈:', error.stack);
                showErrorAlert(`加载策略列表失败: ${error.message}`);
                const select = document.getElementById('strategySelect');
                if (select) {
                    select.innerHTML = '<option value="">加载失败，请刷新页面重试</option>';
                }
            }
        }

        function updateStatistics(strategies) {
            const stats = {
                total: strategies.length,
                running: strategies.filter(s => ['live_trading', 'paused'].includes(s.lifecycle_stage)).length,
                developing: strategies.filter(s => ['draft', 'design', 'backtesting', 'optimizing', 'paper_trading'].includes(s.lifecycle_stage)).length,
                retired: strategies.filter(s => ['archived', 'failed'].includes(s.lifecycle_stage)).length
            };

            document.getElementById('total-strategies').textContent = stats.total;
            document.getElementById('running-strategies').textContent = stats.running;
            document.getElementById('developing-strategies').textContent = stats.developing;
            document.getElementById('retired-strategies').textContent = stats.retired;
        }

        async function loadStrategyLifecycle() {
            const strategyId = document.getElementById('strategySelect').value;
            if (!strategyId) {
                document.getElementById('lifecycleFlow').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-info-circle text-2xl mb-2"></i>
                        <div>请选择一个策略查看其生命周期</div>
                    </div>
                `;
                document.getElementById('lifecycleEvents').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-clock text-2xl mb-2"></i>
                        <div>暂无事件记录</div>
                    </div>
                `;
                return;
            }

            try {
                showLoading('lifecycleFlow', '加载生命周期数据...');
                showLoading('lifecycleEvents', '加载事件历史...');
                
                const response = await fetch(getApiBaseUrl(`/strategy/${strategyId}/lifecycle`));
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: '加载失败' }));
                    throw new Error(errorData.detail || '加载失败');
                }

                const data = await response.json();
                renderLifecycleFlow(data);
                renderLifecycleEvents(data.events || []);
            } catch (error) {
                console.error('加载生命周期数据失败:', error);
                showError('lifecycleFlow', `加载失败: ${error.message}`);
                showError('lifecycleEvents', `加载失败: ${error.message}`);
                showErrorAlert(`加载生命周期数据失败: ${error.message}`);
            }
        }

        function renderLifecycleFlow(data) {
            const currentStage = data.current_stage || 'created';
            const flowHtml = lifecycleStages.map((stage, index) => {
                let stageClass = 'pending';
                if (stage.id === currentStage) {
                    stageClass = 'active';
                } else {
                    const currentIndex = lifecycleStages.findIndex(s => s.id === currentStage);
                    if (index < currentIndex) {
                        stageClass = 'completed';
                    }
                }

                const arrow = index < lifecycleStages.length - 1 ? '<div class="lifecycle-arrow">→</div>' : '';
                const isCurrent = stage.id === currentStage;
                
                return `
                    <div class="lifecycle-stage ${stageClass}" onclick="showStageDetails('${stage.id}', '${stage.name}')">
                        <div class="flex items-center">
                            <i class="fas ${stage.icon} mr-3 text-lg stage-icon"></i>
                            <div class="flex-grow">
                                <div class="font-semibold">${stage.name}</div>
                                ${isCurrent ? '<div class="text-sm text-gray-500">当前阶段</div>' : ''}
                            </div>
                            ${isCurrent ? '<span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-medium">进行中</span>' : ''}
                        </div>
                    </div>
                    ${arrow}
                `;
            }).join('');

            document.getElementById('lifecycleFlow').innerHTML = flowHtml;
        }

        function showStageDetails(stageId, stageName) {
            const stageInfo = {
                created: { name: '已创建', description: '策略已创建，等待进一步操作' },
                designing: { name: '设计中', description: '正在设计策略逻辑和参数' },
                developing: { name: '开发中', description: '正在开发策略代码' },
                testing: { name: '测试中', description: '正在测试策略功能' },
                backtesting: { name: '回测中', description: '正在进行历史数据回测' },
                optimizing: { name: '优化中', description: '正在优化策略参数' },
                validating: { name: '验证中', description: '正在验证策略性能' },
                deploying: { name: '部署中', description: '正在部署策略到生产环境' },
                running: { name: '运行中', description: '策略正在运行并产生交易' },
                monitoring: { name: '监控中', description: '正在监控策略运行状态' },
                maintaining: { name: '维护中', description: '正在维护和更新策略' },
                retiring: { name: '退市中', description: '正在准备策略退市' },
                retired: { name: '已退市', description: '策略已退市，不再运行' }
            };

            const info = stageInfo[stageId] || { name: stageName, description: '暂无详细信息' };
            alert(`${info.name}\n\n${info.description}`);
        }

        function renderLifecycleEvents(events) {
            if (!events || events.length === 0) {
                document.getElementById('lifecycleEvents').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-clock text-2xl mb-2"></i>
                        <div>暂无事件记录</div>
                    </div>
                `;
                return;
            }

            const eventsHtml = events.map(event => `
                <div class="border-l-4 border-blue-500 pl-4 py-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-semibold text-gray-900">${event.event_type}</div>
                            <div class="text-sm text-gray-600">${event.description || ''}</div>
                        </div>
                        <div class="text-sm text-gray-500">
                            ${new Date(event.timestamp * 1000).toLocaleString('zh-CN')}
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('lifecycleEvents').innerHTML = eventsHtml;
        }

        async function deployStrategy() {
            const strategyId = document.getElementById('strategySelect').value;
            if (!strategyId) {
                showErrorAlert('请先选择策略');
                return;
            }

            if (!confirm('确定要部署此策略吗？')) return;

            try {
                showLoading('lifecycleFlow', '部署中...');
                
                const response = await fetch(getApiBaseUrl(`/strategy/${strategyId}/lifecycle/transition`), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        new_status: 'live_trading',
                        reason: '用户手动部署'
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    showSuccess('策略部署成功');
                    await loadStrategyLifecycle();
                } else {
                    const errorData = await response.json().catch(() => ({ detail: '部署失败' }));
                    throw new Error(errorData.detail || '部署失败');
                }
            } catch (error) {
                console.error('部署策略失败:', error);
                showErrorAlert(`部署失败: ${error.message}`);
                await loadStrategyLifecycle();
            }
        }

        async function retireStrategy() {
            const strategyId = document.getElementById('strategySelect').value;
            if (!strategyId) {
                showErrorAlert('请先选择策略');
                return;
            }

            if (!confirm('确定要退市此策略吗？此操作不可逆。')) return;

            try {
                showLoading('lifecycleFlow', '退市中...');

                // 1. 先停止策略执行（如果策略在运行中）
                try {
                    const stopResponse = await fetch(getApiBaseUrl(`/strategy/execution/${strategyId}/pause`), {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    if (stopResponse.ok) {
                        console.log(`策略 ${strategyId} 已停止执行`);
                    } else {
                        console.warn(`策略 ${strategyId} 停止执行失败，继续退市流程`);
                    }
                } catch (stopError) {
                    console.warn(`停止策略执行失败: ${stopError.message}，继续退市流程`);
                }

                // 2. 执行生命周期状态转换（退市）
                const response = await fetch(getApiBaseUrl(`/strategy/${strategyId}/lifecycle/transition`), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        new_status: 'archived',
                        reason: '用户手动退市'
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    showSuccess('策略已退市');
                    
                    // 3. 刷新所有相关数据
                    await loadStrategyLifecycle();
                    await loadStrategies();
                    
                    // 4. 触发执行监控页面数据刷新（通过发送自定义事件）
                    window.dispatchEvent(new CustomEvent('strategyRetired', { 
                        detail: { strategyId: strategyId } 
                    }));
                    
                    console.log(`策略 ${strategyId} 退市完成，执行监控页面数据已标记为需要刷新`);
                } else {
                    const errorData = await response.json().catch(() => ({ detail: '退市失败' }));
                    throw new Error(errorData.detail || '退市失败');
                }
            } catch (error) {
                console.error('退市策略失败:', error);
                showErrorAlert(`退市失败: ${error.message}`);
                await loadStrategyLifecycle();
            }
        }

        async function viewLifecycleHistory() {
            const strategyId = document.getElementById('strategySelect').value;
            if (!strategyId) {
                showErrorAlert('请先选择策略');
                return;
            }
            
            try {
                showLoading('lifecycleEvents', '加载历史记录...');
                
                // 从API获取生命周期信息（包含所有事件）
                const response = await fetch(getApiBaseUrl(`/strategy/${strategyId}/lifecycle`));
                if (response.ok) {
                    const data = await response.json();
                    const events = data.events || [];
                    
                    if (events.length === 0) {
                        showErrorAlert('该策略暂无生命周期历史记录');
                        return;
                    }
                    
                    // 显示完整历史记录
                    const historyText = events.map((event, index) => {
                        const time = new Date(event.timestamp * 1000).toLocaleString('zh-CN');
                        return `${index + 1}. [${time}] ${event.event_type}: ${event.description || ''}`;
                    }).join('\n');
                    
                    const fullHistory = `策略生命周期历史记录 (${strategyId})\n\n当前阶段: ${data.current_stage || '未知'}\n\n历史事件:\n${historyText}`;
                    
                    alert(fullHistory);
                } else {
                    const errorData = await response.json().catch(() => ({ detail: '获取历史记录失败' }));
                    throw new Error(errorData.detail || '获取历史记录失败');
                }
            } catch (error) {
                console.error('获取生命周期历史失败:', error);
                showErrorAlert(`获取历史记录失败: ${error.message}`);
            } finally {
                await loadStrategyLifecycle();
            }
        }

        function refreshData() {
            loadStrategies();
            const strategyId = document.getElementById('strategySelect').value;
            if (strategyId) {
                loadStrategyLifecycle();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // 清除Service Worker缓存的策略列表数据，确保获取最新数据
            clearStrategyCache().then(() => {
                loadStrategies();
                loadAvailableModels(); // 加载可用模型列表
            });
        });
        
        /**
         * 清除策略相关的Service Worker缓存
         */
        async function clearStrategyCache() {
            if ('caches' in window) {
                try {
                    const cacheNames = await caches.keys();
                    for (const cacheName of cacheNames) {
                        if (cacheName.includes('api')) {
                            const cache = await caches.open(cacheName);
                            const requests = await cache.keys();
                            for (const request of requests) {
                                if (request.url.includes('/strategy/conceptions') || 
                                    request.url.includes('/strategy/lifecycle/models')) {
                                    await cache.delete(request);
                                    console.log('已清除缓存:', request.url);
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.warn('清除缓存失败:', error);
                }
            }
        }
    </script>
