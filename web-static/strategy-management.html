<script>
    // 页面引导配置
    const pageGuides = {
        'strategy-management': {
            title: '策略管理页面指南',
            steps: [
                {
                    icon: 'fa-plus',
                    title: '创建策略',
                    description: '点击"新建策略"按钮，使用策略构思工具创建新策略'
                },
                {
                    icon: 'fa-chart-line',
                    title: '回测策略',
                    description: '点击策略行的"回测"按钮，对策略进行历史数据回测'
                },
                {
                    icon: 'fa-sliders-h',
                    title: '优化策略',
                    description: '点击"优化"按钮，使用参数优化器寻找最优参数'
                },
                {
                    icon: 'fa-magic',
                    title: '一键执行',
                    description: '点击"一键执行"按钮，自动完成回测→优化→应用的完整流程'
                },
                {
                    icon: 'fa-rocket',
                    title: '发布部署',
                    description: '点击"发布"按钮，将策略部署到开发/测试/生产环境'
                },
                {
                    icon: 'fa-history',
                    title: '部署历史',
                    description: '点击"历史"按钮，查看策略的部署记录和回滚操作'
                },
                {
                    icon: 'fa-trash',
                    title: '删除策略',
                    description: '点击"删除"按钮，删除不需要的策略'
                }
            ]
        }
    };

    // 显示用户引导
    function showUserGuide() {
        const pageName = 'strategy-management';
        const guide = pageGuides[pageName];

        if (!guide) return;

        // 检查是否设置了不再显示
        const dontShow = localStorage.getItem('dont_show_guide_' + pageName);
        if (dontShow === 'true') return;

        // 创建引导弹窗
        const modal = document.createElement('div');
        modal.id = 'userGuideModal';
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        modal.innerHTML = `
            <div class="bg-white rounded-lg shadow-xl p-6 max-w-lg w-full mx-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-900">
                        <i class="fas fa-lightbulb text-yellow-500 mr-2"></i>
                        操作指南
                    </h3>
                    <button onclick="closeUserGuide()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="space-y-4 max-h-96 overflow-y-auto">
                    <p class="text-gray-600 mb-4">${guide.title}</p>
                    ${guide.steps.map((step, index) => `
                        <div class="flex items-start p-3 bg-gray-50 rounded-lg">
                            <div class="flex-shrink-0 w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                                <i class="fas ${step.icon} text-blue-600"></i>
                            </div>
                            <div>
                                <h4 class="font-medium text-gray-900">${index + 1}. ${step.title}</h4>
                                <p class="text-sm text-gray-600">${step.description}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-6 flex justify-between">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" id="dontShowAgain" class="mr-2">
                        不再显示
                    </label>
                    <button onclick="closeUserGuide()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                        知道了
                    </button>
                </div>
            </div>
        `;

        document.body.appendChild(modal);

        // 点击外部关闭
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeUserGuide();
            }
        });
    }

    // 关闭用户引导
    function closeUserGuide() {
        const modal = document.getElementById('userGuideModal');
        const dontShowAgain = document.getElementById('dontShowAgain');

        if (dontShowAgain && dontShowAgain.checked) {
            localStorage.setItem('dont_show_guide_strategy-management', 'true');
        }

        if (modal) {
            modal.remove();
        }
    }

    // 页面加载完成后显示引导
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(showUserGuide, 1500);
    });
</script>

    <script>
        // API Base URL - 使用相对路径通过nginx代理
        function getApiBaseUrl(endpoint = '') {
            const baseUrl = '/api/v1';
            return baseUrl + endpoint;
        }

        // 全局日期解析函数
        function parseDate(dateValue) {
            if (!dateValue) return '--';
            // 如果是数字（时间戳），转换为毫秒
            if (typeof dateValue === 'number') {
                return new Date(dateValue * 1000).toLocaleString('zh-CN');
            }
            // 如果是字符串（ISO格式），直接解析
            return new Date(dateValue).toLocaleString('zh-CN');
        }

        let allStrategies = [];
        let filteredStrategies = [];
        let selectedStrategies = new Set();

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof MobileUtils !== 'undefined') {
                MobileUtils.init();
            }
            if (typeof UXOptimization !== 'undefined') {
                UXOptimization.init();
            }
            
            loadStrategies();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('filterType').addEventListener('change', handleFilter);
        }

        async function loadStrategies() {
            try {
                console.log('[StrategyManagement] 开始加载策略列表...');
                const apiUrl = getApiBaseUrl('/strategy/conceptions');
                console.log('[StrategyManagement] API URL:', apiUrl);
                
                // 添加时间戳防止缓存
                const fetchUrl = `${apiUrl}?_t=${Date.now()}`;
                console.log('[StrategyManagement] Fetch URL:', fetchUrl);
                
                const response = await fetch(fetchUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    }
                });
                
                console.log('[StrategyManagement] 响应状态:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[StrategyManagement] 响应错误:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('[StrategyManagement] 响应数据:', result);
                
                allStrategies = Array.isArray(result) ? result : (result.conceptions || []);
                filteredStrategies = [...allStrategies];
                
                console.log('[StrategyManagement] 策略数量:', allStrategies.length);
                
                renderStrategyTable();
                updateStatistics();
            } catch (error) {
                console.error('[StrategyManagement] 加载策略列表失败:', error);
                document.getElementById('strategiesTableBody').innerHTML = `
                    <tr>
                        <td colspan="9" class="px-6 py-8 text-center text-red-500">
                            <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
                            <p>加载失败: ${error.message}</p>
                            <p class="text-sm text-gray-500 mt-2">请检查网络连接或刷新页面重试</p>
                            <button onclick="loadStrategies()" class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">重试</button>
                        </td>
                    </tr>
                `;
            }
        }

        function renderStrategyTable() {
            const tbody = document.getElementById('strategiesTableBody');
            if (filteredStrategies.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-2xl mb-2"></i>
                            <p>暂无策略</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filteredStrategies.map(strategy => {
                // 使用全局parseDate函数处理时间格式
                const createdDate = parseDate(strategy.created_at);
                const updatedDate = parseDate(strategy.updated_at);
                const nodeCount = strategy.nodes ? strategy.nodes.length : 0;
                const version = strategy.version || 1;
                const strategyType = getStrategyTypeName(strategy.strategyType || strategy.type || '');
                const isSelected = selectedStrategies.has(strategy.id);
                // 从stats或parameters._stats读取统计信息
                const stats = strategy.stats || strategy.parameters?._stats || {};
                const backtestCount = stats.backtest_count || 0;
                const optimizationCount = stats.optimization_count || 0;

                return `
                    <tr class="table-row-hover ${isSelected ? 'bg-blue-50' : ''}">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} 
                                onchange="toggleStrategySelection('${strategy.id}')"
                                class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="font-medium text-gray-900">${strategy.name || strategy.id}</div>
                            ${strategy.description ? `<div class="text-sm text-gray-500">${strategy.description}</div>` : ''}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${strategyType}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${createdDate}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${updatedDate}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${nodeCount}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">v${version}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800" title="回测次数">
                                <i class="fas fa-chart-line mr-1"></i>${backtestCount}
                            </span>
                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-pink-100 text-pink-800 ml-1" title="优化次数">
                                <i class="fas fa-sliders-h mr-1"></i>${optimizationCount}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <div class="flex space-x-2">
                                <button onclick="viewStrategyDetails('${strategy.id}')" 
                                    class="text-indigo-600 hover:text-indigo-900" title="查看详情">
                                    <i class="fas fa-eye"></i>

            const typeMap = {

                'ml_based': '机器学习',
                'arbitrage': '套利策略',

        function applyFilters() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('filterType').value;

            filteredStrategies = allStrategies.filter(strategy => {
                const matchesKeyword = !keyword || 
                    (strategy.name && strategy.name.toLowerCase().includes(keyword)) ||
                    (strategy.id && strategy.id.toLowerCase().includes(keyword)) ||
                    (strategy.strategyType && strategy.strategyType.toLowerCase().includes(keyword)) ||
                    (strategy.type && strategy.type.toLowerCase().includes(keyword));
                
                const matchesType = !typeFilter || 
                    strategy.strategyType === typeFilter || 
                    strategy.type === typeFilter;

                return matchesKeyword && matchesType;
            });

            renderStrategyTable();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            if (selectAll) {
                filteredStrategies.forEach(s => selectedStrategies.add(s.id));

                filteredStrategies.forEach(s => selectedStrategies.delete(s.id));
            }
            updateBatchButtons();
            renderStrategyTable();

            if (selectedStrategies.has(strategyId)) {

        function updateSelectAllCheckbox() {
            const selectAll = document.getElementById('selectAll');
            if (filteredStrategies.length === 0) {
                selectAll.checked = false;
                selectAll.indeterminate = false;
                return;
            }
            const allSelected = filteredStrategies.every(s => selectedStrategies.has(s.id));
            const someSelected = filteredStrategies.some(s => selectedStrategies.has(s.id));
            selectAll.checked = allSelected;
            selectAll.indeterminate = someSelected && !allSelected;
        }

        function updateStatistics() {
            document.getElementById('total-strategies').textContent = allStrategies.length;
            document.getElementById('active-strategies').textContent = allStrategies.length;
            
            // 统计回测和优化次数
            let totalBacktests = 0;
            let totalOptimizations = 0;
            
            allStrategies.forEach(s => {
                // 从stats或parameters._stats读取统计信息
                const stats = s.stats || s.parameters?._stats || {};
                totalBacktests += stats.backtest_count || 0;
                totalOptimizations += stats.optimization_count || 0;
            });
            
            document.getElementById('total-backtests').textContent = totalBacktests;
            document.getElementById('total-optimizations').textContent = totalOptimizations;
            
            if (allStrategies.length > 0) {
                const latest = allStrategies.reduce((latest, s) => {
                    const time = s.updated_at || s.created_at || 0;
                    return time > (latest.updated_at || latest.created_at || 0) ? s : latest;
                }, allStrategies[0]);
                const latestTime = latest.updated_at || latest.created_at;
                if (latestTime) {
                    // 处理时间格式 - 支持ISO字符串和时间戳
                    let date;
                    if (typeof latestTime === 'number') {
                        date = new Date(latestTime * 1000);
                    } else {
                        date = new Date(latestTime);

                    document.getElementById('last-updated').textContent = date.toLocaleDateString('zh-CN');
                }

                const totalNodes = allStrategies.reduce((sum, s) => sum + (s.nodes ? s.nodes.length : 0), 0);
                const avgNodes = Math.round(totalNodes / allStrategies.length);
                document.getElementById('avg-nodes').textContent = avgNodes;
            }
        }

            if (!confirm(`确定要对策略 "${strategyName}" 执行一键完整流程吗？\n\n流程包括：\n1. 回测验证\n2. 参数优化\n3. 应用最优参数\n\n这可能需要几分钟时间。`)) {

                        strategy_id: strategyId,

                if (!createResponse.ok) {

                currentWorkflowId = workflowData.workflow_id;

                // 显示工作流监控面板

                // 2. 开始执行流程
                await executeWorkflowSteps(strategyId, currentWorkflowId);

                alert('启动失败: ' + error.message);

        function updateWorkflowStep(stepName, status, message = '') {
            const stepEl = document.getElementById(`step-${stepName}`);
            if (!stepEl) return;

            const iconEl = stepEl.querySelector('i');
            stepEl.className = 'flex items-center p-2 rounded ' + (status === 'running' ? 'bg-blue-50' : status === 'completed' ? 'bg-green-50' : '');

            if (status === 'completed') {
                iconEl.className = 'fas fa-check-circle text-green-500 mr-2';
            } else if (status === 'running') {
                iconEl.className = 'fas fa-spinner fa-spin text-blue-500 mr-2';
            } else if (status === 'failed') {
                iconEl.className = 'fas fa-times-circle text-red-500 mr-2';
            }

            if (message) {
                const spanEl = stepEl.querySelector('span');
                spanEl.textContent = message;
            }
        }

            const progressBar = document.getElementById('workflowProgressBar');
            const progressText = document.getElementById('workflowProgressText');
            if (progressBar) progressBar.style.width = percent + '%';
            if (progressText) progressText.textContent = message;

        async function executeWorkflowSteps(strategyId, workflowId) {
            try {
                // 步骤1: 回测
                updateWorkflowStep('backtest', 'running');
                updateWorkflowProgress(10, '正在启动回测...');

                // 转换状态到回测
                await fetch(getApiBaseUrl(`/strategy/workflow/${workflowId}/transition`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_status: 'backtest' })
                });

                // 调用真实回测API
                const backtestResult = await runBacktestForWorkflow(strategyId);
                if (!backtestResult) {
                    throw new Error('回测执行失败');
                }

                updateWorkflowStep('backtest', 'completed', '回测验证完成');
                updateWorkflowProgress(30, '回测完成，准备优化...');

                // 步骤2: 优化
                updateWorkflowStep('optimize', 'running');
                updateWorkflowProgress(40, '正在启动参数优化...');

                await fetch(getApiBaseUrl(`/strategy/workflow/${workflowId}/transition`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_status: 'optimize' })
                });

                // 调用真实优化API
                const optimizationResult = await runOptimizationForWorkflow(strategyId);
                if (!optimizationResult) {
                    throw new Error('优化执行失败');
                }

                updateWorkflowStep('optimize', 'completed', '参数优化完成');
                updateWorkflowProgress(70, '优化完成，准备应用...');

                // 步骤3: 应用
                updateWorkflowStep('apply', 'running');
                updateWorkflowProgress(80, '正在应用最优参数...');

                await fetch(getApiBaseUrl(`/strategy/workflow/${workflowId}/transition`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_status: 'apply' })
                });

                // 调用真实应用API
                // task_id 应该是完整的优化任务ID（如 opt_1771490358）
                const taskId = optimizationResult.task_id;
                console.log('应用优化结果，task_id:', taskId);
                if (!taskId) {
                    throw new Error('优化结果缺少task_id');
                }
                const applyResult = await applyOptimizationForWorkflow(strategyId, taskId);
                if (!applyResult) {
                    throw new Error('应用优化结果失败');
                }

                updateWorkflowStep('apply', 'completed', '参数应用完成');
                updateWorkflowProgress(100, '流程执行完成！');

                // 转换到就绪状态
                await fetch(getApiBaseUrl(`/strategy/workflow/${workflowId}/transition`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_status: 'ready' })
                });

                // 显示完成结果
                document.getElementById('workflowResult').classList.remove('hidden');

                // 3秒后关闭
                setTimeout(() => {
                    hideWorkflowMonitor();
                    // 刷新策略列表
                    loadStrategies();
                }, 3000);

            } catch (error) {
                console.error('执行工作流步骤失败:', error);
                updateWorkflowStep('backtest', 'failed');
                updateWorkflowProgress(0, '执行失败: ' + error.message);

                // 标记工作流失败
                await fetch(getApiBaseUrl(`/strategy/workflow/${workflowId}/transition`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_status: 'failed' })
                });
            }
        }

        // 回测步骤 - 真实API调用
        async function runBacktestForWorkflow(strategyId) {
            try {
                // 准备回测参数
                const endDate = new Date();
                const startDate = new Date();
                startDate.setMonth(startDate.getMonth() - 3); // 默认3个月回测期

                const requestData = {
                    strategy_id: strategyId,
                    start_date: startDate.toISOString().split('T')[0],
                    end_date: endDate.toISOString().split('T')[0],
                    initial_capital: 100000,
                    commission_rate: 0.001,
                    slippage: 0.001,
                    market_impact: 0.001
                };

                updateWorkflowProgress(15, '正在执行回测...');

                // 启动回测
                const response = await fetch(getApiBaseUrl('/backtest/run'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`回测启动失败: ${response.status}`);
                }

                const result = await response.json();
                const backtestId = result.backtest_id;

                // 轮询回测进度
                let backtestComplete = false;
                let attempts = 0;
                const maxAttempts = 60; // 最多轮询60次（约2分钟）

                while (!backtestComplete && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 2000)); // 每2秒检查一次
                    attempts++;

                    const progressResponse = await fetch(getApiBaseUrl(`/backtest/${backtestId}`));
                    if (progressResponse.ok) {
                        const progressData = await progressResponse.json();
                        
                        if (progressData.status === 'completed') {
                            backtestComplete = true;
                            updateWorkflowProgress(25, '回测完成，更新统计...');
                            
                            // 更新策略回测统计
                            try {
                                await updateStrategyBacktestStats(strategyId);
                                console.log('策略回测统计已更新');
                            } catch (statsError) {
                                console.warn('更新回测统计失败:', statsError);
                                // 不回测失败，继续流程
                            }
                            
                            return progressData;
                        } else if (progressData.status === 'failed') {
                            throw new Error('回测执行失败');
                        } else {
                            // 更新进度
                            const progress = progressData.progress || (attempts / maxAttempts) * 15;
                            updateWorkflowProgress(15 + progress, `回测进行中... (${attempts}/${maxAttempts})`);
                        }
                    }
                }

                if (!backtestComplete) {
                    throw new Error('回测超时');
                }

                return null;
            } catch (error) {
                console.error('回测步骤失败:', error);
                throw error;
            }
        }

        // 更新策略回测统计
        async function updateStrategyBacktestStats(strategyId) {
            console.log(`[Backtest Stats] 开始更新策略 ${strategyId} 的回测统计`);
            try {

        // 优化步骤 - 真实API调用
        async function runOptimizationForWorkflow(strategyId) {
            try {
                updateWorkflowProgress(45, '正在启动参数优化...');

                const requestData = {
                    strategy_id: strategyId,
                    method: 'grid_search',
                    target: 'sharpe_ratio',
                    parameters: {
                        max_iterations: 50,
                        convergence_threshold: 0.001
                    }
                };

                // 启动优化
                const response = await fetch(getApiBaseUrl('/strategy/optimization/start'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`优化启动失败: ${response.status}`);
                }

                const result = await response.json();
                const taskId = result.task_id;

                // 轮询优化进度
                let optimizationComplete = false;
                let attempts = 0;
                const maxAttempts = 60; // 最多轮询60次

                while (!optimizationComplete && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    attempts++;

                    // 传递task_id参数以获取特定任务的进度
                    const progressResponse = await fetch(getApiBaseUrl(`/strategy/optimization/progress?task_id=${taskId}`));
                    if (progressResponse.ok) {
                        const progressData = await progressResponse.json();
                        
                        if (progressData.status === 'completed') {
                            optimizationComplete = true;
                            updateWorkflowProgress(65, '优化完成，获取结果...');
                            return { task_id: taskId, ...progressData };
                        } else if (progressData.status === 'failed') {
                            throw new Error('优化执行失败');
                        } else {
                            const progress = progressData.progress || (attempts / maxAttempts) * 20;
                            updateWorkflowProgress(45 + progress, `优化进行中... (${attempts}/${maxAttempts})`);
                        }
                    }
                }

                if (!optimizationComplete) {
                    throw new Error('优化超时');
                }

                return null;
            } catch (error) {
                console.error('优化步骤失败:', error);
                throw error;
            }
        }

            }
        }

        async function deleteSelectedStrategies() {
            if (selectedStrategies.size === 0) {
                alert('请先选择要删除的策略');
                return;
            }

            const selectedNames = Array.from(selectedStrategies).map(id => {
                const s = allStrategies.find(strategy => strategy.id === id);
                return s ? (s.name || id) : id;
            });

            if (!confirm(`确定要删除以下 ${selectedStrategies.size} 个策略吗？\n\n${selectedNames.join('\n')}\n\n此操作不可恢复。`)) {
                return;
            }

            const deletePromises = Array.from(selectedStrategies).map(async (strategyId) => {
                try {
                    const response = await fetch(getApiBaseUrl(`/strategy/conceptions/${strategyId}`), {
                        method: 'DELETE'
                    });
                    if (!response.ok) {
                        throw new Error(`删除 ${strategyId} 失败`);
                    }
                    return { success: true, id: strategyId };
                } catch (error) {
                    console.error(`删除策略 ${strategyId} 失败:`, error);
                    return { success: false, id: strategyId, error: error.message };
                }
            });

            const results = await Promise.allSettled(deletePromises);
            const successful = results.filter(r => r.status === 'fulfilled' && r.value.success).length;
            const failed = results.length - successful;

            if (failed === 0) {
                alert(`成功删除 ${successful} 个策略！`);
            } else {
                alert(`删除完成：成功 ${successful} 个，失败 ${failed} 个`);
            }

            selectedStrategies.clear();
            await loadStrategies();
        }

        /**
         * 更新部署进度
         * @param {number} percent - 进度百分比
         * @param {string} message - 进度消息
         * @param {string} status - 状态: running, success, failed
         */
        function updateDeploymentProgress(percent, message, status = 'running') {
            const progressBar = document.getElementById('deploymentProgressBar');
            const progressText = document.getElementById('deploymentProgressText');

            if (progressBar) {
                progressBar.style.width = percent + '%';
                if (status === 'success') {
                    progressBar.classList.remove('bg-cyan-600');
                    progressBar.classList.add('bg-green-600');
                } else if (status === 'failed') {
                    progressBar.classList.remove('bg-cyan-600');
                    progressBar.classList.add('bg-red-600');
                }
            }
            if (progressText) {
                progressText.textContent = message;
                if (status === 'failed') {
                    progressText.classList.add('text-red-600');
                }
            }

            // 更新步骤状态
            const steps = ['package', 'validate', 'deploy', 'test'];
            const stepPercent = percent / 25;
            steps.forEach((step, index) => {
                const stepEl = document.getElementById(`deploy-step-${step}`);
                if (stepEl) {
                    const iconEl = stepEl.querySelector('i');
                    if (stepPercent > index + 1) {
                        stepEl.className = 'flex items-center p-2 rounded bg-green-50';
                        iconEl.className = 'fas fa-check-circle text-green-500 mr-2';
                    } else if (stepPercent > index) {
                        stepEl.className = 'flex items-center p-2 rounded bg-blue-50';
                        iconEl.className = 'fas fa-spinner fa-spin text-blue-500 mr-2';
                    } else if (status === 'failed') {
                        stepEl.className = 'flex items-center p-2 rounded';
                        iconEl.className = 'fas fa-circle text-gray-300 mr-2';
                    }
                }
            });
        }

                            ${d.optimization_history ? `
                                <div class="mt-2 text-sm text-gray-600 bg-gray-50 p-2 rounded">
                                    <i class="fas fa-chart-line mr-1"></i>回测: ${d.optimization_history.backtest_count || 0}次
                                    <i class="fas fa-sliders-h mr-1 ml-3"></i>优化: ${d.optimization_history.optimization_count || 0}次
                                </div>
                            ` : ''}
                            ${d.status === 'success' ? `
                                <div class="mt-2 flex justify-end">
                                    <button onclick="rollbackDeployment('${d.deployment_id}', '${strategyName}')" 
                                        class="text-sm text-red-600 hover:text-red-800">
                                        <i class="fas fa-undo mr-1"></i>回滚
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('')
                : '<div class="text-center text-gray-500 py-8">暂无部署记录</div>';

            modal.innerHTML = `
                <div class="bg-white rounded-lg shadow-xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">
                            <i class="fas fa-history text-gray-600 mr-2"></i>
                            部署历史
                        </h3>
                        <button onclick="closeDeploymentHistoryModal()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-gray-600">策略: <span class="font-medium">${strategyName}</span></p>
                        <p class="text-sm text-gray-500">共 ${deployments.length} 条部署记录</p>
                    </div>
                    <div class="space-y-2">
                        ${deploymentsHtml}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            // 点击外部关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeDeploymentHistoryModal();
                }
            });

            window.closeDeploymentHistoryModal = () => {
                const modalEl = document.getElementById('deploymentHistoryModal');
                if (modalEl) {
                    modalEl.remove();
                }
                delete window.closeDeploymentHistoryModal;
            };
        }

        /**
         * 回滚部署
         * @param {string} deploymentId - 部署ID
         * @param {string} strategyName - 策略名称
         */
        async function rollbackDeployment(deploymentId, strategyName) {
            if (!confirm(`确定要回滚策略 "${strategyName}" 的这次部署吗？`)) {
                return;
            }

            try {
                const response = await fetch(getApiBaseUrl(`/deployments/${deploymentId}/rollback`), {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`回滚失败: ${response.status}`);
                }

                const result = await response.json();
                if (result.success) {
                    alert('回滚成功！');
                    closeDeploymentHistoryModal();
                } else {
                    alert(`回滚失败: ${result.message}`);
                }

            } catch (error) {
                console.error('回滚部署失败:', error);
                alert(`回滚失败: ${error.message}`);
            }
        }

        // ==================== 策略部署功能结束 ====================

        function refreshStrategies() {
            selectedStrategies.clear();
            document.getElementById('selectAll').checked = false;
            document.getElementById('searchInput').value = '';
            document.getElementById('filterType').value = '';
            loadStrategies();
        }
    </script>
</body>
</html>
