<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQA2025 策略构思设计器</title>
    <!-- Tailwind CSS - 内联版本用于生产环境 -->
    <script>
        // Tailwind CSS配置 - 生产环境内联版本
        const tailwindConfig = {
            darkMode: 'class',
            content: [],
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        };

        // 加载Tailwind CSS
        if (typeof tailwind === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdn.tailwindcss.com';
            script.onload = function() {
                if (window.tailwind) {
                    window.tailwind.config = tailwindConfig;
                }
            };
            script.onerror = function() {
                console.warn('Tailwind CDN加载失败，使用内联样式');
                // 内联关键样式
                const style = document.createElement('style');
                style.textContent = `
                    .bg-blue-500 { background-color: #3b82f6; }
                    .bg-green-500 { background-color: #10b981; }
                    .bg-red-500 { background-color: #ef4444; }
                    .text-white { color: white; }
                    .text-gray-700 { color: #374151; }
                    .p-4 { padding: 1rem; }
                    .mb-4 { margin-bottom: 1rem; }
                    .rounded { border-radius: 0.25rem; }
                    .shadow { box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
                    .flex { display: flex; }
                    .items-center { align-items: center; }
                    .justify-between { justify-content: space-between; }
                `;
                document.head.appendChild(style);
            };
            document.head.appendChild(script);
        }
    </script>

    <!-- Chart.js - 本地备选方案 -->
    <script>
        // Chart.js 简化版本备选方案
        if (typeof Chart === 'undefined') {
            console.warn('Chart.js CDN加载失败，使用简化备选方案');
            window.Chart = class {
                constructor(ctx, config) {
                    this.ctx = ctx;
                    this.config = config;
                    console.log('Chart.js备选方案已加载，但功能受限');
                }
                update() {}
                destroy() {}
            };
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" onerror="console.warn('Chart.js加载失败，使用备选方案')"></script>

    <!-- Luxon - 本地备选方案 -->
    <script>
        // Luxon 简化版本备选方案
        if (typeof luxon === 'undefined') {
            console.warn('Luxon CDN加载失败，使用简化备选方案');
            window.luxon = {
                DateTime: {
                    now: () => ({
                        toLocaleString: () => new Date().toLocaleString(),
                        toISO: () => new Date().toISOString()
                    }),
                    fromISO: (iso) => ({
                        toLocaleString: () => new Date(iso).toLocaleString()
                    })
                }
            };
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js" onerror="console.warn('Luxon加载失败，使用备选方案')"></script>

    <!-- Font Awesome - 本地备选方案 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" onerror="handleFontAwesomeError()">

    <script>
        function handleFontAwesomeError() {
            console.warn('Font Awesome加载失败，使用Unicode备选方案');
            // 添加Unicode图标的CSS备选方案
            const style = document.createElement('style');
            style.textContent = `
                .fa::before { content: '★'; } /* 默认星形图标 */
                .fa-database::before { content: '🗄️'; }
                .fa-chart-line::before { content: '📈'; }
                .fa-brain::before { content: '🧠'; }
                .fa-exchange-alt::before { content: '🔄'; }
                .fa-shield-alt::before { content: '🛡️'; }
                .fa-check::before { content: '✓'; }
                .fa-times::before { content: '✗'; }
                .fa-plus::before { content: '+'; }
                .fa-save::before { content: '💾'; }
                .fa-trash::before { content: '🗑️'; }
            `;
            document.head.appendChild(style);
        }
    </script>
    <style>
        .gradient-bg-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            </div>

    <script>
        // 策略构思设计器核心功能
        class StrategyDesigner {
            constructor() {
                this.nodes = [];
                this.connections = [];
                this.selectedNode = null;
                this.scale = 1;
                this.offsetX = 0;
                this.offsetY = 0;
                this.isDragging = false;
                this.dragStartX = 0;
                this.dragStartY = 0;
                this.draggedElement = null;
                this.currentStrategyId = null;

                this.init();
            }

            async init() {
                this.bindEvents();
                await this.loadStrategyTemplates();
                this.updateCanvas();
            }

            bindEvents() {
                // 策略模板选择
                document.getElementById('strategyTemplateSelect').addEventListener('change', (e) => {
                    this.onStrategyTemplateChange(e.target.value);
                });

                // 策略类型选择
                document.getElementById('strategyTypeSelect').addEventListener('change', (e) => {
                    this.onStrategyTypeChange(e.target.value);
                });

                // 组件拖拽
                // #region agent log
                const strategyNodes = document.querySelectorAll('.strategy-node');
                // 调试日志已移除，避免CORS问题
                // #endregion
                strategyNodes.forEach(node => {
                    // 调试日志已移除
                    node.addEventListener('dragstart', (e) => this.onDragStart(e));
                    node.addEventListener('dragend', (e) => {
                        e.target.classList.remove('opacity-50');
                    });
                });

                // 画布事件
                const canvas = document.getElementById('strategyCanvas');
                // 调试日志已移除
                canvas.addEventListener('dragover', (e) => this.onDragOver(e));
                canvas.addEventListener('drop', (e) => this.onDrop(e));
                canvas.addEventListener('click', (e) => this.onCanvasClick(e));
                canvas.addEventListener('contextmenu', (e) => this.onContextMenu(e));

                // 工具栏按钮
                document.getElementById('zoomInBtn').addEventListener('click', () => this.zoomIn());
                document.getElementById('zoomOutBtn').addEventListener('click', () => this.zoomOut());
                document.getElementById('fitToScreenBtn').addEventListener('click', () => this.fitToScreen());

                // 保存、加载和导出
                document.getElementById('saveStrategyBtn').addEventListener('click', () => this.saveStrategy());
                document.getElementById('loadStrategyBtn').addEventListener('click', () => this.showLoadStrategyModal());
                document.getElementById('exportStrategyBtn').addEventListener('click', () => this.exportStrategy());

                // 模态框
                document.getElementById('cancelNodeEditBtn').addEventListener('click', () => this.closeNodeEditModal());
                document.getElementById('saveNodeEditBtn').addEventListener('click', () => this.saveNodeEdit());

                document.getElementById('cancelLoadStrategyBtn').addEventListener('click', () => this.closeLoadStrategyModal());
                document.getElementById('confirmLoadStrategyBtn').addEventListener('click', () => this.loadSelectedStrategy());

                // 键盘事件
                document.addEventListener('keydown', (e) => this.onKeyDown(e));
            }

            async loadStrategyTemplates() {
                try {
                    const apiUrl = this.getApiBaseUrl('/strategy/conception/templates');
                    console.log('正在加载策略模板:', apiUrl);
                    console.log('请求头检查 - 只发送Accept头，避免预检');

                    // 从API加载策略模板
                    const response = await fetch(apiUrl, {
                        method: 'GET',
                        mode: 'cors',  // 明确指定CORS模式
                        headers: {
                            'Accept': 'application/json'
                            // 注意：故意不设置Content-Type以避免预检请求
                        }
                    });

                    console.log('API响应状态:', response.status, response.statusText);
                    console.log('响应头:', [...response.headers.entries()]);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();
                    console.log('成功加载策略模板:', result);

                    // 处理API返回的模板，确保包含必需字段
                    const apiTemplates = result.templates || {};
                    this.strategyTemplates = {};

                    // 为每个API模板添加默认的requiredNodes（如果没有的话）
                    Object.keys(apiTemplates).forEach(templateKey => {
                        const template = apiTemplates[templateKey];
                        this.strategyTemplates[templateKey] = {
                            ...template,
                            requiredNodes: template.required_nodes || template.requiredNodes || this.getDefaultRequiredNodes(templateKey)
                        };
                    });

                    // 渲染模板选择器
                    this.renderTemplateSelector();

                } catch (error) {
                    console.error('加载策略模板失败:', error);
                    console.error('错误详情:', error.message);

                    // 检查是否是CORS错误
                    if (error.message.includes('CORS') || error.message.includes('Access-Control')) {
                        console.warn('检测到CORS错误，尝试降级方案');
                    }

                    // 降级到本地模板
                    this.loadLocalTemplates();
                }
            }

            loadLocalTemplates() {
                // 本地降级模板
                this.strategyTemplates = {
                    trend_following: {
                        name: '趋势跟踪策略',
                        parameters: {
                            trend_period: {type: 'number', default: 20, min: 5, max: 100, label: '趋势周期'},
                            entry_threshold: {type: 'number', default: 0.02, min: 0.001, max: 0.1, step: 0.001, label: '入场阈值'},
                            exit_threshold: {type: 'number', default: 0.01, min: 0.001, max: 0.05, step: 0.001, label: '出场阈值'}
                        },
                        requiredNodes: ['data_source', 'feature', 'trade', 'risk']
                    },
                    mean_reversion: {
                        name: '均值回归策略',
                        parameters: {
                            lookback_period: {type: 'number', default: 20, min: 5, max: 100, label: '回望周期'},
                            deviation_threshold: {type: 'number', default: 2.0, min: 0.5, max: 5.0, step: 0.1, label: '偏离阈值'},
                            holding_period: {type: 'number', default: 5, min: 1, max: 20, label: '持仓周期'}
                        },

                    },
                    ml_based: {
                        name: '机器学习策略',

                            training_period: {type: 'number', default: 252, min: 30, max: 1000, label: '训练周期'},
                            prediction_horizon: {type: 'number', default: 5, min: 1, max: 20, label: '预测周期'}
                        },
                        requiredNodes: ['data_source', 'feature', 'model', 'trade', 'risk']
                    }
                };

                // 渲染模板选择器

            renderTemplateSelector() {
                const selector = document.getElementById('strategyTemplateSelect');
                selector.innerHTML = '<option value="">选择策略模板...</option>';

                Object.keys(this.strategyTemplates).forEach(templateKey => {
                    const template = this.strategyTemplates[templateKey];
                    const option = document.createElement('option');
                    option.value = templateKey;
                    option.textContent = template.name;
                    selector.appendChild(option);
                });

                // 添加空模板选项
                const emptyOption = document.createElement('option');
                emptyOption.value = 'empty';
                emptyOption.textContent = '空白策略';
                selector.appendChild(emptyOption);
            }

            async onStrategyTemplateChange(templateType) {
                if (!templateType) return;

                if (templateType === 'empty') {
                    // 清空所有内容
                    await this.clearCanvas();
                    return;
                }

                // 根据模板类型设置相应的策略类型
                document.getElementById('strategyTypeSelect').value = templateType;
                await this.onStrategyTypeChange(templateType);
            }

            async onStrategyTypeChange(strategyType) {
                if (!strategyType) return;

                const template = this.strategyTemplates[strategyType];
                if (!template) return;

                // 设置策略名称
                document.getElementById('strategyName').value = template.name;

                // 生成策略ID
                const strategyId = `${strategyType}_${Date.now()}`;
                document.getElementById('strategyId').value = strategyId;

                // 渲染参数面板
                this.renderParameterPanel(template.parameters);

                // 自动添加必需的节点 (安全检查)
                const requiredNodes = template.requiredNodes || [];
                if (Array.isArray(requiredNodes) && requiredNodes.length > 0) {
                    await this.autoAddRequiredNodes(requiredNodes);
                }

                // 更新验证状态
                await this.validateStrategy();
            }

            async clearCanvas() {
                // 清空画布
                this.nodes = [];
                this.connections = [];

                // 清空表单
                document.getElementById('strategyName').value = '';
                document.getElementById('strategyId').value = '';
                document.getElementById('strategyTypeSelect').value = '';
                document.getElementById('strategyDescription').value = '';
                document.getElementById('targetMarket').value = '';
                document.getElementById('riskLevel').value = 'medium';

                // 清空参数面板
                document.getElementById('parameterPanel').innerHTML = '';

                // 更新画布和验证
                this.updateCanvas();
                this.updateStats();
                await this.validateStrategy();
            }

            renderParameterPanel(parameters) {
                const container = document.getElementById('parameterPanel');
                container.innerHTML = '';

                for (const [key, config] of Object.entries(parameters)) {
                    const div = document.createElement('div');

                    const label = document.createElement('label');
                    label.className = 'block text-sm font-medium text-gray-700 mb-1';
                    label.textContent = config.label;
                    div.appendChild(label);

                    let input;
                    if (config.type === 'select') {
                        input = document.createElement('select');
                        input.className = 'w-full border border-gray-300 rounded-md px-3 py-2 parameter-input';
                        config.options.forEach(option => {
                            const optionElement = document.createElement('option');
                            optionElement.value = option;
                            optionElement.textContent = option;
                            if (option === config.default) optionElement.selected = true;
                            input.appendChild(optionElement);
                        });
                    } else {
                        input = document.createElement('input');
                        input.type = config.type;
                        input.className = 'w-full border border-gray-300 rounded-md px-3 py-2 parameter-input';
                        input.value = config.default;
                        if (config.min !== undefined) input.min = config.min;
                        if (config.max !== undefined) input.max = config.max;
                        if (config.step !== undefined) input.step = config.step;
                    }

                    input.dataset.paramKey = key;
                    input.addEventListener('change', () => this.onParameterChange(key, input.value));

                    div.appendChild(input);
                    container.appendChild(div);
                }
            }

            async autoAddRequiredNodes(requiredTypes) {
                // 安全检查
                if (!requiredTypes || !Array.isArray(requiredTypes) || requiredTypes.length === 0) {
                    console.warn('autoAddRequiredNodes: requiredTypes 不是有效数组或为空', requiredTypes);
                    return;
                }

                // 清空现有节点
                this.nodes = [];
                this.connections = [];

                const canvas = document.getElementById('strategyCanvas');
                const canvasRect = canvas.getBoundingClientRect();

                const nodeSpacing = 150;
                const startX = 100;
                const startY = 100;

                // 异步获取每个节点的默认参数
                for (let index = 0; index < requiredTypes.length; index++) {
                    const type = requiredTypes[index];
                    const node = {
                        id: `${type}_${Date.now()}_${index}`,
                        type: type,
                        name: this.getNodeTypeName(type),
                        x: startX + (index % 2) * nodeSpacing,
                        y: startY + Math.floor(index / 2) * nodeSpacing,
                        parameters: await this.getDefaultNodeParams(type)
                    };

                    this.nodes.push(node);
                }

                // 自动连接节点
                this.autoConnectNodes();

                this.updateCanvas();
            }

            getNodeTypeName(type) {
                const names = {
                    data_source: '数据源',
                    feature: '技术指标',
                    model: '预测模型',
                    trade: '交易信号',
                    risk: '风险控制'
                };
                return names[type] || type;
            }

            getDefaultRequiredNodes(strategyType) {
                // 为不同策略类型提供默认的必需节点
                const defaults = {
                    trend_following: ['data_source', 'feature', 'trade', 'risk'],
                    mean_reversion: ['data_source', 'feature', 'model', 'trade', 'risk'],
                    ml_based: ['data_source', 'feature', 'model', 'trade', 'risk'],
                    arbitrage: ['data_source', 'model', 'trade', 'risk'],
                    statistical: ['data_source', 'feature', 'model', 'trade', 'risk']
                };
                return defaults[strategyType] || ['data_source', 'feature', 'trade', 'risk'];
            }

            async getDefaultNodeParams(type) {
                // 量化交易系统要求：不使用硬编码的股票代码和数据源
                const defaults = {
                    data_source: {source_type: '', symbol: ''}, // 必须由用户配置，不能使用默认值
                    feature: {indicators: ['SMA', 'RSI'], period: 14},
                    model: {model_type: 'linear_regression', confidence: 0.95},
                    trade: {entry_signal: 'bullish', exit_signal: 'bearish'},
                    risk: {max_position: 100000, stop_loss: 0.05, take_profit: 0.10}
                };
                
                // 如果是数据源节点，尝试从API获取可用的数据源配置
                if (type === 'data_source') {
                    try {
                        const response = await fetch(this.getApiBaseUrl('/data/sources'));
                        if (response.ok) {
                            const data = await response.json();
                            const stockSources = data.data_sources?.filter(s => 
                                s.type === '股票数据' && s.enabled
                            ) || [];
                            if (stockSources.length > 0) {
                                defaults.data_source.source_type = stockSources[0].id;
                                // 不设置默认股票代码，必须由用户指定
                            }
                        }
                    } catch (error) {
                        console.warn('无法获取数据源配置，将使用空配置:', error);
                    }
                }
                
                return defaults[type] || {};
            }
            
            getApiBaseUrl(endpoint = '') {
                // 始终使用相对路径，通过nginx代理访问API，确保CORS头正确添加
                const baseUrl = '/api/v1';
                return baseUrl + endpoint;
            }

            autoConnectNodes() {
                // 创建节点间的逻辑连接
                const nodeOrder = ['data_source', 'feature', 'model', 'trade', 'risk'];

                for (let i = 0; i < this.nodes.length - 1; i++) {
                    const currentNode = this.nodes[i];
                    const nextNode = this.nodes[i + 1];

                    if (currentNode && nextNode) {
                        this.connections.push({
                            id: `conn_${currentNode.id}_${nextNode.id}`,
                            source: currentNode.id,
                            target: nextNode.id,
                            sourceType: currentNode.type,
                            targetType: nextNode.type
                        });
                    }
                }
            }

            onDragStart(e) {
                // #region agent log
                const nodeType = e.target.dataset.type || e.target.closest('.strategy-node')?.dataset.type;
                // 调试日志已移除
                e.dataTransfer.setData('text/plain', nodeType);
                e.dataTransfer.effectAllowed = 'move';
                e.target.classList.add('opacity-50');
                // #endregion
            }

            onDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                e.currentTarget.classList.add('drag-over');
            }

            onDrop(e) {
                e.preventDefault();
                e.stopPropagation();
                e.currentTarget.classList.remove('drag-over');

                const nodeType = e.dataTransfer.getData('text/plain');
                if (!nodeType) return;

                const canvas = document.getElementById('strategyCanvas');
                const rect = canvas.getBoundingClientRect();

                const x = (e.clientX - rect.left - this.offsetX) / this.scale;
                const y = (e.clientY - rect.top - this.offsetY) / this.scale;

                this.addNode(nodeType, x, y);
            }

            async addNode(type, x, y) {
                const node = {
                    id: `${type}_${Date.now()}`,
                    type: type,
                    name: this.getNodeTypeName(type),
                    x: x,
                    y: y,
                    parameters: await this.getDefaultNodeParams(type)
                };

                this.nodes.push(node);
                this.updateCanvas();
                await this.updateStats();
            }

            updateCanvas() {
                const canvas = document.getElementById('strategyCanvas');
                const svg = canvas;

                // 清空画布
                while (svg.firstChild) {
                    svg.removeChild(svg.firstChild);
                }

                // 添加defs
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', 'arrowhead');
                marker.setAttribute('markerWidth', '10');
                marker.setAttribute('markerHeight', '7');
                marker.setAttribute('refX', '9');
                marker.setAttribute('refY', '3.5');
                marker.setAttribute('orient', 'auto');

                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', '0 0, 10 3.5, 0 7');
                polygon.setAttribute('fill', '#667eea');
                marker.appendChild(polygon);
                defs.appendChild(marker);
                svg.appendChild(defs);

                // 绘制连接线
                this.connections.forEach(conn => {
                    const sourceNode = this.nodes.find(n => n.id === conn.source);
                    const targetNode = this.nodes.find(n => n.id === conn.target);

                    if (sourceNode && targetNode) {
                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', sourceNode.x + 75);
                        line.setAttribute('y1', sourceNode.y + 30);
                        line.setAttribute('x2', targetNode.x + 75);
                        line.setAttribute('y2', targetNode.y + 30);
                        line.setAttribute('class', 'connection-line');
                        line.setAttribute('marker-end', 'url(#arrowhead)');
                        svg.appendChild(line);
                    }
                });

                // 绘制节点
                this.nodes.forEach(node => {
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('transform', `translate(${node.x}, ${node.y})`);
                    g.setAttribute('class', 'strategy-node');
                    g.setAttribute('data-node-id', node.id);

                    // 节点背景
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('width', '150');
                    rect.setAttribute('height', '60');
                    rect.setAttribute('rx', '8');
                    rect.setAttribute('fill', this.getNodeColor(node.type));
                    rect.setAttribute('stroke', '#667eea');
                    rect.setAttribute('stroke-width', '2');
                    g.appendChild(rect);

                    // 节点图标
                    const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    icon.setAttribute('x', '20');
                    icon.setAttribute('y', '25');
                    icon.setAttribute('font-family', 'FontAwesome');
                    icon.setAttribute('font-size', '16');
                    icon.setAttribute('fill', 'white');
                    icon.textContent = this.getNodeIcon(node.type);
                    g.appendChild(icon);

                    // 节点名称
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', '45');
                    text.setAttribute('y', '25');
                    text.setAttribute('font-family', 'Arial, sans-serif');
                    text.setAttribute('font-size', '12');
                    text.setAttribute('fill', 'white');
                    text.textContent = node.name;
                    g.appendChild(text);

                    // 节点类型标签
                    const typeLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    typeLabel.setAttribute('x', '45');
                    typeLabel.setAttribute('y', '42');
                    typeLabel.setAttribute('font-family', 'Arial, sans-serif');
                    typeLabel.setAttribute('font-size', '10');
                    typeLabel.setAttribute('fill', 'rgba(255,255,255,0.8)');
                    typeLabel.textContent = node.type;
                    g.appendChild(typeLabel);

                    // 连接点
                    const inputPoint = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    inputPoint.setAttribute('cx', '0');
                    inputPoint.setAttribute('cy', '30');
                    inputPoint.setAttribute('r', '5');
                    inputPoint.setAttribute('fill', '#4CAF50');
                    inputPoint.setAttribute('class', 'connection-point input-point');
                    g.appendChild(inputPoint);

                    const outputPoint = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    outputPoint.setAttribute('cx', '150');
                    outputPoint.setAttribute('cy', '30');
                    outputPoint.setAttribute('r', '5');
                    outputPoint.setAttribute('fill', '#FF5722');
                    outputPoint.setAttribute('class', 'connection-point output-point');
                    g.appendChild(outputPoint);

                    // 绑定事件
                    g.addEventListener('mousedown', (e) => this.onNodeMouseDown(e, node));
                    g.addEventListener('contextmenu', (e) => this.onNodeContextMenu(e, node));

                    svg.appendChild(g);
                });
            }

            getNodeColor(type) {
                const colors = {
                    data_source: '#2196F3',
                    feature: '#4CAF50',
                    model: '#9C27B0',
                    trade: '#FF9800',
                    risk: '#F44336'
                };
                return colors[type] || '#9E9E9E';
            }

            getNodeIcon(type) {
                const icons = {
                    data_source: '',  // database
                    feature: '',     // chart-line
                    model: '',       // brain
                    trade: '',       // exchange-alt
                    risk: ''         // shield-alt
                };
                return icons[type] || '';
            }

            updateStats() {
                document.getElementById('nodeCount').textContent = `节点: ${this.nodes.length}`;
                document.getElementById('connectionCount').textContent = `连接: ${this.connections.length}`;
                document.getElementById('canvasStatus').textContent = '设计中';
            }

            async validateStrategy() {
                const validationResults = document.getElementById('validationResults');
                const strategyName = document.getElementById('strategyName').value;
                const strategyType = document.getElementById('strategyTypeSelect').value;

                let checks = [];

                // 检查基本信息
                if (!strategyName) {
                    checks.push({status: 'error', message: '策略名称不能为空'});
                } else {
                    checks.push({status: 'success', message: '策略名称已设置'});
                }

                if (!strategyType) {
                    checks.push({status: 'error', message: '必须选择策略类型'});
                } else {
                    checks.push({status: 'success', message: '策略类型已选择'});
                }

                // 检查必要节点
                const hasDataSource = this.nodes.some(n => n.type === 'data_source');
                const hasTrade = this.nodes.some(n => n.type === 'trade');
                const hasRisk = this.nodes.some(n => n.type === 'risk');

                checks.push(hasDataSource ?
                    {status: 'success', message: '包含数据源节点'} :
                    {status: 'error', message: '缺少数据源节点'});

                checks.push(hasTrade ?
                    {status: 'success', message: '包含交易信号节点'} :
                    {status: 'error', message: '缺少交易信号节点'});

                checks.push(hasRisk ?
                    {status: 'success', message: '包含风险控制节点'} :
                    {status: 'error', message: '缺少风险控制节点'});

                // 渲染验证结果
                validationResults.innerHTML = checks.map(check => `
                    <div class="flex items-center text-sm">
                        <i class="fas fa-${check.status === 'success' ? 'check' : 'times'} text-${check.status === 'success' ? 'green' : 'red'}-500 mr-2"></i>
                        <span>${check.message}</span>
                    </div>
                `).join('');

                // 更新统计信息
                await this.updateStrategyStats();
            }

            async updateStrategyStats() {
                const nodeCount = this.nodes.length;
                const connectionCount = this.connections.length;

                // 复杂度评分 (基于节点和连接数量)
                const complexityScore = Math.min(100, (nodeCount * 10 + connectionCount * 5));
                document.getElementById('complexityScore').textContent = `${complexityScore}/100`;

                // 预计开发时间 (基于复杂度)
                const estimatedDays = Math.ceil(complexityScore / 20);
                document.getElementById('estimatedTime').textContent = `${estimatedDays}天`;

                // 预期收益区间 - 量化交易系统要求：不使用模拟数据
                // 如果策略已保存且有回测结果，从API获取真实收益数据
                const strategyId = document.getElementById('strategyId').value;
                if (strategyId) {
                    try {
                        const response = await fetch(this.getApiBaseUrl(`/strategy/conceptions/${strategyId}`));
                        if (response.ok) {
                            const strategyData = await response.json();
                            const backtestResult = strategyData.backtest_result;
                            if (backtestResult && backtestResult.annual_return !== undefined) {
                                const annualReturn = backtestResult.annual_return;
                                const returnRange = `${(annualReturn * 0.8).toFixed(1)}%-${(annualReturn * 1.2).toFixed(1)}%`;
                                document.getElementById('expectedReturn').textContent = returnRange;
                                return;
                            }
                        }
                    } catch (error) {
                        console.warn('无法获取策略回测结果:', error);
                    }
                }
                
                // 如果没有回测结果，显示"待回测"而非模拟数据
                document.getElementById('expectedReturn').textContent = '待回测';
            }

            async saveStrategy() {
                const strategyId = document.getElementById('strategyId').value;
                const strategyData = {
                    id: strategyId || `strategy_${Date.now()}`,
                    name: document.getElementById('strategyName').value,
                    type: document.getElementById('strategyTypeSelect').value,
                    description: document.getElementById('strategyDescription').value,
                    targetMarket: document.getElementById('targetMarket').value,
                    riskLevel: document.getElementById('riskLevel').value,
                    nodes: this.nodes,
                    connections: this.connections,
                    parameters: this.getAllParameters(),
                    createdAt: new Date().toISOString(),
                    version: '1.0.0'
                };

                try {
                    // 首先验证策略
                    const validationResponse = await fetch(this.getApiBaseUrl('/strategy/conceptions/validate'), {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(strategyData)
                    });

                    let validationResult;
                    if (!validationResponse.ok) {
                        console.warn('验证API请求失败，使用本地验证');
                        // 如果验证API失败，使用本地验证
                        validationResult = this.validateStrategyLocally(strategyData);
                    } else {
                        validationResult = await validationResponse.json();
                    }

                    if (!validationResult.validation.valid) {
                        const errors = validationResult.validation.errors.join('\n');
                        alert(`策略验证失败:\n${errors}\n\n将继续保存到本地存储。`);
                        // 不返回，继续保存流程
                    }

                    // 显示验证结果
                    const complexity = validationResult.validation;
                    alert(`策略验证通过!\n复杂度: ${complexity.complexity_level}\n预估开发时间: ${complexity.estimated_days}天\n节点数: ${complexity.node_count}\n连接数: ${complexity.connection_count}`);

                    // 验证通过，保存策略
                    const saveResponse = await fetch(this.getApiBaseUrl('/strategy/conceptions'), {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(strategyData)
                    });

                    if (!saveResponse.ok) {
                        throw new Error('保存请求失败');
                    }

                    const saveResult = await saveResponse.json();

                    if (saveResult.success) {
                        alert(`策略已保存到云端！\n策略ID: ${saveResult.strategy_id}\n版本: ${saveResult.data.version}`);
                        console.log('Saved strategy:', saveResult);

                        // 更新当前策略ID
                        document.getElementById('strategyId').value = saveResult.strategy_id;
                        this.currentStrategyId = saveResult.strategy_id;

                        // 更新保存状态指示器
                        this.updateSaveStatus(true);
                    } else {
                        throw new Error(saveResult.message || '保存失败');
                    }
                } catch (error) {
                    console.error('保存策略失败:', error);
                    alert(`云端保存失败: ${error.message}\n正在尝试保存到本地存储...`);

                    // 降级到localStorage
                    try {
                        this.saveStrategyLocally(strategyData, false);
                    } catch (storageError) {
                        console.error('本地保存失败:', storageError);
                        alert(`本地保存也失败: ${storageError.message}\n请检查浏览器设置和存储空间。`);
                    }
                }
            }

            exportStrategy() {
                const strategyData = {
                    id: document.getElementById('strategyId').value,
                    name: document.getElementById('strategyName').value,
                    type: document.getElementById('strategyTypeSelect').value,
                    nodes: this.nodes,
                    connections: this.connections,
                    parameters: this.getAllParameters()
                };

                const dataStr = JSON.stringify(strategyData, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});

                const link = document.createElement('a');
                link.href = URL.createObjectURL(dataBlob);
                link.download = `${strategyData.name || 'strategy'}_config.json`;
                link.click();
            }

            getAllParameters() {
                const parameters = {};
                document.querySelectorAll('#parameterPanel input, #parameterPanel select').forEach(input => {
                    const key = input.dataset.paramKey;
                    if (key) {
                        parameters[key] = input.value;
                    }
                });
                return parameters;
            }

            async onParameterChange(key, value) {
                console.log(`Parameter changed: ${key} = ${value}`);
                await this.validateStrategy();
            }

            onNodeMouseDown(e, node) {
                this.isDragging = true;
                this.draggedElement = node;
                this.dragStartX = e.clientX - node.x;
                this.dragStartY = e.clientY - node.y;

                document.addEventListener('mousemove', this.onMouseMove.bind(this));
                document.addEventListener('mouseup', this.onMouseUp.bind(this));
            }

            onMouseMove(e) {
                if (!this.isDragging || !this.draggedElement) return;

                this.draggedElement.x = (e.clientX - this.dragStartX);
                this.draggedElement.y = (e.clientY - this.dragStartY);

                this.updateCanvas();
            }

            onMouseUp() {
                this.isDragging = false;
                this.draggedElement = null;

                document.removeEventListener('mousemove', this.onMouseMove.bind(this));
                document.removeEventListener('mouseup', this.onMouseUp.bind(this));
            }

            onCanvasClick(e) {
                // 取消选择
                this.selectedNode = null;
                document.querySelectorAll('.strategy-node').forEach(node => {
                    node.classList.remove('selected');
                });
            }

            onContextMenu(e, node) {
                e.preventDefault();
                this.selectedNode = node;

                const contextMenu = document.getElementById('contextMenu');
                contextMenu.style.left = e.clientX + 'px';
                contextMenu.style.top = e.clientY + 'px';
                contextMenu.classList.remove('hidden');
            }

            zoomIn() {
                this.scale = Math.min(2, this.scale * 1.2);
                this.updateCanvas();
            }

            zoomOut() {
                this.scale = Math.max(0.5, this.scale / 1.2);
                this.updateCanvas();
            }

            fitToScreen() {
                // 适应屏幕显示
                this.scale = 1;
                this.offsetX = 0;
                this.offsetY = 0;
                this.updateCanvas();
            }

            closeNodeEditModal() {
                document.getElementById('nodeEditModal').classList.add('hidden');
            }

            saveNodeEdit() {
                // 保存节点编辑
                this.closeNodeEditModal();
            }

            onKeyDown(e) {
                if (e.key === 'Delete' && this.selectedNode) {
                    this.deleteNode();
                }
            }

            async showLoadStrategyModal() {
                try {
                    const response = await fetch(this.getApiBaseUrl('/strategy/conceptions'));
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const result = await response.json();
                    // API直接返回数组，兼容处理对象格式
                    const conceptions = Array.isArray(result) ? result : (result.conceptions || []);
                    this.renderStrategyList(conceptions);
                    document.getElementById('loadStrategyModal').classList.remove('hidden');
                } catch (error) {
                    console.error('获取策略列表失败:', error);
                    alert('获取策略列表失败，请检查网络连接');

                    // 降级到本地存储
                    this.loadLocalStrategies();
                }
            }

            loadLocalStrategies() {
                // 从localStorage加载本地保存的策略
                const localStrategies = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('strategy_')) {
                        try {
                            const strategy = JSON.parse(localStorage.getItem(key));
                            localStrategies.push(strategy);
                        } catch (e) {
                            console.error('解析本地策略失败:', e);
                        }
                    }
                }
                this.renderStrategyList(localStrategies);
                document.getElementById('loadStrategyModal').classList.remove('hidden');
            }

            renderStrategyList(strategies) {
                const container = document.getElementById('strategyList');
                container.innerHTML = '';

                if (strategies.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">暂无保存的策略</p>';
                    return;
                }

                strategies.forEach(strategy => {
                    const div = document.createElement('div');
                    div.className = 'p-3 border border-gray-200 rounded cursor-pointer hover:bg-gray-50 strategy-item';
                    div.dataset.strategyId = strategy.id;

                    // 处理时间转换
                    const createdDate = strategy.created_at ?
                        new Date(strategy.created_at).toLocaleDateString('zh-CN') : '--';

                    // 使用正确的策略类型字段
                    const strategyType = strategy.strategyType || strategy.type || '未分类';

                    div.innerHTML = `
                        <div class="font-medium">${strategy.name || strategy.id}</div>
                        <div class="text-sm text-gray-600">类型: ${strategyType} | 创建时间: ${createdDate}</div>
                    `;

                    div.addEventListener('click', () => {
                        // 取消其他选择
                        document.querySelectorAll('.strategy-item').forEach(item => {
                            item.classList.remove('bg-blue-50', 'border-blue-300');
                        });
                        // 选择当前项
                        div.classList.add('bg-blue-50', 'border-blue-300');
                        this.selectedStrategyId = strategy.id;
                        document.getElementById('confirmLoadStrategyBtn').disabled = false;
                    });

                    container.appendChild(div);
                });
            }

            async loadSelectedStrategy() {
                if (!this.selectedStrategyId) return;

                try {
                    const response = await fetch(this.getApiBaseUrl(`/strategy/conceptions/${this.selectedStrategyId}`));
                    if (!response.ok) {
                        if (response.status === 404) {
                            alert(`策略 "${this.selectedStrategyId}" 不存在，可能已被删除或从未保存过。`);
                            this.closeLoadStrategyModal();
                            return;
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const strategyData = await response.json();
                    await this.loadStrategyFromData(strategyData);
                    this.closeLoadStrategyModal();
                    alert('策略加载成功！');

                    // 更新当前策略ID
                    this.currentStrategyId = this.selectedStrategyId;
                } catch (error) {
                    console.error('加载策略失败:', error);
                    if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                        alert('网络连接失败，请检查网络连接后重试');
                    } else {
                        alert(`加载策略失败: ${error.message}`);
                    }
                }
            }

            async loadStrategyFromData(strategyData) {
                // 加载基本信息
                document.getElementById('strategyId').value = strategyData.id || '';
                document.getElementById('strategyName').value = strategyData.name || '';
                document.getElementById('strategyTypeSelect').value = strategyData.type || '';
                document.getElementById('strategyDescription').value = strategyData.description || '';
                document.getElementById('targetMarket').value = strategyData.targetMarket || '';
                document.getElementById('riskLevel').value = strategyData.riskLevel || 'medium';

                // 加载节点和连接
                this.nodes = strategyData.nodes || [];
                this.connections = strategyData.connections || [];

                // 加载参数
                if (strategyData.parameters) {
                    for (const [key, value] of Object.entries(strategyData.parameters)) {
                        const input = document.querySelector(`[data-param-key="${key}"]`);
                        if (input) {
                            input.value = value;
                        }
                    }
                }

                // 触发策略类型变化以更新参数面板
                if (strategyData.type) {
                    this.onStrategyTypeChange(strategyData.type);
                }

                // 重新渲染画布
                this.updateCanvas();
                this.updateStats();
                await this.validateStrategy();
            }

            updateSaveStatus(isSaved = false) {
                const statusElement = document.getElementById('saveStatus');
                if (isSaved) {
                    statusElement.innerHTML = '<i class="fas fa-check-circle mr-1 text-green-600"></i>策略已保存到云端';
                    statusElement.className = 'text-xs text-green-600 mt-1 flex items-center';
                } else {
                    statusElement.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i>策略尚未保存，请点击"验证并保存"按钮保存';
                    statusElement.className = 'text-xs text-orange-600 mt-1 flex items-center';
                }
            }

            validateStrategyLocally(strategyData) {
                // 本地验证策略的基本结构
                const errors = [];
                const warnings = [];

                if (!strategyData.name || strategyData.name.trim() === '') {
                    errors.push('策略名称不能为空');
                }

                if (!strategyData.nodes || !Array.isArray(strategyData.nodes)) {
                    errors.push('策略节点数据无效');
                } else {
                    const nodeTypes = strategyData.nodes.map(n => n.type);
                    const hasDataSource = nodeTypes.includes('data_source');
                    const hasTrade = nodeTypes.includes('trade');
                    const hasRisk = nodeTypes.includes('risk');

                    if (!hasDataSource) {
                        errors.push('缺少数据源节点');
                    }
                    if (!hasTrade) {
                        errors.push('缺少交易信号节点');
                    }
                    if (!hasRisk) {
                        errors.push('缺少风险控制节点');
                    }
                }

                return {
                    validation: {
                        valid: errors.length === 0,
                        errors: errors,
                        warnings: warnings,
                        complexity_score: 0.5,
                        complexity_level: '中',
                        estimated_days: 7,
                        node_count: strategyData.nodes ? strategyData.nodes.length : 0,
                        connection_count: strategyData.connections ? strategyData.connections.length : 0,
                        parameter_count: 0
                    },
                    timestamp: Date.now() / 1000
                };
            }

            saveStrategyLocally(strategyData, validationPassed = false) {
                try {
                    // 生成本地存储键
                    const strategyId = strategyData.id || `local_${Date.now()}`;

                    // 添加本地保存标记
                    const localData = {
                        ...strategyData,
                        id: strategyId,
                        savedLocally: true,
                        savedAt: new Date().toISOString(),
                        validationPassed: validationPassed
                    };

                    // 保存到localStorage
                    localStorage.setItem(`strategy_${strategyId}`, JSON.stringify(localData));

                    // 更新UI
                    document.getElementById('strategyId').value = strategyId;
                    this.currentStrategyId = strategyId;

                    alert(`策略已保存到本地存储！\n策略ID: ${strategyId}\n${validationPassed ? '验证通过' : '验证跳过（本地保存）'}`);
                    console.log('Saved strategy locally:', localData);

                } catch (error) {
                    console.error('本地保存失败:', error);
                    throw new Error(`本地保存失败: ${error.message}`);
                }
            }

            closeLoadStrategyModal() {
                document.getElementById('loadStrategyModal').classList.add('hidden');
                this.selectedStrategyId = null;
                document.getElementById('confirmLoadStrategyBtn').disabled = true;
            }
        }

        // 初始化策略设计器
        document.addEventListener('DOMContentLoaded', function() {
            window.strategyDesigner = new StrategyDesigner();
            // 初始化保存状态为未保存
            setTimeout(() => window.strategyDesigner.updateSaveStatus(false), 100);
        });

        // 全局函数供HTML调用
        function editNode() {
            document.getElementById('contextMenu').classList.add('hidden');
            // 实现节点编辑逻辑
        }

        function deleteNode() {
            if (window.strategyDesigner && window.strategyDesigner.selectedNode) {
                const nodeId = window.strategyDesigner.selectedNode.id;
                window.strategyDesigner.nodes = window.strategyDesigner.nodes.filter(n => n.id !== nodeId);
                window.strategyDesigner.connections = window.strategyDesigner.connections.filter(
                    c => c.source !== nodeId && c.target !== nodeId
                );
                window.strategyDesigner.updateCanvas();
                window.strategyDesigner.updateStats();
            }
            document.getElementById('contextMenu').classList.add('hidden');
        }

        function duplicateNode() {
            if (window.strategyDesigner && window.strategyDesigner.selectedNode) {
                const original = window.strategyDesigner.selectedNode;
                const duplicate = {
                    ...original,
                    id: `${original.type}_${Date.now()}`,
                    x: original.x + 20,
                    y: original.y + 20
                };
                window.strategyDesigner.nodes.push(duplicate);
                window.strategyDesigner.updateCanvas();
                window.strategyDesigner.updateStats();
            }
            document.getElementById('contextMenu').classList.add('hidden');
        }
    </script>
</body>
</html>
