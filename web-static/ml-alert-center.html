<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>ML告警中心 | RQA2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .alert-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .alert-card:hover { background-color: #f9fafb; }
        .alert-critical { border-left-color: #ef4444; }
        .alert-error { border-left-color: #f97316; }
        .alert-warning { border-left-color: #f59e0b; }
        .alert-info { border-left-color: #3b82f6; }
        .alert-debug { border-left-color: #6b7280; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .alert-notification {
            animation: slideIn 0.3s ease-out;
        }
        .severity-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-600 mr-2"></i>
                        <span class="text-xl font-bold text-indigo-600">RQA2025</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">ML告警中心</span>
                    <button onclick="refreshData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-300">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                    <button onclick="markAllAsRead()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition duration-300">
                        <i class="fas fa-check-double mr-2"></i>全部已读
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 px-4">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 flex items-center">
                <i class="fas fa-bell text-red-600 mr-3"></i>
                ML告警中心
            </h1>
            <p class="text-gray-600">实时告警监控、通知管理和自动回滚操作</p>
        </div>

        <!-- Alert Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-exclamation-circle text-red-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">Critical</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="count-critical">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-times-circle text-orange-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">Error</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="count-error">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-exclamation-triangle text-yellow-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">Warning</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="count-warning">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-info-circle text-blue-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">Info</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="count-info">0</dd>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-list text-purple-600 text-xl"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <dt class="text-sm font-medium text-gray-500">总计</dt>
                        <dd class="text-2xl font-semibold text-gray-900" id="count-total">0</dd>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters and Search -->
        <div class="bg-white rounded-lg shadow p-4 mb-8">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium text-gray-700">严重程度:</label>
                    <select id="severity-filter" onchange="filterAlerts()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="all">全部</option>
                        <option value="critical">Critical</option>
                        <option value="error">Error</option>
                        <option value="warning">Warning</option>
                        <option value="info">Info</option>
                        <option value="debug">Debug</option>
                    </select>
                </div>
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium text-gray-700">状态:</label>
                    <select id="status-filter" onchange="filterAlerts()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="all">全部</option>
                        <option value="active">未处理</option>
                        <option value="acknowledged">已确认</option>
                        <option value="resolved">已解决</option>
                    </select>
                </div>
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium text-gray-700">来源:</label>
                    <select id="source-filter" onchange="filterAlerts()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="all">全部</option>
                        <option value="pipeline">管道</option>
                        <option value="model">模型</option>
                        <option value="drift">漂移检测</option>
                        <option value="rollback">回滚</option>
                    </select>
                </div>
                <div class="flex-1">
                    <input type="text" id="search-input" onkeyup="filterAlerts()" 
                           placeholder="搜索告警..." 
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm">
                </div>
            </div>
        </div>

        <!-- Alerts List -->
        <div class="bg-white rounded-lg shadow-lg">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                    <i class="fas fa-inbox text-indigo-500 mr-2"></i>告警列表
                </h2>
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-500">自动刷新</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-refresh" class="sr-only peer" checked onchange="toggleAutoRefresh()">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                </div>
            </div>
            <div id="alerts-container" class="divide-y divide-gray-200">
                <!-- 动态生成告警列表 -->
            </div>
            <div class="px-6 py-4 border-t border-gray-200">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-500" id="pagination-info">显示 0 条告警</span>
                    <div class="flex space-x-2">
                        <button onclick="previousPage()" class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50">上一页</button>
                        <button onclick="nextPage()" class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50">下一页</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rollback Operations -->
        <div class="bg-white rounded-lg shadow-lg mt-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                    <i class="fas fa-undo-alt text-red-500 mr-2"></i>回滚操作记录
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">时间</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">模型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">从版本</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">到版本</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">触发原因</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="rollback-table">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Alert Detail Modal -->
    <div id="alert-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-2xl shadow-lg rounded-md bg-white">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-900" id="modal-title">告警详情</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modal-content" class="space-y-4">
                <!-- 动态内容 -->
            </div>
            <div class="mt-6 flex justify-end space-x-3">
                <button onclick="acknowledgeAlert()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                    确认告警
                </button>
                <button onclick="resolveAlert()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                    标记已解决
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/common/api_client.js"></script>
    <script src="/common/websocket_manager.js"></script>
    <script>
        let currentAlerts = [];
        let currentPage = 1;
        let pageSize = 20;
        let autoRefreshInterval = null;
        let currentAlertId = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadAlerts();
            loadRollbackHistory();
            connectWebSocket();
            startAutoRefresh();
        });

        /**
         * 加载告警列表
         */
        async function loadAlerts() {
            try {
                const params = new URLSearchParams();
                const severity = document.getElementById('severity-filter').value;
                const status = document.getElementById('status-filter').value;
                const source = document.getElementById('source-filter').value;
                const search = document.getElementById('search-input').value;
                
                if (severity !== 'all') params.append('severity', severity);
                if (status !== 'all') params.append('status', status);
                if (source !== 'all') params.append('source', source);
                if (search) params.append('search', search);
                params.append('page', currentPage);
                params.append('page_size', pageSize);
                
                const response = await apiGet(`/alerts?${params.toString()}`);
                currentAlerts = response.alerts || [];
                updateAlertList(currentAlerts);
                updateStatistics(response.statistics || {});
                updatePagination(response.total || 0);
            } catch (error) {
                console.error('加载告警失败:', error);
                showNotification('加载告警失败', 'error');
            }
        }

        /**
         * 更新告警列表
         */
        function updateAlertList(alerts) {
            const container = document.getElementById('alerts-container');
            
            if (alerts.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-4"></i>
                        <p>暂无告警</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = alerts.map(alert => `
                <div class="alert-card alert-${alert.severity} p-4 hover:bg-gray-50 cursor-pointer ${alert.acknowledged ? 'opacity-60' : ''}"
                     onclick="showAlertDetail('${alert.alert_id}')">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="severity-badge ${getSeverityClass(alert.severity)}">
                                    ${alert.severity.toUpperCase()}
                                </span>
                                <span class="text-xs text-gray-500">${formatDate(alert.timestamp)}</span>
                                ${alert.acknowledged ? '<span class="text-xs text-blue-600"><i class="fas fa-check mr-1"></i>已确认</span>' : ''}
                            </div>
                            <h4 class="text-sm font-semibold text-gray-900 mb-1">${alert.title}</h4>
                            <p class="text-sm text-gray-600 line-clamp-2">${alert.message}</p>
                            <div class="mt-2 flex items-center space-x-4 text-xs text-gray-500">
                                <span><i class="fas fa-tag mr-1"></i>${alert.source}</span>
                                <span><i class="fas fa-cube mr-1"></i>${alert.model_id || 'N/A'}</span>
                                ${alert.pipeline_id ? `<span><i class="fas fa-project-diagram mr-1"></i>${alert.pipeline_id.substring(0, 8)}...</span>` : ''}
                            </div>
                        </div>
                        <div class="ml-4 flex items-center space-x-2">
                            ${!alert.acknowledged ? `
                                <button onclick="event.stopPropagation(); acknowledgeAlert('${alert.alert_id}')" 
                                        class="text-blue-600 hover:text-blue-800" title="确认">
                                    <i class="fas fa-check"></i>
                                </button>
                            ` : ''}
                            ${alert.status !== 'resolved' ? `
                                <button onclick="event.stopPropagation(); resolveAlert('${alert.alert_id}')" 
                                        class="text-green-600 hover:text-green-800" title="解决">
                                    <i class="fas fa-check-double"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /**
         * 更新统计信息
         */
        function updateStatistics(stats) {
            document.getElementById('count-critical').textContent = stats.critical || 0;
            document.getElementById('count-error').textContent = stats.error || 0;
            document.getElementById('count-warning').textContent = stats.warning || 0;
            document.getElementById('count-info').textContent = stats.info || 0;
            document.getElementById('count-total').textContent = stats.total || 0;
        }

        /**
         * 更新分页信息
         */
        function updatePagination(total) {
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, total);
            document.getElementById('pagination-info').textContent = `显示 ${start}-${end} 条，共 ${total} 条`;
        }

        /**
         * 加载回滚历史
         */
        async function loadRollbackHistory() {
            try {
                const history = await apiGet('/alerts/rollback/history?limit=20');
                const tbody = document.getElementById('rollback-table');
                
                tbody.innerHTML = history.map(record => `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatDate(record.timestamp)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${record.model_name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${record.from_version}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${record.to_version}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${record.reason}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusClass(record.status)}">
                                ${getStatusText(record.status)}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载回滚历史失败:', error);
            }
        }

        /**
         * 显示告警详情
         */
        async function showAlertDetail(alertId) {
            currentAlertId = alertId;
            const alert = currentAlerts.find(a => a.alert_id === alertId);
            if (!alert) return;
            
            document.getElementById('modal-title').textContent = alert.title;
            document.getElementById('modal-content').innerHTML = `
                <div class="bg-gray-50 p-4 rounded-lg">
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="text-gray-500">告警ID:</span>
                            <span class="ml-2 font-mono">${alert.alert_id}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">严重程度:</span>
                            <span class="ml-2 severity-badge ${getSeverityClass(alert.severity)}">${alert.severity}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">来源:</span>
                            <span class="ml-2">${alert.source}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">时间:</span>
                            <span class="ml-2">${formatDate(alert.timestamp)}</span>
                        </div>
                        ${alert.model_id ? `
                            <div>
                                <span class="text-gray-500">模型:</span>
                                <span class="ml-2">${alert.model_id}</span>
                            </div>
                        ` : ''}
                        ${alert.pipeline_id ? `
                            <div>
                                <span class="text-gray-500">管道:</span>
                                <span class="ml-2 font-mono">${alert.pipeline_id}</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
                <div>
                    <h4 class="font-medium text-gray-900 mb-2">详细信息</h4>
                    <p class="text-sm text-gray-600 whitespace-pre-wrap">${alert.message}</p>
                </div>
                ${alert.metadata ? `
                    <div>
                        <h4 class="font-medium text-gray-900 mb-2">元数据</h4>
                        <pre class="bg-gray-100 p-3 rounded text-xs overflow-x-auto">${JSON.stringify(alert.metadata, null, 2)}</pre>
                    </div>
                ` : ''}
            `;
            
            document.getElementById('alert-modal').classList.remove('hidden');
        }

        /**
         * 确认告警
         */
        async function acknowledgeAlert(alertId) {
            const id = alertId || currentAlertId;
            if (!id) return;
            
            try {
                await apiPost(`/alerts/${id}/acknowledge`, {});
                showNotification('告警已确认', 'success');
                closeModal();
                loadAlerts();
            } catch (error) {
                console.error('确认告警失败:', error);
                showNotification('操作失败', 'error');
            }
        }

        /**
         * 解决告警
         */
        async function resolveAlert(alertId) {
            const id = alertId || currentAlertId;
            if (!id) return;
            
            try {
                await apiPost(`/alerts/${id}/resolve`, {});
                showNotification('告警已解决', 'success');
                closeModal();
                loadAlerts();
            } catch (error) {
                console.error('解决告警失败:', error);
                showNotification('操作失败', 'error');
            }
        }

        /**
         * 标记全部已读
         */
        async function markAllAsRead() {
            try {
                await apiPost('/alerts/acknowledge-all', {});
                showNotification('全部告警已确认', 'success');
                loadAlerts();
            } catch (error) {
                console.error('操作失败:', error);
                showNotification('操作失败', 'error');
            }
        }

        /**
         * 过滤告警
         */
        function filterAlerts() {
            currentPage = 1;
            loadAlerts();
        }

        /**
         * 上一页
         */
        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadAlerts();
            }
        }

        /**
         * 下一页
         */
        function nextPage() {
            currentPage++;
            loadAlerts();
        }

        /**
         * 切换自动刷新
         */
        function toggleAutoRefresh() {
            const enabled = document.getElementById('auto-refresh').checked;
            if (enabled) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        /**
         * 开始自动刷新
         */
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                loadAlerts();
                loadRollbackHistory();
            }, 30000);
        }

        /**
         * 停止自动刷新
         */
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        /**
         * 连接WebSocket
         */
        function connectWebSocket() {
            if (typeof WebSocketManager !== 'undefined') {
                const ws = new WebSocketManager('ws://localhost:8000/ws/alerts');
                ws.onMessage = function(data) {
                    if (data.type === 'new_alert') {
                        showAlertNotification(data.alert);
                        loadAlerts();
                    }
                };
                ws.connect();
            }
        }

        /**
         * 显示告警通知
         */
        function showAlertNotification(alert) {
            const notification = document.createElement('div');
            notification.className = `alert-notification fixed top-4 right-4 max-w-sm bg-white rounded-lg shadow-lg border-l-4 ${getSeverityBorderClass(alert.severity)} p-4 z-50`;
            notification.innerHTML = `
                <div class="flex items-start">
                    <div class="flex-1">
                        <div class="flex items-center">
                            <span class="severity-badge ${getSeverityClass(alert.severity)} mr-2">${alert.severity}</span>
                            <span class="text-xs text-gray-500">${formatDate(alert.timestamp)}</span>
                        </div>
                        <h4 class="text-sm font-semibold text-gray-900 mt-1">${alert.title}</h4>
                        <p class="text-xs text-gray-600 mt-1">${alert.message.substring(0, 100)}...</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-gray-400 hover:text-gray-600 ml-2">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 10000);
        }

        /**
         * 关闭模态框
         */
        function closeModal() {
            document.getElementById('alert-modal').classList.add('hidden');
            currentAlertId = null;
        }

        /**
         * 刷新数据
         */
        function refreshData() {
            loadAlerts();
            loadRollbackHistory();
            showNotification('数据已刷新', 'success');
        }

        /**
         * 显示通知
         */
        function showNotification(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // 辅助函数
        function getSeverityClass(severity) {
            const classes = {
                'critical': 'bg-red-100 text-red-800',
                'error': 'bg-orange-100 text-orange-800',
                'warning': 'bg-yellow-100 text-yellow-800',
                'info': 'bg-blue-100 text-blue-800',
                'debug': 'bg-gray-100 text-gray-800'
            };
            return classes[severity] || classes['info'];
        }

        function getSeverityBorderClass(severity) {
            const classes = {
                'critical': 'border-red-500',
                'error': 'border-orange-500',
                'warning': 'border-yellow-500',
                'info': 'border-blue-500',
                'debug': 'border-gray-500'
            };
            return classes[severity] || classes['info'];
        }

        function getStatusClass(status) {
            const classes = {
                'success': 'bg-green-100 text-green-800',
                'failed': 'bg-red-100 text-red-800',
                'in_progress': 'bg-blue-100 text-blue-800',
                'pending': 'bg-gray-100 text-gray-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        function getStatusText(status) {
            const texts = {
                'success': '成功',
                'failed': '失败',
                'in_progress': '进行中',
                'pending': '等待中'
            };
            return texts[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
