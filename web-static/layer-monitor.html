<!DOCTYPE html>
<html lang="zh-CN">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQA2025 层级详细监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="mobile-optimization.css">
    <script src="mobile-utils.js"></script>
    <style>
        .gradient-bg-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .layer-tab {
            transition: all 0.3s ease;
        }
        .layer-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .status-indicator {
            position: relative;
        }
        .status-indicator::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        .metric-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>

                    </div>
                    <button onclick="refreshAll()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-300">

    <script>
        // API基础URL生成函数
        function getApiBaseUrl(endpoint = '') {
            const baseUrl = window.location.protocol === 'file:' || window.location.hostname === 'localhost'
                ? 'http://localhost:8000/api/v1'
                : '/api/v1';
            return baseUrl + endpoint;
        }

        // Layer configuration
        const LAYER_CONFIG = {
            // Core Business Layers
            strategy: {

                icon: 'fas fa-brain',
                color: 'blue',
                description: '量化策略开发、回测分析、策略部署',
                metrics: ['活跃策略', '策略性能', '资源使用', '告警统计'],
                api: '/strategy/monitor'
            },
            trading: {
                name: '交易执行层',
                icon: 'fas fa-exchange-alt',
                color: 'green',
                description: '订单管理、交易执行、高频交易',
                metrics: ['订单处理', '交易质量', '系统资源', '异常统计'],
                api: '/trading/monitor'
            },
            risk: {
                name: '风险控制层',
                icon: 'fas fa-shield-alt',
                color: 'red',
                description: '实时风控、合规检查、风险监控',
                metrics: ['风险指标', '风控规则', '拦截统计', '系统性能'],
                api: '/risk/monitor'
            },
            features: {
                name: '特征分析层',
                icon: 'fas fa-chart-line',
                color: 'purple',
                description: '技术指标计算、特征工程、数据分析',
                metrics: ['特征任务', '质量指标', '存储使用', '计算性能'],
                api: '/features/monitor'
            },
            // Core Support Layers
            data: {
                name: '数据管理层',
                icon: 'fas fa-database',
                color: 'indigo',
                description: '数据采集、处理、存储、质量保障',
                metrics: ['数据源状态', '质量指标', '存储使用', '同步状态'],
                api: '/data/monitor'
            },
            ml: {
                name: '机器学习层',
                icon: 'fas fa-robot',
                color: 'orange',
                description: '分布式训练、特征工程、模型服务',
                metrics: ['训练任务', '推理性能', '模型准确率', 'GPU使用'],
                api: '/ml/monitor'
            },
            infrastructure: {
                name: '基础设施层',
                icon: 'fas fa-server',
                color: 'teal',
                description: '配置管理、缓存、安全、日志',
                metrics: ['系统资源', '服务健康', '缓存命中', '日志收集'],
                api: '/infrastructure/monitor'
            },
            streaming: {
                name: '流处理层',
                icon: 'fas fa-stream',
                color: 'pink',
                description: '实时数据处理、事件驱动、弹性处理',
                metrics: ['流处理任务', '数据吞吐量', '处理延迟', '错误率'],
                api: '/streaming/monitor'
            },
            // Auxiliary Support Layers
            core: {
                name: '核心服务层',
                icon: 'fas fa-project-diagram',
                color: 'gray',
                description: '事件驱动、依赖注入、业务流程编排',
                metrics: ['事件总线', '依赖注入', '流程状态', '接口调用'],
                api: '/core/monitor'
            },
            monitoring: {
                name: '监控层',
                icon: 'fas fa-tachometer-alt',
                color: 'gray',
                description: '系统监控、业务监控、智能告警',
                metrics: ['监控覆盖', '告警准确性', '响应时间', '用户满意度'],
                api: '/monitoring/monitor'
            },
            optimization: {
                name: '优化层',
                icon: 'fas fa-rocket',
                color: 'gray',
                description: '性能优化、策略优化、系统调优',
                metrics: ['优化任务', '性能提升', '资源效率', '优化效果'],
                api: '/optimization/monitor'
            },
            gateway: {
                name: '网关层',
                icon: 'fas fa-door-open',
                color: 'gray',
                description: 'API路由、负载均衡、认证授权',
                metrics: ['请求处理', '负载均衡', '认证成功率', '响应时间'],
                api: '/gateway/monitor'
            },
            adapter: {
                name: '适配器层',
                icon: 'fas fa-plug',
                color: 'gray',
                description: '数据源适配、协议转换、接口适配',
                metrics: ['连接状态', '转换成功率', '性能指标', '错误统计'],
                api: '/adapter/monitor'
            },
            automation: {
                name: '自动化层',
                icon: 'fas fa-magic',
                color: 'gray',
                description: '流程自动化、任务调度、运维自动化',
                metrics: ['任务执行', '调度成功率', '自动化覆盖', '效率提升'],
                api: '/automation/monitor'
            },
            resilience: {
                name: '弹性层',
                icon: 'fas fa-shield-virus',
                color: 'gray',
                description: '降级服务、断路器、高可用保障',
                metrics: ['服务状态', '降级触发', '恢复时间', '可用性'],
                api: '/resilience/monitor'
            },
            testing: {
                name: '测试层',
                icon: 'fas fa-vial',
                color: 'gray',
                description: '单元测试、集成测试、质量保障',
                metrics: ['测试覆盖率', '测试通过率', '缺陷发现', '质量指标'],
                api: '/testing/monitor'
            },
            utils: {
                name: '工具层',
                icon: 'fas fa-wrench',
                color: 'gray',
                description: '通用工具、辅助函数、开发工具',
                metrics: ['工具使用', '性能指标', '错误统计', '用户反馈'],
                api: '/utils/monitor'
            }
        };

        let currentLayer = null;
        let layerCharts = {};

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check URL parameters for initial layer
            const urlParams = new URLSearchParams(window.location.search);
            const initialLayer = urlParams.get('layer');

            if (initialLayer && LAYER_CONFIG[initialLayer]) {
                switchLayer(initialLayer);
            }

            // Set up periodic updates
            setInterval(() => {
                if (currentLayer) {
                    updateLayerData(currentLayer);
                }
            }, 30000); // Update every 30 seconds
        });

        function switchLayer(layerId) {
            if (!LAYER_CONFIG[layerId]) return;

            currentLayer = layerId;
            const config = LAYER_CONFIG[layerId];

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('layer', layerId);
            window.history.pushState({}, '', url);

            // Update tab styles
            document.querySelectorAll('.layer-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${layerId}`).classList.add('active');

            // Load layer content
            loadLayerContent(layerId);
        }

        function loadLayerContent(layerId) {
            const config = LAYER_CONFIG[layerId];
            const contentElement = document.getElementById('layer-content');

            // Generate layer-specific content
            let layerSpecificContent = '';

            // Add layer-specific content based on layer type
            switch(layerId) {
                case 'data':
                    layerSpecificContent = generateDataLayerContent();
                    break;
                case 'ml':
                    layerSpecificContent = generateMLLayerContent();
                    break;
                case 'infrastructure':
                    layerSpecificContent = generateInfrastructureLayerContent();
                    break;
                case 'streaming':
                    layerSpecificContent = generateStreamingLayerContent();
                    break;
                case 'core':
                    layerSpecificContent = generateCoreLayerContent();
                    break;
                case 'monitoring':
                    layerSpecificContent = generateMonitoringLayerContent();
                    break;
                case 'optimization':
                    layerSpecificContent = generateOptimizationLayerContent();
                    break;
                case 'gateway':
                    layerSpecificContent = generateGatewayLayerContent();
                    break;
                case 'adapter':
                    layerSpecificContent = generateAdapterLayerContent();
                    break;
                case 'automation':
                    layerSpecificContent = generateAutomationLayerContent();
                    break;
                case 'resilience':
                    layerSpecificContent = generateResilienceLayerContent();
                    break;
                case 'testing':
                    layerSpecificContent = generateTestingLayerContent();
                    break;
                case 'utils':

        async function updateLayerData(layerId) {
            try {
                const config = LAYER_CONFIG[layerId];
                const response = await fetch(getApiBaseUrl(config.api));

                if (response.ok) {
                    const data = await response.json();
                    updateLayerMetrics(layerId, data);
                    updateLayerCharts(layerId, data);
                    updateLayerTable(layerId, data);
                } else {
                    showLayerError(layerId);
                }
            } catch (error) {
                console.error(`加载层级 ${layerId} 数据失败:`, error);
                showLayerError(layerId);
            }
        }

        function updateLayerMetrics(layerId, data) {
            const config = LAYER_CONFIG[layerId];

            // Update key metrics
            config.metrics.forEach((metric, index) => {
                const element = document.getElementById(`${layerId}-metric-${index}`);
                if (element && data.metrics && data.metrics[metric]) {
                    element.textContent = data.metrics[metric];
                }
            });
        }

        function updateLayerCharts(layerId, data) {
            // Destroy existing charts
            if (layerCharts[layerId]) {
                Object.values(layerCharts[layerId]).forEach(chart => {
                    if (chart) chart.destroy();
                });
            }

            layerCharts[layerId] = {};

            // Performance Chart
            const perfCtx = document.getElementById(`${layerId}-performance-chart`);
            if (perfCtx) {
                layerCharts[layerId].performance = new Chart(perfCtx, {
                    type: 'line',
                    data: {
                        labels: data.charts?.performance?.labels || ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
                        datasets: [{
                            label: '性能指标',
                            data: data.charts?.performance?.data || [85, 87, 89, 88, 91, 90],
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top' }
                        },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            }

            // Resource Chart
            const resourceCtx = document.getElementById(`${layerId}-resource-chart`);
            if (resourceCtx) {
                layerCharts[layerId].resource = new Chart(resourceCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['CPU', '内存', '存储', '网络'],
                        datasets: [{
                            data: data.charts?.resource?.data || [65, 45, 30, 25],
                            backgroundColor: [
                                'rgba(239, 68, 68, 0.8)',
                                'rgba(59, 130, 246, 0.8)',
                                'rgba(16, 185, 129, 0.8)',
                                'rgba(245, 158, 11, 0.8)'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
        }

        function updateLayerTable(layerId, data) {
            const tbody = document.getElementById(`${layerId}-metrics-table`);
            if (!tbody) return;

            const metrics = data.detailed_metrics || [
                { name: '响应时间', current: '45ms', target: '<50ms', status: '正常', trend: '↗️' },
                { name: 'CPU使用率', current: '65%', target: '<80%', status: '正常', trend: '↘️' },
                { name: '内存使用率', current: '72%', target: '<85%', status: '正常', trend: '→' },
                { name: '错误率', current: '0.1%', target: '<1%', status: '正常', trend: '↘️' }
            ];

            const html = metrics.map(metric => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${metric.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${metric.current}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${metric.target}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                            ${metric.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${metric.trend}</td>
                </tr>
            `).join('');

            tbody.innerHTML = html;
        }

        function showLayerError(layerId) {
            const config = LAYER_CONFIG[layerId];

            // Update metrics to show error state
            config.metrics.forEach((metric, index) => {
                const element = document.getElementById(`${layerId}-metric-${index}`);
                if (element) {

                    element.className = element.className.replace('text-gray-900', 'text-red-500');
                }
            });
        }

            if (currentLayer) {

                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>刷新中...';
                setTimeout(() => {

            }
