filter:
  date:
    match:
    - timestamp
    - ISO8601
  grok:
    match:
      message: '%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}'
  mutate:
    remove_field:
    - timestamp
input:
  file:
    path:
    - logs/*.log
    sincedb_path: /dev/null
    start_position: beginning
    type: application
output:
  elasticsearch:
    hosts:
    - localhost:9200
    index: rqa2025-%{+YYYY.MM.dd}
    password: changeme
    user: elastic
