global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@rqa2025.example.com'
  smtp_auth_username: 'alerts@rqa2025.example.com'
  smtp_auth_password: 'YOUR_SMTP_PASSWORD'

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'rqa2025-team'
  routes:
    - match:
        severity: critical
      receiver: 'rqa2025-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'rqa2025-warning'
      continue: true
    - match:
        service: infrastructure
      receiver: 'rqa2025-infrastructure'
      continue: true
    - match:
        service: business
      receiver: 'rqa2025-business'
      continue: true

receivers:
  - name: 'rqa2025-critical'
    email_configs:
      - to: 'critical@rqa2025.example.com'
        subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        body: |
          🚨 **CRITICAL ALERT**

          **Alert:** {{ .GroupLabels.alertname }}
          **Service:** {{ .GroupLabels.service }}
          **Severity:** {{ .CommonLabels.severity }}
          **Description:** {{ .CommonAnnotations.description }}

          **Labels:**
          {{ range .GroupLabels.SortedPairs }}{{ .Name }}: {{ .Value }}
          {{ end }}

          **Annotations:**
          {{ range .CommonAnnotations.SortedPairs }}{{ .Name }}: {{ .Value }}
          {{ end }}

          **Time:** {{ .StartsAt }}
          **Runbook:** https://docs.rqa2025.example.com/runbooks/{{ .GroupLabels.alertname }}
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#critical-alerts'
        title: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Service:* {{ .GroupLabels.service }}
          *Description:* {{ .CommonAnnotations.description }}
          *Time:* {{ .StartsAt }}
        send_resolved: true
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
        description: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        severity: 'critical'

  - name: 'rqa2025-warning'
    email_configs:
      - to: 'warning@rqa2025.example.com'
        subject: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        body: |
          ⚠️ **WARNING ALERT**

          **Alert:** {{ .GroupLabels.alertname }}
          **Service:** {{ .GroupLabels.service }}
          **Severity:** {{ .CommonLabels.severity }}
          **Description:** {{ .CommonAnnotations.description }}

          **Labels:**
          {{ range .GroupLabels.SortedPairs }}{{ .Name }}: {{ .Value }}
          {{ end }}

          **Time:** {{ .StartsAt }}
          **Runbook:** https://docs.rqa2025.example.com/runbooks/{{ .GroupLabels.alertname }}
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#warning-alerts'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Service:* {{ .GroupLabels.service }}
          *Description:* {{ .CommonAnnotations.description }}
          *Time:* {{ .StartsAt }}

  - name: 'rqa2025-infrastructure'
    email_configs:
      - to: 'infra@rqa2025.example.com'
        subject: '🖥️ INFRA: {{ .GroupLabels.alertname }}'
        body: |
          🖥️ **INFRASTRUCTURE ALERT**

          **Alert:** {{ .GroupLabels.alertname }}
          **Service:** infrastructure
          **Severity:** {{ .CommonLabels.severity }}
          **Description:** {{ .CommonAnnotations.description }}

          **Instance:** {{ .GroupLabels.instance }}
          **Time:** {{ .StartsAt }}

          **Runbook:** https://docs.rqa2025.example.com/infrastructure/{{ .GroupLabels.alertname }}
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#infrastructure'
        title: '🖥️ INFRA: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Instance:* {{ .GroupLabels.instance }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: 'rqa2025-business'
    email_configs:
      - to: 'business@rqa2025.example.com'
        subject: '📊 BUSINESS: {{ .GroupLabels.alertname }}'
        body: |
          📊 **BUSINESS ALERT**

          **Alert:** {{ .GroupLabels.alertname }}
          **Service:** business
          **Severity:** {{ .CommonLabels.severity }}
          **Description:** {{ .CommonAnnotations.description }}

          **Time:** {{ .StartsAt }}

          **Runbook:** https://docs.rqa2025.example.com/business/{{ .GroupLabels.alertname }}
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#business'
        title: '📊 BUSINESS: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: 'rqa2025-team'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#general'
        title: '📢 ALERT: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Service:* {{ .GroupLabels.service }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Time:* {{ .StartsAt }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'RQA2025AppDown'
    target_match:
      alertname: 'RQA2025HighResponseTime'
    equal: ['service']
