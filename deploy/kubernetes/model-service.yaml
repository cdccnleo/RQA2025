apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  namespace: rqa2025
  labels:
    app: model-service
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-service
  template:
    metadata:
      labels:
        app: model-service
        version: v1.0.0
    spec:
      containers:
      - name: model-service
        image: rqa2025/model-service:latest
        ports:
        - containerPort: 8003
          name: http
        env:
        - name: SERVICE_NAME
          value: "model-service"
        - name: SERVICE_PORT
          value: "8003"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: url
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
        - name: logs-volume
          mountPath: /app/logs
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: rqa2025-models-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: rqa2025-logs-pvc
      - name: config-volume
        configMap:
          name: rqa2025-config
---
apiVersion: v1
kind: Service
metadata:
  name: model-service
  namespace: rqa2025
  labels:
    app: model-service
spec:
  selector:
    app: model-service
  ports:
  - name: http
    port: 8003
    targetPort: 8003
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: model-service-network-policy
  namespace: rqa2025
spec:
  podSelector:
    matchLabels:
      app: model-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8003
  - from:
    - podSelector:
        matchLabels:
          app: features-service
    ports:
    - protocol: TCP
      port: 8003
  - from:
    - podSelector:
        matchLabels:
          app: monitoring-service
    ports:
    - protocol: TCP
      port: 8003
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: database-service
    ports:
    - protocol: TCP
      port: 5432 