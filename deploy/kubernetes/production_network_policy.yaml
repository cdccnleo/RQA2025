---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rqa2025-monitoring-network-policy
  namespace: rqa2025-production
  labels:
    app: rqa2025-monitoring
    environment: production
    cloud-native: "true"
    tier: monitoring
spec:
  podSelector:
    matchLabels:
      environment: production
      tier: monitoring
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from all services for monitoring
  - from:
    - podSelector:
        matchLabels:
          environment: production
    ports:
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 9093
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow communication with external monitoring services
  - to: []
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
