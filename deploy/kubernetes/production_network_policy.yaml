    tier: cache
spec:
  podSelector:
    matchLabels:
      environment: production
      tier: cache
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Only allow traffic from backend services
  - from:
    - podSelector:
        matchLabels:
          environment: production
          tier: backend
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9090
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow communication with monitoring services
  - to:
    - podSelector:
        matchLabels:
          environment: production
          tier: monitoring
    ports:
