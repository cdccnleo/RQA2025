apiVersion: apps/v1
kind: Deployment
metadata:
  name: rqa2025-engine-service
  namespace: rqa2025-production
  labels:
    app: rqa2025-engine
    version: v1.0.0
    environment: production
    cloud-native: "true"
    tier: backend
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubernetes.io/change-cause: "Production deployment optimization"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rqa2025-engine
      environment: production
  template:
    metadata:
      labels:
        app: rqa2025-engine
        environment: production
        version: v1.0.0
        cloud-native: "true"
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "http"
        sidecar.istio.io/inject: "true"
        checksum/config: "${CONFIG_CHECKSUM}"
    spec:
      serviceAccountName: rqa2025-engine-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: engine-service
        image: rqa2025-engine:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: METRICS_ENABLED
          value: "true"
        - name: CLOUD_NATIVE_ENABLED
          value: "true"
        - name: CONFIG_PATH
          value: "/app/config/engine-config.yaml"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            ephemeral-storage: "100Mi"
          limits:
            memory: "2Gi"
            cpu: "1000m"
            ephemeral-storage: "200Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /startup
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
          successThreshold: 1
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
        - name: cache-volume
          mountPath: /app/cache
        - name: tmp-volume
          mountPath: /tmp
        - name: secrets-volume
          mountPath: /app/secrets
          readOnly: true
      - name: sidecar
        image: rqa2025-sidecar:${SIDECAR_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 15020
          name: http-envoy-prom
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: config-volume
        configMap:
          name: rqa2025-engine-config
          items:
          - key: engine-config.yaml
            path: engine-config.yaml
            mode: 0644
      - name: logs-volume
        persistentVolumeClaim:
          claimName: rqa2025-logs-pvc
      - name: cache-volume
        persistentVolumeClaim:
          claimName: rqa2025-cache-pvc
      - name: tmp-volume
        emptyDir:
          medium: Memory
          sizeLimit: "100Mi"
      - name: secrets-volume
        secret:
          secretName: rqa2025-engine-secrets
          defaultMode: 0400
      nodeSelector:
        node-type: production
      tolerations:
      - key: "node-role"
        operator: "Equal"
        value: "production"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - rqa2025-engine
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values:
                - production
              - key: kubernetes.io/os
                operator: In
                values:
                - linux

