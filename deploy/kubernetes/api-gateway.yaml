apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rqa2025
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      containers:
      - name: api-gateway
        image: rqa2025/api-gateway:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        - name: SERVICE_NAME
          value: "api-gateway"
        - name: SERVICE_PORT
          value: "8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: cache-volume
          mountPath: /app/cache
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: logs-volume
        persistentVolumeClaim:
          claimName: rqa2025-logs-pvc
      - name: cache-volume
        persistentVolumeClaim:
          claimName: rqa2025-cache-pvc
      - name: config-volume
        configMap:
          name: rqa2025-config

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: rqa2025
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: api-gateway

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: rqa2025
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: rqa2025
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: features-service
    ports:
    - protocol: TCP
      port: 8001
  - to:
    - podSelector:
        matchLabels:
          app: data-service
    ports:
    - protocol: TCP
      port: 8002
  - to:
    - podSelector:
        matchLabels:
          app: model-service
    ports:
    - protocol: TCP
      port: 8003
  - to:
    - podSelector:
        matchLabels:
          app: trading-service
    ports:
    - protocol: TCP
      port: 8004
  - to:
    - podSelector:
        matchLabels:
          app: risk-service
    ports:
    - protocol: TCP
      port: 8005
  - to:
    - podSelector:
        matchLabels:
          app: backtest-service
    ports:
    - protocol: TCP
      port: 8006
  - to:
    - podSelector:
        matchLabels:
          app: redis-service
    ports:
    - protocol: TCP
      port: 6379 