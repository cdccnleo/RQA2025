---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: rqa2025-engine-vpa
  namespace: rqa2025-production
  labels:
    app: rqa2025-engine
    environment: production
    cloud-native: "true"
    tier: backend
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: rqa2025-engine-service
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      minAllowed:
        cpu: 100m
        memory: 256Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledValues: RequestsAndLimits

---
apiVersion: autoscaling.k8s.io/v1
