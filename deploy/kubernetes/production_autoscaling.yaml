apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rqa2025-engine-hpa
  namespace: rqa2025-production
  labels:
    app: rqa2025-engine
    environment: production
    cloud-native: "true"
    tier: backend
  annotations:
    hpa.kubernetes.io/scale-down-delay: "300s"
    hpa.kubernetes.io/scale-up-delay: "60s"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rqa2025-engine-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Object
    object:
      metric:
        name: requests-per-second
      describedObject:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: rqa2025-production-ingress
      target:
        type: Value
        value: 1000
  - type: Pods
    pods:
      metric:
        name: packets-per-second
      target:
        type: AverageValue
        averageValue: 1k
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min

