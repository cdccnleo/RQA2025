apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: rqa2025
  labels:
    app: risk-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
        version: v1
    spec:
      containers:
      - name: risk-service
        image: rqa2025/risk-service:latest
        ports:
        - containerPort: 8005
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: url
        - name: SERVICE_NAME
          value: "risk-service"
        - name: SERVICE_PORT
          value: "8005"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8005
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: cache-volume
          mountPath: /app/cache
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: logs-volume
        persistentVolumeClaim:
          claimName: rqa2025-logs-pvc
      - name: cache-volume
        persistentVolumeClaim:
          claimName: rqa2025-cache-pvc
      - name: config-volume
        configMap:
          name: rqa2025-config

---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: rqa2025
  labels:
    app: risk-service
spec:
  type: ClusterIP
  ports:
  - port: 8005
    targetPort: 8005
    protocol: TCP
    name: http
  selector:
    app: risk-service

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: risk-service-network-policy
  namespace: rqa2025
spec:
  podSelector:
    matchLabels:
      app: risk-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8005
  - from:
    - podSelector:
        matchLabels:
          app: trading-service
    ports:
    - protocol: TCP
      port: 8005
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: database-service
    ports:
    - protocol: TCP
      port: 5432 