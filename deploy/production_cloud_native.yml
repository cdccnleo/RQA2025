---
apiVersion: v1
kind: Service
metadata:
  name: rqa2025-backtest-service
  namespace: rqa2025-cloud-native
  labels:
    app: rqa2025-backtest
    environment: production
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8001
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: rqa2025-backtest
    environment: production
---
apiVersion: v1
kind: Service
metadata:
  name: rqa2025-data-service
  namespace: rqa2025-cloud-native
  labels:
    app: rqa2025-data
    environment: production
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8002
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: rqa2025-data
    environment: production
---
apiVersion: v1
kind: Service
metadata:
  name: rqa2025-intelligent-service
  namespace: rqa2025-cloud-native
  labels:
    app: rqa2025-intelligent
    environment: production
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8005
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: rqa2025-intelligent
    environment: production
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rqa2025-cloud-native-ingress
  namespace: rqa2025-cloud-native
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - cloud-native.rqa2025.example.com
    secretName: rqa2025-cloud-native-tls
  rules:
  - host: cloud-native.rqa2025.example.com
    http:
      paths:
      - path: /backtest
        pathType: Prefix
        backend:
          service:
            name: rqa2025-backtest-service
            port:
              number: 80
      - path: /data
        pathType: Prefix
        backend:
          service:
            name: rqa2025-data-service
            port:
              number: 80
      - path: /intelligent
        pathType: Prefix
        backend:
          service:
            name: rqa2025-intelligent-service
            port:
              number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rqa2025-models-pvc
  namespace: rqa2025-cloud-native
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rqa2025-data-pvc
  namespace: rqa2025-cloud-native
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rqa2025-logs-pvc
  namespace: rqa2025-cloud-native
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd 