apiVersion: v1
kind: Namespace
metadata:
  name: rqa2025-production
  labels:
    name: rqa2025-production
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rqa2025-config
  namespace: rqa2025-production
data:
  config.yaml: |
    # 生产环境配置
    environment: production
    log_level: INFO
    data_source: production_db
    model_storage: /app/models/production
    cache_enabled: true
    max_workers: 8
    gpu_enabled: true
    monitoring_enabled: true
    alerting_enabled: true
    backup_enabled: true
    security_scan_enabled: true
---
apiVersion: v1
kind: Secret
metadata:
  name: rqa2025-secrets
  namespace: rqa2025-production
type: Opaque
data:
  # Base64编码的生产环境密钥
  db_password: cHJvZHVjdGlvbl9wYXNzd29yZA==  # production_password
  api_key: cHJvZHVjdGlvbl9hcGlfa2V5  # production_api_key
  jwt_secret: cHJvZHVjdGlvbl9qd3Rfc2VjcmV0  # production_jwt_secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rqa2025-app
  namespace: rqa2025-production
  labels:
    app: rqa2025
    version: v1.0.0
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rqa2025
      environment: production
  template:
    metadata:
      labels:
        app: rqa2025
        environment: production
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: rqa2025-app
        image: rqa2025:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: metrics
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: CONFIG_PATH
          value: "/app/config/config.yaml"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rqa2025-secrets
              key: db_password
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: rqa2025-secrets
              key: api_key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: rqa2025-secrets
              key: jwt_secret
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: models-volume
          mountPath: /app/models
        - name: logs-volume
          mountPath: /app/logs
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: config-volume
        configMap:
          name: rqa2025-config
      - name: models-volume
        persistentVolumeClaim:
          claimName: rqa2025-models-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: rqa2025-logs-pvc
      - name: data-volume
        persistentVolumeClaim:
          claimName: rqa2025-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rqa2025-service
  namespace: rqa2025-production
  labels:
    app: rqa2025
    environment: production
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: metrics
  selector:
    app: rqa2025
    environment: production
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rqa2025-ingress
  namespace: rqa2025-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - rqa2025.example.com
    secretName: rqa2025-tls
  rules:
  - host: rqa2025.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rqa2025-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rqa2025-hpa
  namespace: rqa2025-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rqa2025-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rqa2025-models-pvc
  namespace: rqa2025-production
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rqa2025-logs-pvc
  namespace: rqa2025-production
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rqa2025-data-pvc
  namespace: rqa2025-production
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: fast-ssd
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rqa2025-pdb
  namespace: rqa2025-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: rqa2025
      environment: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rqa2025-sa
  namespace: rqa2025-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rqa2025-role
  namespace: rqa2025-production
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rqa2025-rolebinding
  namespace: rqa2025-production
subjects:
- kind: ServiceAccount
  name: rqa2025-sa
  namespace: rqa2025-production
roleRef:
  kind: Role
  name: rqa2025-role
  apiGroup: rbac.authorization.k8s.io 