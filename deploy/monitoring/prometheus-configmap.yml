apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "alert_rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      - job_name: 'rqa2025-api'
        static_configs:
          - targets:
            - 'rqa2025-api:8000'
            - 'rqa2025-api-2:8000'
            - 'rqa2025-api-3:8000'
        metrics_path: '/metrics'
        scrape_interval: 10s
        scrape_timeout: 5s

      - job_name: 'inference-engine'
        static_configs:
          - targets:
            - 'inference-engine:8001'
            - 'inference-engine-2:8001'
            - 'inference-engine-3:8001'
        metrics_path: '/metrics'
        scrape_interval: 10s
        scrape_timeout: 5s

      - job_name: 'redis-cluster'
        static_configs:
          - targets:
            - '192.168.1.10:6379'
            - '192.168.1.11:6379'
            - '192.168.1.12:6379'
            - '192.168.1.13:6379'
            - '192.168.1.14:6379'
            - '192.168.1.15:6379'
        scrape_interval: 30s
        scrape_timeout: 10s

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres:5432']
        scrape_interval: 30s
        scrape_timeout: 10s

      - job_name: 'nginx'
        static_configs:
          - targets: ['nginx:80']
        scrape_interval: 30s
        scrape_timeout: 10s

      - job_name: 'node-exporter'
        static_configs:
          - targets:
            - '192.168.1.20:9100'
            - '192.168.1.21:9100'
            - '192.168.1.22:9100'
            - '192.168.1.30:9100'
            - '192.168.1.31:9100'
            - '192.168.1.32:9100'
        scrape_interval: 30s
        scrape_timeout: 10s

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
        scrape_interval: 30s

      - job_name: 'test-coverage'
        metrics_path: '/metrics/coverage'
        static_configs:
          - targets: ['localhost:9000']
        scrape_interval: 30s
        scrape_timeout: 10s 