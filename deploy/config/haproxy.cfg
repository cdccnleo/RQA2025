global
    daemon
    maxconn 4096
    log stdout format raw local0 info

defaults
    mode tcp
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    log global

# Redis负载均衡配置
frontend redis_frontend
    bind *:6379
    mode tcp
    default_backend redis_backend

backend redis_backend
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect
    server redis_master 172.18.1.10:6379 check weight 100
    server redis_slave 172.18.1.11:6379 check weight 50

# PostgreSQL负载均衡配置
frontend postgresql_frontend
    bind *:5434
    mode tcp
    default_backend postgresql_backend

backend postgresql_backend
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect
    server postgresql_master 172.18.2.10:5432 check weight 100
    server postgresql_slave 172.18.2.11:5432 check weight 50

# HAProxy统计页面
frontend stats_frontend
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats show-legends
